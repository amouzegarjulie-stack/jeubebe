<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Wavelength Mobile</title>
  <style>
    :root {
      --bg: #1a1a2e;
      --panel: rgba(255,255,255,.08);
      --panel-2: rgba(255,255,255,.13);
      --text: #f8f7ff;
      --muted: rgba(248,247,255,.68);
      --line: rgba(255,255,255,.18);
      --yellow: #ffd166;
      --orange: #ff9f68;
      --red: #ff4d6d;
      --cyan: #7bdff2;
      --green: #b2f7ef;
      --shadow: 0 18px 50px rgba(0,0,0,.32);
      --radius: 28px;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      margin: 0;
      min-height: 100svh;
      color: var(--text);
      background:
        radial-gradient(circle at 30% 0%, rgba(123,223,242,.18), transparent 32%),
        radial-gradient(circle at 70% 10%, rgba(255,77,109,.16), transparent 26%),
        var(--bg);
      display: grid;
      place-items: center;
      overflow-x: hidden;
    }

    button, input { font: inherit; }

    .app {
      width: min(100%, 430px);
      min-height: 100svh;
      padding: 16px 16px calc(18px + env(safe-area-inset-bottom));
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 4px 2px 0;
    }

    .brand { display: flex; flex-direction: column; gap: 2px; }
    .brand h1 { margin: 0; font-size: 22px; letter-spacing: -.04em; }
    .brand small { color: var(--muted); font-weight: 600; }

    .icon-btn {
      width: 46px;
      height: 46px;
      border: 0;
      border-radius: 50%;
      color: var(--text);
      background: var(--panel);
      display: grid;
      place-items: center;
      cursor: pointer;
      box-shadow: inset 0 0 0 1px var(--line);
    }

    .card {
      background: linear-gradient(180deg, rgba(255,255,255,.12), rgba(255,255,255,.06));
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .join-card { padding: 18px; display: grid; gap: 12px; }
    .row { display: flex; gap: 10px; align-items: center; }
    .row > * { flex: 1; }

    input, select {
      width: 100%;
      border: 0;
      outline: 0;
      color: var(--text);
      background: rgba(255,255,255,.1);
      border-radius: 18px;
      padding: 14px 15px;
      border-bottom: 1px solid rgba(255,255,255,.2);
    }

    input::placeholder { color: rgba(248,247,255,.42); }

    .btn {
      border: 0;
      border-radius: 999px;
      padding: 14px 18px;
      min-height: 48px;
      font-weight: 800;
      letter-spacing: -.02em;
      color: #16162a;
      background: linear-gradient(135deg, var(--green), var(--cyan));
      cursor: pointer;
      box-shadow: 0 14px 28px rgba(123,223,242,.2);
    }

    .btn.secondary {
      color: var(--text);
      background: rgba(255,255,255,.1);
      box-shadow: inset 0 0 0 1px var(--line);
    }

    .btn.warning { background: linear-gradient(135deg, var(--yellow), var(--orange)); }

    .game-card {
      padding: 16px;
      display: grid;
      gap: 12px;
      overflow: hidden;
    }

    .status {
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 8px 11px;
      border-radius: 999px;
      background: rgba(255,255,255,.1);
      color: var(--text);
      min-width: 76px;
    }

    .wheel-wrap {
      position: relative;
      aspect-ratio: 1.45 / 1;
      width: 100%;
      display: grid;
      place-items: end center;
      padding: 6px 4px 0;
      user-select: none;
      touch-action: none;
    }

    svg { width: 100%; height: 100%; overflow: visible; }

    .needle {
      stroke: #f8f7ff;
      stroke-width: 3.2;
      stroke-linecap: round;
      filter: drop-shadow(0 4px 5px rgba(0,0,0,.45));
      transition: stroke .2s;
    }

    .needle.locked { stroke: rgba(248,247,255,.58); }

    .hub { fill: #ff4d6d; filter: drop-shadow(0 5px 10px rgba(0,0,0,.35)); }

    .cover {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(180deg, rgba(26,26,46,.96), rgba(26,26,46,.76) 72%, transparent);
      clip-path: polygon(0 0, 100% 0, 100% 66%, 0 66%);
      transform-origin: top center;
      transition: transform .8s cubic-bezier(.2,.8,.2,1), opacity .8s;
      border-radius: 26px 26px 12px 12px;
    }

    .cover.open {
      transform: translateY(-72%) rotateX(20deg);
      opacity: .08;
    }

    .clue-card {
      padding: 14px;
      display: grid;
      gap: 10px;
      background: rgba(255,255,255,.07);
      border-radius: 24px;
      border: 1px solid var(--line);
    }

    .spectrum {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    .spectrum span {
      padding: 9px 10px;
      background: rgba(255,255,255,.08);
      border-radius: 14px;
      flex: 1;
      text-align: center;
    }

    .clue {
      min-height: 52px;
      display: grid;
      place-items: center;
      text-align: center;
      font-size: 22px;
      font-weight: 900;
      letter-spacing: -.04em;
    }

    .controls { display: grid; gap: 10px; }

    .hint {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
      text-align: center;
    }

    .score-strip {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 7px;
    }

    .score-box {
      height: 42px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      font-weight: 900;
      background: rgba(255,255,255,.08);
      color: var(--muted);
      border: 1px solid var(--line);
    }

    .score-box.done { color: #16162a; background: var(--green); }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: none;
      place-items: center;
      padding: 16px;
      background: rgba(0,0,0,.45);
      backdrop-filter: blur(8px);
    }

    .modal.show { display: grid; }

    .modal-card {
      width: min(100%, 390px);
      padding: 18px;
      display: grid;
      gap: 14px;
    }

    .modal-card h2 { margin: 0; letter-spacing: -.04em; }
    .final {
      text-align: center;
      padding: 24px 18px;
      display: none;
      gap: 16px;
      animation: pop .7s cubic-bezier(.2,.8,.2,1);
    }

    .final.show { display: grid; }
    .final .big { font-size: 56px; font-weight: 950; letter-spacing: -.08em; }
    .final h2 { margin: 0; font-size: 26px; letter-spacing: -.05em; }

    @keyframes pop {
      from { opacity: 0; transform: scale(.92) translateY(14px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <div class="brand">
        <h1>Longueur d'Onde</h1>
        <small id="roomLabel">Salle</small>
      </div>
      <button class="icon-btn" id="settingsBtn" aria-label="Paramètres">⚙️</button>
    </header>

    <section class="join-card card" id="joinView">
      <input id="roomInput" placeholder="Code de salle, ex : 123" />
      <div class="row">
        <button class="btn" id="joinMaster">Maître</button>
        <button class="btn secondary" id="joinGuesser">Devin</button>
      </div>
      <p class="hint">Partage le même lien avec ton partenaire. Les rôles s'inversent automatiquement pendant 5 manches.</p>
    </section>

    <section class="game-card card hidden" id="gameView">
      <div class="status">
        <span id="roleLabel" class="pill">Rôle</span>
        <span id="roundLabel">Manche 1/5</span>
        <span id="totalLabel" class="pill">0 pts</span>
      </div>

      <div class="wheel-wrap" id="wheelWrap">
        <svg viewBox="-115 -115 230 130" aria-label="Roue Wavelength">
          <path id="dialBg" d="" fill="rgba(255,255,255,.08)" stroke="rgba(255,255,255,.16)" stroke-width="2" />
          <g id="targetZones"></g>
          <g id="ticks"></g>
          <line id="needle" class="needle" x1="0" y1="0" x2="0" y2="-94" />
          <circle class="hub" cx="0" cy="0" r="13" />
        </svg>
        <div class="cover" id="cover"></div>
      </div>

      <div class="clue-card">
        <div class="spectrum">
          <span id="leftWord">Froid</span>
          <span id="rightWord">Chaud</span>
        </div>
        <div class="clue" id="clueText">En attente...</div>
      </div>

      <div class="controls">
        <div id="masterControls">
          <input id="leftInput" placeholder="Opposé gauche" />
          <input id="rightInput" placeholder="Opposé droit" />
          <input id="clueInput" placeholder="Ton indice" />
          <button class="btn" id="sendClue">Valider l'indice</button>
        </div>

        <div id="guesserControls">
          <button class="btn warning" id="lockGuess">Valider mon aiguille</button>
        </div>

        <button class="btn secondary hidden" id="nextRound">Manche suivante</button>
        <p class="hint" id="gameHint"></p>
      </div>

      <div class="score-strip" id="scoreStrip"></div>
    </section>

    <section class="final card" id="finalView">
      <div class="big" id="finalScore">0</div>
      <h2 id="finalText">Résultat</h2>
      <button class="btn" id="newGame">Nouvelle partie</button>
    </section>
  </main>

  <div class="modal" id="settingsModal">
    <div class="modal-card card">
      <h2>Paramètres</h2>
      <select id="modeSelect">
        <option value="auto">Mode Auto</option>
        <option value="manual">Mode Manuel</option>
      </select>
      <p class="hint">Auto choisit les opposés dans une liste interne. Manuel laisse le Maître écrire ses opposés.</p>
      <button class="btn" id="closeSettings">OK</button>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";
    import { getDatabase, ref, onValue, set, update, get } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-database.js";

    /* Remplace cette configuration par celle de ton projet Firebase. */
    const firebaseConfig = {
  apiKey: "AIzaSyDc2vXIRfWp2OCkcNrr13pme-x0kKbn3DM",
  authDomain: "mille-bornes-355ca.firebaseapp.com",
  databaseURL: "https://mille-bornes-355ca-default-rtdb.firebaseio.com",
  projectId: "mille-bornes-355ca",
  storageBucket: "mille-bornes-355ca.appspot.com",
  messagingSenderId: "1018160779227",
  appId: "1:1018160779227:web:e686d32f117dfef63261fe"
};

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const pairs = [
      ["Froid", "Chaud"], ["Silencieux", "Bruyant"], ["Film d'horreur", "Comédie"],
      ["Bon marché", "Luxueux"], ["Naturel", "Artificiel"], ["Classique", "Futuriste"],
      ["Très sérieux", "Très ridicule"], ["Sous-estimé", "Surcoté"], ["Simple", "Complexe"],
      ["Calme", "Énergique"], ["Moche", "Magnifique"], ["Introverti", "Extraverti"]
    ];

    const $ = (id) => document.getElementById(id);
    const state = {
      room: new URLSearchParams(location.search).get("room") || "",
      role: null,
      data: null,
      dragging: false,
      lastSend: 0
    };

    const els = {
      joinView: $("joinView"), gameView: $("gameView"), finalView: $("finalView"),
      roomInput: $("roomInput"), roomLabel: $("roomLabel"), roleLabel: $("roleLabel"),
      roundLabel: $("roundLabel"), totalLabel: $("totalLabel"), targetZones: $("targetZones"),
      ticks: $("ticks"), dialBg: $("dialBg"), needle: $("needle"), cover: $("cover"),
      wheelWrap: $("wheelWrap"), clueText: $("clueText"), masterControls: $("masterControls"),
      guesserControls: $("guesserControls"), clueInput: $("clueInput"), leftInput: $("leftInput"),
      rightInput: $("rightInput"), leftWord: $("leftWord"), rightWord: $("rightWord"),
      sendClue: $("sendClue"), lockGuess: $("lockGuess"), nextRound: $("nextRound"),
      gameHint: $("gameHint"), scoreStrip: $("scoreStrip"), finalScore: $("finalScore"),
      finalText: $("finalText"), newGame: $("newGame"), settingsModal: $("settingsModal"),
      settingsBtn: $("settingsBtn"), closeSettings: $("closeSettings"), modeSelect: $("modeSelect")
    };

    function polar(angle, r = 100) {
      const rad = (angle - 180) * Math.PI / 180;
      return { x: Math.cos(rad) * r, y: Math.sin(rad) * r };
    }

    function arcPath(start, end, inner, outer) {
      const a = polar(start, outer), b = polar(end, outer), c = polar(end, inner), d = polar(start, inner);
      const large = end - start > 180 ? 1 : 0;
      return `M ${a.x} ${a.y} A ${outer} ${outer} 0 ${large} 1 ${b.x} ${b.y} L ${c.x} ${c.y} A ${inner} ${inner} 0 ${large} 0 ${d.x} ${d.y} Z`;
    }

    function setNeedle(angle) {
      const p = polar(angle, 94);
      els.needle.setAttribute("x2", p.x);
      els.needle.setAttribute("y2", p.y);
    }

    function drawBase() {
      els.dialBg.setAttribute("d", arcPath(0, 180, 0, 104));
      els.ticks.innerHTML = "";
      for (let a = 0; a <= 180; a += 15) {
        const p1 = polar(a, 101), p2 = polar(a, a % 45 === 0 ? 88 : 94);
        const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
        line.setAttribute("x1", p1.x); line.setAttribute("y1", p1.y);
        line.setAttribute("x2", p2.x); line.setAttribute("y2", p2.y);
        line.setAttribute("stroke", "rgba(255,255,255,.22)");
        line.setAttribute("stroke-width", a % 45 === 0 ? "2" : "1");
        els.ticks.appendChild(line);
      }
    }

    function drawTarget(target) {
      const zones = [
        { w: 12, color: "var(--yellow)", pts: 2 },
        { w: 10, color: "var(--orange)", pts: 3 },
        { w: 8, color: "var(--red)", pts: 4 },
        { w: 10, color: "var(--orange)", pts: 3 },
        { w: 12, color: "var(--yellow)", pts: 2 }
      ];
      let cursor = target - 26;
      els.targetZones.innerHTML = "";
      zones.forEach(z => {
        const start = Math.max(0, cursor);
        const end = Math.min(180, cursor + z.w);
        cursor += z.w;
        if (end <= 0 || start >= 180 || end <= start) return;
        const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
        path.setAttribute("d", arcPath(start, end, 42, 102));
        path.setAttribute("fill", z.color);
        path.setAttribute("opacity", ".95");
        els.targetZones.appendChild(path);
      });
    }

    function score(target, guess) {
      const diff = Math.abs(target - guess);
      if (diff <= 4) return 4;
      if (diff <= 14) return 3;
      if (diff <= 26) return 2;
      return 0;
    }

    function randomTarget() { return Math.round(8 + Math.random() * 164); }
    function randomPair() { return pairs[Math.floor(Math.random() * pairs.length)]; }
    function roomRef() { return ref(db, `wavelengthRooms/${state.room}`); }

    async function createOrJoin(role) {
      state.room = els.roomInput.value.trim() || state.room || Math.random().toString(36).slice(2, 7).toUpperCase();
      state.role = role;
      history.replaceState(null, "", `?room=${encodeURIComponent(state.room)}`);
      els.roomLabel.textContent = `Salle ${state.room}`;
      const snap = await get(roomRef());
      if (!snap.exists()) await initRoom();
      subscribe();
      els.joinView.classList.add("hidden");
      els.gameView.classList.remove("hidden");
    }

    async function initRoom() {
      const [left, right] = randomPair();
      await set(roomRef(), {
        round: 1,
        total: 0,
        phase: "clue",
        mode: "auto",
        targetValue: randomTarget(),
        guessValue: 90,
        clue: "",
        left,
        right,
        scores: [],
        masterStarts: "master"
      });
    }

    function subscribe() {
      onValue(roomRef(), snap => {
        state.data = snap.val();
        if (!state.data) return;
        render();
      });
    }

    function isCurrentMaster() {
      const odd = (state.data.round || 1) % 2 === 1;
      return (odd && state.role === "master") || (!odd && state.role === "guesser");
    }

    function render() {
      const d = state.data;
      const master = isCurrentMaster();
      const final = d.phase === "final";
      els.gameView.classList.toggle("hidden", final);
      els.finalView.classList.toggle("show", final);

      if (final) {
        els.finalScore.textContent = d.total || 0;
        els.finalText.textContent = (d.total || 0) > 15 ? "Vous êtes très compatibles ! ✨" : "Continuez à vous entraîner !";
        return;
      }

      drawTarget(d.targetValue || 90);
      setNeedle(d.guessValue ?? 90);
      els.needle.classList.toggle("locked", !master && d.phase !== "guess");
      els.roleLabel.textContent = master ? "Maître" : "Devin";
      els.roundLabel.textContent = `Manche ${d.round}/5`;
      els.totalLabel.textContent = `${d.total || 0} pts`;
      els.leftWord.textContent = d.left || "";
      els.rightWord.textContent = d.right || "";
      els.clueText.textContent = d.clue || (master ? "Écris un indice" : "En attente de l'indice");
      els.modeSelect.value = d.mode || "auto";

      const reveal = d.phase === "reveal";
      const hideTarget = !master && !reveal;
      els.cover.classList.toggle("open", !hideTarget);
      els.masterControls.classList.toggle("hidden", !master || d.phase !== "clue");
      els.guesserControls.classList.toggle("hidden", master || d.phase !== "guess");
      els.nextRound.classList.toggle("hidden", !reveal);
      els.gameHint.textContent = reveal
        ? `Score de la manche : ${d.lastScore || 0} pt${(d.lastScore || 0) > 1 ? "s" : ""}.`
        : master
          ? (d.phase === "guess" ? "Observe l'aiguille du Devin en direct." : "Place ton indice sur le spectre.")
          : (d.phase === "guess" ? "Déplace l'aiguille, puis valide." : "La cible est masquée pour toi.");

      els.leftInput.value = d.left || "";
      els.rightInput.value = d.right || "";
      renderScores(d.scores || []);
    }

    function renderScores(scores) {
      els.scoreStrip.innerHTML = "";
      for (let i = 0; i < 5; i++) {
        const box = document.createElement("div");
        box.className = "score-box" + (scores[i] !== undefined ? " done" : "");
        box.textContent = scores[i] !== undefined ? scores[i] : i + 1;
        els.scoreStrip.appendChild(box);
      }
    }

    function angleFromPointer(e) {
      const rect = els.wheelWrap.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height * .86;
      const dx = e.clientX - cx;
      const dy = e.clientY - cy;
      let angle = Math.atan2(dy, dx) * 180 / Math.PI + 180;
      angle = Math.max(0, Math.min(180, angle));
      return Math.round(angle);
    }

    async function sendGuess(angle, force = false) {
      const now = performance.now();
      if (!force && now - state.lastSend < 50) return;
      state.lastSend = now;
      setNeedle(angle);
      await update(roomRef(), { guessValue: angle });
    }

    els.joinMaster.onclick = () => createOrJoin("master");
    els.joinGuesser.onclick = () => createOrJoin("guesser");

    els.sendClue.onclick = async () => {
      const d = state.data;
      const manual = (d.mode || "auto") === "manual";
      const chosen = manual ? [els.leftInput.value.trim(), els.rightInput.value.trim()] : [d.left, d.right];
      const clue = els.clueInput.value.trim();
      if (!clue) return;
      await update(roomRef(), {
        left: chosen[0] || d.left,
        right: chosen[1] || d.right,
        clue,
        phase: "guess",
        guessValue: 90
      });
      els.clueInput.value = "";
    };

    els.lockGuess.onclick = async () => {
      const d = state.data;
      const s = score(d.targetValue, d.guessValue ?? 90);
      const scores = [...(d.scores || []), s];
      await update(roomRef(), {
        phase: "reveal",
        lastScore: s,
        total: (d.total || 0) + s,
        scores
      });
    };

    els.nextRound.onclick = async () => {
      const d = state.data;
      if (d.round >= 5) {
        await update(roomRef(), { phase: "final" });
        return;
      }
      const [left, right] = (d.mode || "auto") === "auto" ? randomPair() : [d.left, d.right];
      await update(roomRef(), {
        round: d.round + 1,
        phase: "clue",
        targetValue: randomTarget(),
        guessValue: 90,
        clue: "",
        left,
        right,
        lastScore: 0
      });
    };

    els.newGame.onclick = initRoom;
    els.settingsBtn.onclick = () => els.settingsModal.classList.add("show");
    els.closeSettings.onclick = async () => {
      els.settingsModal.classList.remove("show");
      if (state.data) await update(roomRef(), { mode: els.modeSelect.value });
    };

    els.wheelWrap.addEventListener("pointerdown", e => {
      if (!state.data || isCurrentMaster() || state.data.phase !== "guess") return;
      state.dragging = true;
      els.wheelWrap.setPointerCapture(e.pointerId);
      sendGuess(angleFromPointer(e), true);
    });

    els.wheelWrap.addEventListener("pointermove", e => {
      if (!state.dragging) return;
      sendGuess(angleFromPointer(e));
    });

    window.addEventListener("pointerup", e => {
      if (!state.dragging) return;
      state.dragging = false;
      sendGuess(angleFromPointer(e), true);
    });

    drawBase();
    setNeedle(90);
    if (state.room) els.roomInput.value = state.room;
  </script>
</body>
</html>
