<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#09090f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="DrawDuel" />
  <title>DrawDuel Mobile corrigé</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'ui-sans-serif', 'system-ui', 'Arial'] }
        }
      }
    };
  </script>
  <style>
    :root {
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --vh: 1vh;
      --panel: rgba(17, 24, 39, .76);
      --line: rgba(255,255,255,.12);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      min-height: 100%;
      overflow: hidden;
      overscroll-behavior: none;
      background: #09090f;
      color: #f9fafb;
      font-family: Inter, ui-sans-serif, system-ui, Arial, sans-serif;
      -webkit-text-size-adjust: 100%;
    }

    body {
      background:
        radial-gradient(circle at 15% 0%, rgba(34,211,238,.30), transparent 33%),
        radial-gradient(circle at 100% 100%, rgba(236,72,153,.23), transparent 33%),
        #09090f;
    }

    button, input, select {
      font: inherit;
      font-size: 16px;
      border: 0;
      outline: 0;
    }

    button {
      cursor: pointer;
      touch-action: manipulation;
      user-select: none;
    }

    #app {
      width: 100%;
      max-width: 430px;
      height: calc(var(--vh) * 100);
      min-height: 0;
      margin: 0 auto;
      padding: calc(10px + var(--safe-top)) 12px calc(10px + var(--safe-bottom));
      overflow: hidden;
    }

    .view {
      display: none;
      height: 100%;
      min-height: 0;
      overflow: hidden;
    }

    .view.active {
      display: grid;
    }

    .glass {
      background: var(--panel);
      border: 1px solid var(--line);
      box-shadow: 0 18px 55px rgba(0,0,0,.25);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .btn {
      min-height: 48px;
      border-radius: 16px;
      padding: 11px 14px;
      display: inline-grid;
      place-items: center;
      font-weight: 900;
      line-height: 1.05;
      color: white;
      transition: transform .12s ease, opacity .12s ease, filter .12s ease;
    }

    .btn:active { transform: scale(.97); }
    .btn:disabled { opacity: .45; filter: grayscale(.4); cursor: not-allowed; }
    .btn-primary { background: linear-gradient(135deg, #22d3ee, #6366f1, #ec4899); }
    .btn-dark { background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.12); }
    .btn-danger { background: linear-gradient(135deg, #fb7185, #ef4444); }
    .btn-good { background: linear-gradient(135deg, #34d399, #14b8a6); color: #061113; }

    input, select {
      width: 100%;
      min-height: 48px;
      border-radius: 16px;
      padding: 0 14px;
      color: white;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.15);
    }

    select option { color: #111827; }
    .hidden { display: none !important; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { scrollbar-width: none; -ms-overflow-style: none; }

    #view-home {
      grid-template-rows: auto minmax(0, 1fr) auto;
      gap: 10px;
    }

    .home-title {
      min-height: 0;
      overflow: hidden;
      display: grid;
      align-content: end;
      padding-top: 4px;
    }

    .home-card {
      align-self: end;
      min-height: 0;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      border-radius: 28px;
      padding: 14px;
      display: grid;
      gap: 10px;
    }

    #view-lobby {
      grid-template-rows: auto minmax(0, 1fr);
      gap: 10px;
    }

    #view-game {
      grid-template-rows: auto minmax(0, 1fr);
      gap: 8px;
    }

    #view-gallery {
      grid-template-rows: auto auto minmax(0, 1fr);
      gap: 8px;
    }

    .game-shell {
      min-height: 0;
      overflow: hidden;
      border-radius: 26px;
      padding: 9px;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 8px;
    }

    #phaseBanner {
      min-height: 36px;
      max-height: 54px;
      overflow: hidden;
      border-radius: 16px;
      padding: 8px 10px;
      display: grid;
      place-items: center;
      text-align: center;
      font-size: 12px;
      line-height: 1.2;
      background: rgba(255,255,255,.06);
      color: rgba(255,255,255,.76);
    }

    #choosePanel, #roundEndPanel {
      min-height: 0;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    #canvasPanel {
      min-height: 0;
      overflow: hidden;
      display: grid;
      grid-template-rows: minmax(0, 1fr) auto;
      gap: 7px;
    }

    body[data-status="guess"] #canvasPanel {
      grid-template-rows: minmax(0, 1fr);
    }

    .canvas-wrap {
      position: relative;
      min-height: 0;
      overflow: hidden;
      border-radius: 20px;
      background: white;
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
      background: #fff;
      border-radius: 20px;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }

    #canvasLock {
      position: absolute;
      inset: 0;
      z-index: 4;
      display: none;
      place-items: center;
      text-align: center;
      padding: 20px;
      border-radius: 20px;
      background: rgba(0,0,0,.45);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      pointer-events: none;
    }

    #canvasLock.show { display: grid; }

    #toolsPanel {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 7px;
      max-height: 142px;
    }

    #palette, #sizes {
      grid-column: 1 / -1;
      display: grid;
      gap: 5px;
    }

    #palette { grid-template-columns: repeat(10, minmax(0, 1fr)); }
    #sizes { grid-template-columns: repeat(4, minmax(0, 1fr)); }

    .color-dot, .size-dot {
      width: 100%;
      height: 31px;
      border-radius: 999px;
      border: 2px solid rgba(255,255,255,.18);
    }

    .color-dot.active, .size-dot.active {
      border-color: #fff;
      transform: scale(1.04);
    }

    .size-dot {
      display: grid;
      place-items: center;
      background: white;
    }

    .size-dot span {
      display: block;
      border-radius: 999px;
      background: #111827;
    }

    #guessPanel {
      min-height: 0;
      overflow: hidden;
      display: grid;
      grid-template-rows: auto auto minmax(24px, auto);
      gap: 8px;
    }

    body[data-status="guess"] .game-shell {
      grid-template-rows: auto minmax(0, .56fr) auto;
    }

    #maskedWord {
      font-size: clamp(1.1rem, 6vw, 1.85rem);
      line-height: 1.05;
      letter-spacing: .12em;
      overflow-wrap: anywhere;
    }

    .toast {
      position: fixed;
      left: max(14px, env(safe-area-inset-left));
      right: max(14px, env(safe-area-inset-right));
      bottom: calc(16px + var(--safe-bottom));
      z-index: 100;
      opacity: 0;
      transform: translateY(16px);
      pointer-events: none;
      transition: .2s ease;
      border-radius: 18px;
      padding: 12px 14px;
      font-size: 14px;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    @media (max-height: 700px) {
      #app { padding-left: 10px; padding-right: 10px; padding-top: calc(7px + var(--safe-top)); padding-bottom: calc(7px + var(--safe-bottom)); }
      .btn { min-height: 42px; padding: 8px 10px; border-radius: 14px; }
      input, select { min-height: 42px; border-radius: 14px; }
      .home-title p, .home-pill { display: none !important; }
      .home-title h1 { font-size: 2.45rem !important; }
      .home-card { padding: 10px; gap: 7px; }
      #phaseBanner { min-height: 31px; max-height: 42px; padding: 6px 8px; }
      .game-shell { padding: 7px; gap: 6px; }
      .color-dot, .size-dot { height: 27px; }
      #toolsPanel { gap: 5px; max-height: 128px; }
      #toolClear, #toolDone, #toolEraser { min-height: 36px !important; font-size: 11px; padding: 7px 5px; }
    }

    @media (max-height: 610px) {
      #view-home { grid-template-rows: minmax(0, 1fr) auto; }
      .home-title { display: none; }
      .home-card { align-self: stretch; }
      .game-header .label { display: none; }
      .game-header .glass { padding: 5px 7px !important; }
    }
  </style>
</head>
<body>
  <div id="app">
    <section id="view-home" class="view active">
      <div class="home-title">
        <div class="home-pill inline-flex w-max items-center gap-2 px-3 py-2 rounded-full glass text-xs text-cyan-100 mb-4">
          <span class="w-2 h-2 rounded-full bg-emerald-400"></span>
          Multiplayer Firebase
        </div>
        <h1 class="text-5xl font-black leading-[.88] tracking-tight">Draw<br><span class="text-transparent bg-clip-text bg-gradient-to-r from-cyan-300 via-indigo-300 to-pink-300">Duel</span></h1>
        <p class="mt-3 text-white/65 text-sm leading-snug">Pictionary mobile pour 2 joueurs, pensé iPhone.</p>
      </div>

      <div></div>

      <div class="home-card glass">
        <div id="statusLine" class="rounded-2xl bg-white/[.06] px-3 py-2 text-xs text-white/65 leading-snug">Prêt.</div>

        <div>
          <label class="text-[10px] uppercase tracking-widest text-white/45 ml-1">Pseudo</label>
          <input id="playerName" maxlength="18" placeholder="Ton pseudo" autocomplete="nickname" />
        </div>

        <button id="createRoomBtn" class="btn btn-primary w-full">Créer un salon</button>

        <div class="grid grid-cols-[1fr_62px] gap-2">
          <input id="joinCode" class="uppercase tracking-[.22em] text-center font-black" maxlength="5" placeholder="CODE" autocomplete="off" autocapitalize="characters" />
          <button id="joinRoomBtn" class="btn btn-dark">OK</button>
        </div>

        <div class="grid grid-cols-2 gap-2">
          <div>
            <label class="text-[10px] text-white/45 ml-1">Dessin</label>
            <select id="drawTimerSetting" class="mt-1">
              <option value="60">1 min</option>
              <option value="180" selected>3 min</option>
              <option value="0">Infini</option>
            </select>
          </div>
          <div>
            <label class="text-[10px] text-white/45 ml-1">Devinette</label>
            <select id="guessTimerSetting" class="mt-1">
              <option value="180">3 min</option>
              <option value="300" selected>5 min</option>
              <option value="600">10 min</option>
            </select>
          </div>
        </div>
      </div>
    </section>

    <section id="view-lobby" class="view">
      <header class="flex items-center justify-between gap-2">
        <button id="leaveBtn" class="btn btn-dark !min-h-0 !py-2 !px-4">Quitter</button>
        <div class="text-right min-w-0">
          <div class="text-[10px] text-white/45 uppercase tracking-widest">Salon</div>
          <div id="roomCodeLabel" class="text-2xl font-black tracking-[.18em]"></div>
        </div>
      </header>

      <main class="glass rounded-[28px] p-3 min-h-0 overflow-y-auto no-scrollbar grid content-start gap-3">
        <div class="rounded-[22px] bg-white/[.06] p-3">
          <div class="text-[10px] uppercase tracking-widest text-white/45 mb-2">Joueurs</div>
          <div id="playersList" class="grid gap-2"></div>
        </div>
        <p id="lobbyHint" class="text-sm text-white/65 leading-snug"></p>
        <button id="startGameBtn" class="btn btn-primary w-full self-end">Lancer la partie</button>
      </main>
    </section>

    <section id="view-game" class="view">
      <header class="game-header grid grid-cols-[1fr_auto_1fr] items-center gap-2">
        <div class="glass rounded-2xl px-3 py-2 min-w-0">
          <div class="label text-[10px] text-white/45 uppercase">Manche</div>
          <div id="roundLabel" class="font-black truncate">1/6</div>
        </div>
        <div class="glass rounded-2xl px-4 py-2 text-center">
          <div class="label text-[10px] text-white/45 uppercase">Timer</div>
          <div id="timerLabel" class="font-black tabular-nums">∞</div>
        </div>
        <div class="glass rounded-2xl px-3 py-2 text-right min-w-0">
          <div class="label text-[10px] text-white/45 uppercase">Score</div>
          <div id="scoreLabel" class="font-black truncate">0 - 0</div>
        </div>
      </header>

      <main class="game-shell glass">
        <div id="phaseBanner"></div>

        <div id="choosePanel" class="hidden min-h-0 grid content-center gap-3">
          <h2 class="text-2xl font-black text-center">Choisis ton mot</h2>
          <div id="wordChoices" class="grid gap-2"></div>
        </div>

        <div id="canvasPanel" class="hidden">
          <div class="canvas-wrap">
            <canvas id="drawCanvas" class="hidden"></canvas>
            <canvas id="watchCanvas" class="hidden"></canvas>
            <div id="canvasLock">
              <div>
                <div class="text-2xl font-black">À l’autre joueur</div>
                <p class="text-white/70 text-sm mt-1">Le dessinateur prépare son chef-d’œuvre.</p>
              </div>
            </div>
          </div>

          <div id="toolsPanel" class="hidden">
            <div id="palette"></div>
            <div id="sizes"></div>
            <button id="toolEraser" class="btn btn-dark">Gomme</button>
            <button id="toolClear" class="btn btn-danger">Effacer</button>
            <button id="toolDone" class="btn btn-good">Terminer</button>
          </div>
        </div>

        <div id="guessPanel" class="hidden">
          <div class="rounded-[20px] bg-white/[.06] p-3 text-center">
            <div class="text-[10px] uppercase tracking-widest text-white/45 mb-2">Mot à deviner</div>
            <div id="maskedWord" class="font-black"></div>
            <div id="attemptsLabel" class="mt-2 text-sm text-white/55">0/5 erreurs</div>
          </div>
          <div class="grid grid-cols-[1fr_62px] gap-2">
            <input id="guessInput" placeholder="Réponse" autocapitalize="none" autocomplete="off" />
            <button id="guessBtn" class="btn btn-primary">Go</button>
          </div>
          <div id="guessLog" class="text-sm text-white/60 min-h-[24px] overflow-hidden"></div>
        </div>

        <div id="roundEndPanel" class="hidden min-h-0 grid content-center text-center gap-3">
          <div class="text-5xl">🏁</div>
          <h2 id="roundEndTitle" class="text-2xl font-black"></h2>
          <p id="roundEndText" class="text-white/65"></p>
          <button id="nextRoundBtn" class="btn btn-primary">Manche suivante</button>
        </div>
      </main>
    </section>

    <section id="view-gallery" class="view">
      <header class="flex items-center justify-between gap-2">
        <div>
          <div class="text-[10px] text-white/45 uppercase tracking-widest">Final</div>
          <h2 class="text-3xl font-black">Galerie</h2>
        </div>
        <button id="newGameBtn" class="btn btn-dark !min-h-0 !py-2 !px-4">Accueil</button>
      </header>
      <div class="glass rounded-[24px] p-3">
        <div id="rankingBox" class="grid gap-2"></div>
      </div>
      <div id="galleryGrid" class="min-h-0 overflow-y-auto no-scrollbar grid grid-cols-2 gap-2 pb-2"></div>
    </section>
  </div>

  <div id="toast" class="toast glass"></div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js';
    import {
      getDatabase, ref, set, update, get, onValue, onChildAdded,
      push, serverTimestamp, remove, off
    } from 'https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js';

    const firebaseConfig = {
      apiKey: "AIzaSyDc2vXIRfWp2OCkcNrr13pme-x0kKbn3DM",
      authDomain: "mille-bornes-355ca.firebaseapp.com",
      databaseURL: "https://mille-bornes-355ca-default-rtdb.firebaseio.com",
      projectId: "mille-bornes-355ca",
      storageBucket: "mille-bornes-355ca.appspot.com",
      messagingSenderId: "1018160779227",
      appId: "1:1018160779227:web:e686d32f117dfef63261fe"
    };

    const FIREBASE_RULES_TO_TEST = `{
      "rules": {
        "rooms": {
          "$room": {
            ".read": true,
            ".write": true
          }
        }
      }
    }`;

    const WORDS = {
      easy: ['chat','chien','soleil','lune','maison','arbre','fleur','pomme','vélo','voiture','bateau','avion','livre','chaise','table','lit','porte','clé','cœur','étoile','nuage','pluie','feu','main','nez','œil','ballon','pizza','glace','oiseau','poisson','lampe','robot','train','bus','montagne','plage','banane','fraise','chapeau','lunettes','téléphone','ordinateur'],
      medium: ['astronaute','volcan','dinosaure','parapluie','bibliothèque','caméléon','hélicoptère','labyrinthe','sirène','phare','pirate','cascade','détective','jongleur','squelette','tornade','méduse','fusée','kangourou','accordéon','boussole','camping','coccinelle','écureuil','guitare','igloo','licorne','tambour','xylophone','aquarium','grenouille'],
      hard: ['impressionnisme','paradoxe','microscope','constellation','montgolfière','architecte','météorite','équilibriste','sous-marin','illusion optique','machine à remonter le temps','énergie solaire','trou noir','station spatiale','archéologue','écosystème','gravitation','hiéroglyphe','kaléidoscope','nébuleuse','perspective','radiographie','symétrie','vortex','biodiversité','cryptographie','métamorphose','nanotechnologie','océanographie','psychologie','quantique']
    };

    const CONFIG = {
      totalRounds: 6,
      maxAttempts: 5,
      colors: ['#111827','#ef4444','#f97316','#facc15','#22c55e','#14b8a6','#06b6d4','#3b82f6','#8b5cf6','#ec4899'],
      sizes: [4, 8, 14, 22],
      canvasMaxDataUrl: 900000
    };

    const $ = id => document.getElementById(id);
    const els = {
      app: $('app'),
      toast: $('toast'),
      statusLine: $('statusLine'),
      playerName: $('playerName'), joinCode: $('joinCode'), createRoomBtn: $('createRoomBtn'), joinRoomBtn: $('joinRoomBtn'),
      drawTimerSetting: $('drawTimerSetting'), guessTimerSetting: $('guessTimerSetting'), leaveBtn: $('leaveBtn'), roomCodeLabel: $('roomCodeLabel'),
      playersList: $('playersList'), lobbyHint: $('lobbyHint'), startGameBtn: $('startGameBtn'), roundLabel: $('roundLabel'), timerLabel: $('timerLabel'), scoreLabel: $('scoreLabel'),
      phaseBanner: $('phaseBanner'), choosePanel: $('choosePanel'), wordChoices: $('wordChoices'), canvasPanel: $('canvasPanel'), drawCanvas: $('drawCanvas'), watchCanvas: $('watchCanvas'), canvasLock: $('canvasLock'),
      toolsPanel: $('toolsPanel'), palette: $('palette'), sizes: $('sizes'), toolEraser: $('toolEraser'), toolClear: $('toolClear'), toolDone: $('toolDone'),
      guessPanel: $('guessPanel'), maskedWord: $('maskedWord'), attemptsLabel: $('attemptsLabel'), guessInput: $('guessInput'), guessBtn: $('guessBtn'), guessLog: $('guessLog'),
      roundEndPanel: $('roundEndPanel'), roundEndTitle: $('roundEndTitle'), roundEndText: $('roundEndText'), nextRoundBtn: $('nextRoundBtn'),
      rankingBox: $('rankingBox'), galleryGrid: $('galleryGrid'), newGameBtn: $('newGameBtn')
    };

    const state = {
      playerId: getStablePlayerId(),
      roomCode: null,
      room: null,
      unsub: [],
      childUnsub: [],
      selectedColor: CONFIG.colors[0],
      selectedSize: CONFIG.sizes[1],
      eraser: false,
      drawing: false,
      lastPoint: null,
      segments: [],
      ctx: null,
      watchCtx: null,
      timerInterval: null,
      db: null,
      firebaseReady: false
    };

    setAppHeight();
    window.addEventListener('resize', setAppHeight, { passive: true });
    window.addEventListener('orientationchange', () => setTimeout(() => { setAppHeight(); resizeCanvases(true); }, 250), { passive: true });

    function setAppHeight() {
      document.documentElement.style.setProperty('--vh', `${window.innerHeight * 0.01}px`);
    }

    function getStablePlayerId() {
      const saved = localStorage.getItem('drawduel_pid');
      if (saved) return saved;
      let id;
      if (window.crypto && typeof window.crypto.randomUUID === 'function') {
        id = window.crypto.randomUUID();
      } else {
        id = 'p_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 12);
      }
      localStorage.setItem('drawduel_pid', id);
      return id;
    }

    function initFirebase() {
      try {
        if (!firebaseConfig.apiKey || !firebaseConfig.databaseURL) throw new Error('Config Firebase incomplète.');
        const app = initializeApp(firebaseConfig);
        state.db = getDatabase(app);
        state.firebaseReady = true;
        setStatus('Firebase initialisé. Tu peux créer ou rejoindre un salon.');
      } catch (err) {
        console.error(err);
        state.firebaseReady = false;
        setStatus('Firebase ne démarre pas : vérifie firebaseConfig.', true);
      }
    }

    function setStatus(message, danger = false) {
      els.statusLine.textContent = message;
      els.statusLine.classList.toggle('text-rose-200', danger);
    }

    function showToast(message) {
      els.toast.textContent = message;
      els.toast.classList.add('show');
      clearTimeout(showToast.t);
      showToast.t = setTimeout(() => els.toast.classList.remove('show'), 2800);
    }

    function showError(prefix, err) {
      console.error(prefix, err);
      const code = err && err.code ? String(err.code) : '';
      if (code.includes('permission-denied')) {
        const msg = 'Firebase refuse l’accès. Mets les règles de test Realtime Database en lecture/écriture sur rooms.';
        setStatus(msg, true);
        showToast(msg);
        console.info('Règles de test à coller dans Realtime Database > Rules :', FIREBASE_RULES_TO_TEST);
        return;
      }
      const msg = `${prefix} ${err?.message || 'Erreur inconnue'}`;
      setStatus(msg, true);
      showToast(msg);
    }

    function safeName() {
      return (els.playerName.value || localStorage.getItem('drawduel_name') || 'Joueur').trim().slice(0, 18) || 'Joueur';
    }

    function showView(name) {
      ['home','lobby','game','gallery'].forEach(v => $('view-' + v).classList.toggle('active', v === name));
      requestAnimationFrame(() => resizeCanvases(true));
    }

    function code() {
      const alphabet = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
      return Array.from({ length: 5 }, () => alphabet[Math.floor(Math.random() * alphabet.length)]).join('');
    }

    function roomRef(path = '') {
      if (!state.db || !state.roomCode) throw new Error('Salon non initialisé.');
      return ref(state.db, `rooms/${state.roomCode}${path ? '/' + path : ''}`);
    }

    function playerList(room = state.room) {
      return Object.entries(room?.players || {}).sort((a,b) => (a[1].joinedAt || 0) - (b[1].joinedAt || 0));
    }

    function myPlayer() { return state.room?.players?.[state.playerId]; }
    function isHost() { return myPlayer()?.host === true; }
    function now() { return Date.now(); }
    function deadline(seconds) { return seconds > 0 ? now() + seconds * 1000 : 0; }

    function currentArtistId(room = state.room) {
      const players = playerList(room).map(([id]) => id);
      if (!players.length) return null;
      return players[(Math.max(1, room?.round || 1) - 1) % players.length];
    }

    function isArtist() { return currentArtistId() === state.playerId; }
    function playerNameById(id) { return state.room?.players?.[id]?.name || 'Joueur'; }
    function scoreOf(id) { return Number(state.room?.scores?.[id] || 0); }

    function formatTime(sec) {
      if (!sec || sec <= 0) return '∞';
      const m = Math.floor(sec / 60).toString().padStart(2, '0');
      const s = Math.floor(sec % 60).toString().padStart(2, '0');
      return `${m}:${s}`;
    }

    async function createRoom() {
      if (!state.firebaseReady) return showToast('Firebase n’est pas initialisé.');
      els.createRoomBtn.disabled = true;
      setStatus('Création du salon...');
      try {
        localStorage.setItem('drawduel_name', safeName());
        let room = code();
        let free = false;
        for (let i = 0; i < 12; i++) {
          const snap = await get(ref(state.db, `rooms/${room}`));
          if (!snap.exists()) { free = true; break; }
          room = code();
        }
        if (!free) throw new Error('Impossible de trouver un code libre.');

        state.roomCode = room;
        await set(ref(state.db, `rooms/${room}`), {
          createdAt: serverTimestamp(),
          hostId: state.playerId,
          status: 'lobby',
          round: 1,
          totalRounds: CONFIG.totalRounds,
          settings: {
            drawTimer: Number(els.drawTimerSetting.value),
            guessTimer: Number(els.guessTimerSetting.value)
          },
          players: {
            [state.playerId]: { name: safeName(), host: true, joinedAt: now() }
          },
          scores: { [state.playerId]: 0 },
          gallery: {},
          votes: {}
        });

        attachRoom(room);
        showView('lobby');
        showToast('Salon créé');
      } catch (err) {
        state.roomCode = null;
        showError('Création impossible.', err);
      } finally {
        els.createRoomBtn.disabled = false;
      }
    }

    async function joinRoom() {
      if (!state.firebaseReady) return showToast('Firebase n’est pas initialisé.');
      els.joinRoomBtn.disabled = true;
      setStatus('Connexion au salon...');
      try {
        localStorage.setItem('drawduel_name', safeName());
        const room = els.joinCode.value.trim().toUpperCase().replace(/[^A-Z0-9]/g, '').slice(0, 5);
        if (room.length !== 5) throw new Error('Entre le code à 5 caractères.');

        const snap = await get(ref(state.db, `rooms/${room}`));
        if (!snap.exists()) throw new Error('Salon introuvable.');

        const data = snap.val();
        const alreadyIn = Boolean(data.players?.[state.playerId]);
        const count = Object.keys(data.players || {}).length;
        if (count >= 2 && !alreadyIn) throw new Error('Salon déjà complet.');

        state.roomCode = room;
        await update(ref(state.db, `rooms/${room}`), {
          [`players/${state.playerId}`]: { name: safeName(), host: false, joinedAt: alreadyIn ? data.players[state.playerId].joinedAt : now() },
          [`scores/${state.playerId}`]: data.scores?.[state.playerId] || 0
        });

        attachRoom(room);
        showView('lobby');
        showToast('Salon rejoint');
      } catch (err) {
        showError('Connexion impossible.', err);
      } finally {
        els.joinRoomBtn.disabled = false;
      }
    }

    function attachRoom(room) {
      detachRoom(false);
      state.roomCode = room;
      els.roomCodeLabel.textContent = room;
      const mainRef = ref(state.db, `rooms/${room}`);
      const cb = snap => {
        state.room = snap.val();
        if (!state.room) {
          detachRoom(false);
          showView('home');
          showToast('Salon fermé');
          return;
        }
        render();
      };
      onValue(mainRef, cb, err => showError('Lecture du salon impossible.', err));
      state.unsub.push(() => off(mainRef, 'value', cb));
    }

    function detachRoom(clearCode = true) {
      state.unsub.forEach(fn => fn());
      state.childUnsub.forEach(fn => fn());
      state.unsub = [];
      state.childUnsub = [];
      clearInterval(state.timerInterval);
      state.timerInterval = null;
      state.room = null;
      state.segments = [];
      state.strokesKey = null;
      if (clearCode) state.roomCode = null;
    }

    async function leaveRoom() {
      if (!state.roomCode || !state.room) {
        detachRoom();
        showView('home');
        return;
      }
      try {
        const players = Object.keys(state.room.players || {});
        if (players.length <= 1 || isHost()) {
          await remove(roomRef());
        } else {
          await remove(roomRef(`players/${state.playerId}`));
        }
      } catch (err) {
        showError('Impossible de quitter proprement.', err);
      }
      detachRoom();
      showView('home');
    }

    function pickWord(difficulty) {
      const arr = WORDS[difficulty];
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function makeChoices() {
      return [
        { difficulty: 'easy', label: 'Facile', points: 1, word: pickWord('easy') },
        { difficulty: 'medium', label: 'Moyen', points: 2, word: pickWord('medium') },
        { difficulty: 'hard', label: 'Difficile', points: 3, word: pickWord('hard') }
      ];
    }

    async function startGame() {
      if (!isHost()) return;
      if (playerList().length !== 2) return showToast('Il faut exactement 2 joueurs.');
      try {
        await update(roomRef(), {
          status: 'choose',
          round: 1,
          choices: makeChoices(),
          activeWord: null,
          attempts: {},
          revealed: [],
          roundWinner: null,
          phaseStartedAt: now(),
          phaseDeadline: 0,
          strokes: null,
          clearSignal: now()
        });
      } catch (err) {
        showError('Lancement impossible.', err);
      }
    }

    async function chooseWord(choice) {
      if (!isArtist()) return;
      try {
        await update(roomRef(), {
          status: 'draw',
          activeWord: choice,
          attempts: {},
          revealed: [],
          roundWinner: null,
          phaseStartedAt: now(),
          phaseDeadline: deadline(Number(state.room.settings?.drawTimer || 0)),
          strokes: null,
          clearSignal: now()
        });
        resetCanvas(true);
      } catch (err) {
        showError('Choix du mot impossible.', err);
      }
    }

    function normalizeText(str) {
      return (str || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/[^a-z0-9]/g, '');
    }

    async function submitGuess() {
      if (isArtist()) return;
      const guess = els.guessInput.value.trim();
      if (!guess) return;
      els.guessInput.value = '';
      const word = state.room?.activeWord?.word || '';
      try {
        if (normalizeText(guess) === normalizeText(word)) {
          await winRound();
          return;
        }

        const attempts = Number(state.room?.attempts?.[state.playerId] || 0) + 1;
        const updates = { [`attempts/${state.playerId}`]: attempts };
        const revealed = [...(state.room?.revealed || [])];

        if ((attempts === 2 || attempts === 3) && revealed.length < 2) {
          const idx = randomHiddenIndex(word, revealed);
          if (idx !== null) revealed.push(idx);
          updates.revealed = revealed;
        }

        if (attempts >= CONFIG.maxAttempts) {
          updates.status = 'roundEnd';
          updates.roundWinner = 'artist';
          updates.roundEndedAt = now();
        }

        await update(roomRef(), updates);
      } catch (err) {
        showError('Réponse impossible.', err);
      }
    }

    function randomHiddenIndex(word, revealed) {
      const candidates = [...word].map((ch, i) => /[a-zA-ZÀ-ÿ0-9]/.test(ch) && !revealed.includes(i) ? i : null).filter(v => v !== null);
      return candidates.length ? candidates[Math.floor(Math.random() * candidates.length)] : null;
    }

    async function winRound() {
      const points = Number(state.room.activeWord?.points || 1);
      const artist = currentArtistId();
      const guesser = state.playerId;
      await update(roomRef(), {
        status: 'roundEnd',
        roundWinner: guesser,
        roundEndedAt: now(),
        [`scores/${guesser}`]: scoreOf(guesser) + points,
        [`scores/${artist}`]: scoreOf(artist) + Math.max(1, Math.floor(points / 2))
      });
    }

    async function finishDrawing() {
      if (!isArtist()) return;
      try {
        await saveCurrentDrawing();
        await update(roomRef(), {
          status: 'guess',
          phaseStartedAt: now(),
          phaseDeadline: deadline(Number(state.room.settings?.guessTimer || 300)),
          attempts: {},
          revealed: []
        });
      } catch (err) {
        showError('Impossible de terminer le dessin.', err);
      }
    }

    async function nextRound() {
      if (!isHost()) return;
      try {
        const round = Number(state.room.round || 1);
        if (round >= CONFIG.totalRounds) {
          await update(roomRef(), { status: 'gameOver', phaseStartedAt: now() });
          return;
        }
        await update(roomRef(), {
          status: 'choose',
          round: round + 1,
          choices: makeChoices(),
          activeWord: null,
          attempts: {},
          revealed: [],
          roundWinner: null,
          phaseStartedAt: now(),
          phaseDeadline: 0,
          strokes: null,
          clearSignal: now()
        });
      } catch (err) {
        showError('Manche suivante impossible.', err);
      }
    }

    async function saveCurrentDrawing() {
      const canvas = isArtist() ? els.drawCanvas : els.watchCanvas;
      const dataUrl = shrinkCanvasDataUrl(canvas);
      const roundKey = String(state.room.round || 1);
      await update(roomRef(`gallery/${roundKey}`), {
        dataUrl,
        word: state.room.activeWord?.word || '',
        difficulty: state.room.activeWord?.label || '',
        points: state.room.activeWord?.points || 1,
        artistId: currentArtistId(),
        artistName: playerNameById(currentArtistId()),
        createdAt: now()
      });
    }

    function shrinkCanvasDataUrl(canvas) {
      const out = document.createElement('canvas');
      const maxW = 900;
      const scale = Math.min(1, maxW / Math.max(1, canvas.width));
      out.width = Math.max(1, Math.round(canvas.width * scale));
      out.height = Math.max(1, Math.round(canvas.height * scale));
      const ctx = out.getContext('2d');
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, out.width, out.height);
      ctx.drawImage(canvas, 0, 0, out.width, out.height);
      let q = .9;
      let url = out.toDataURL('image/jpeg', q);
      while (url.length > CONFIG.canvasMaxDataUrl && q > .45) {
        q -= .1;
        url = out.toDataURL('image/jpeg', q);
      }
      return url;
    }

    function render() {
      const room = state.room;
      if (!room) return;
      if (room.status === 'lobby') showView('lobby');
      if (['choose','draw','guess','roundEnd'].includes(room.status)) showView('game');
      if (room.status === 'gameOver') showView('gallery');
      renderLobby();
      renderGame();
      renderGallery();
      syncTimerGuard();
    }

    function renderLobby() {
      if (!state.room) return;
      els.roomCodeLabel.textContent = state.roomCode || '';
      const players = playerList();
      els.playersList.innerHTML = players.map(([id, p], idx) => `
        <div class="flex items-center justify-between rounded-2xl bg-white/[.06] px-3 py-3 gap-2">
          <div class="flex items-center gap-3 min-w-0">
            <div class="w-9 h-9 shrink-0 rounded-full grid place-items-center font-black ${idx === 0 ? 'bg-cyan-400 text-slate-950' : 'bg-pink-400 text-slate-950'}">${idx + 1}</div>
            <div class="min-w-0">
              <div class="font-black truncate">${escapeHtml(p.name || 'Joueur')}</div>
              <div class="text-xs text-white/45">${p.host ? 'Hôte' : 'Invité'}${id === state.playerId ? ' • toi' : ''}</div>
            </div>
          </div>
          <div class="text-xl font-black">${scoreOf(id)}</div>
        </div>
      `).join('');
      els.lobbyHint.textContent = players.length < 2 ? 'Partage ce code avec ton adversaire. Dès que vous êtes deux, l’hôte peut lancer.' : 'Les deux joueurs sont là. L’hôte peut lancer la partie.';
      els.startGameBtn.disabled = !isHost() || players.length !== 2;
      els.startGameBtn.textContent = isHost() ? 'Lancer la partie' : 'En attente de l’hôte';
    }

    function renderGame() {
      document.body.dataset.status = state.room?.status || '';
      if (!state.room || state.room.status === 'lobby' || state.room.status === 'gameOver') return;

      const room = state.room;
      const players = playerList();
      const artistId = currentArtistId();
      const artistName = playerNameById(artistId);
      const meArtist = artistId === state.playerId;
      const word = room.activeWord?.word || '';

      els.roundLabel.textContent = `${room.round || 1}/${CONFIG.totalRounds}`;
      els.scoreLabel.textContent = players.map(([id]) => scoreOf(id)).join(' - ');
      hidePanels();

      if (room.status === 'choose') {
        els.choosePanel.classList.remove('hidden');
        els.phaseBanner.textContent = meArtist ? 'Tu dessines cette manche. Choisis un mot.' : `${artistName} choisit un mot.`;
        renderChoices(meArtist);
      }

      if (room.status === 'draw') {
        els.canvasPanel.classList.remove('hidden');
        els.phaseBanner.textContent = meArtist ? `Tu dessines : ${word}` : `${artistName} dessine en direct.`;
        setupCanvasMode(meArtist);
        attachStrokesListener();
      }

      if (room.status === 'guess') {
        els.canvasPanel.classList.remove('hidden');
        els.guessPanel.classList.remove('hidden');
        els.phaseBanner.textContent = meArtist ? 'Ton dessin est visible. L’autre joueur devine.' : 'Devine le mot en 5 tentatives maximum.';
        setupCanvasMode(false);
        attachStrokesListener();
        renderMaskedWord();
        const attempts = Number(room.attempts?.[state.playerId] || 0);
        els.attemptsLabel.textContent = `${attempts}/${CONFIG.maxAttempts} erreurs`;
        els.guessInput.disabled = meArtist;
        els.guessBtn.disabled = meArtist;
      }

      if (room.status === 'roundEnd') {
        els.roundEndPanel.classList.remove('hidden');
        const guessed = room.roundWinner && room.roundWinner !== 'artist';
        els.roundEndTitle.textContent = guessed ? 'Mot trouvé !' : 'Fin de manche';
        els.roundEndText.textContent = guessed ? `${playerNameById(room.roundWinner)} a trouvé « ${word} ».` : `Personne n’a trouvé « ${word} ».`;
        els.nextRoundBtn.disabled = !isHost();
        els.nextRoundBtn.textContent = isHost() ? (room.round >= CONFIG.totalRounds ? 'Voir la galerie' : 'Manche suivante') : 'En attente de l’hôte';
      }

      renderTimer();
    }

    function hidePanels() {
      [els.choosePanel, els.canvasPanel, els.guessPanel, els.roundEndPanel].forEach(el => el.classList.add('hidden'));
    }

    function renderChoices(enabled) {
      const choices = state.room.choices || [];
      els.wordChoices.innerHTML = choices.map((c, i) => `
        <button data-choice="${i}" class="btn btn-dark w-full text-left ${enabled ? '' : 'opacity-50'}" ${enabled ? '' : 'disabled'}>
          <div class="w-full flex items-center justify-between gap-2">
            <span class="text-xl font-black truncate">${escapeHtml(c.word)}</span>
            <span class="rounded-full px-3 py-1 text-xs font-black bg-white/10 shrink-0">${c.points} pt${c.points > 1 ? 's' : ''}</span>
          </div>
          <div class="w-full text-sm text-white/50 mt-1">${escapeHtml(c.label)}</div>
        </button>
      `).join('');

      els.wordChoices.querySelectorAll('[data-choice]').forEach(btn => {
        btn.addEventListener('click', () => chooseWord(choices[Number(btn.dataset.choice)]));
      });
    }

    function renderMaskedWord() {
      const word = state.room.activeWord?.word || '';
      const revealed = state.room.revealed || [];
      els.maskedWord.textContent = [...word].map((ch, i) => {
        if (!/[a-zA-ZÀ-ÿ0-9]/.test(ch)) return ch;
        return revealed.includes(i) ? ch.toUpperCase() : '_';
      }).join(' ');
    }

    function renderTimer() {
      const deadlineMs = Number(state.room?.phaseDeadline || 0);
      if (!deadlineMs) {
        els.timerLabel.textContent = '∞';
        return;
      }
      const remain = Math.max(0, Math.ceil((deadlineMs - now()) / 1000));
      els.timerLabel.textContent = formatTime(remain);
    }

    function syncTimerGuard() {
      if (state.timerInterval) return;
      state.timerInterval = setInterval(async () => {
        if (!state.room) return;
        renderTimer();
        const deadlineMs = Number(state.room.phaseDeadline || 0);
        if (!deadlineMs || now() < deadlineMs || !isHost()) return;
        try {
          if (state.room.status === 'draw') {
            if (isArtist()) await saveCurrentDrawing();
            await update(roomRef(), {
              status: 'guess',
              phaseStartedAt: now(),
              phaseDeadline: deadline(Number(state.room.settings?.guessTimer || 300)),
              attempts: {},
              revealed: []
            });
          } else if (state.room.status === 'guess') {
            await update(roomRef(), { status: 'roundEnd', roundWinner: 'artist', roundEndedAt: now() });
          }
        } catch (err) {
          showError('Timer impossible.', err);
        }
      }, 500);
    }

    function setupCanvasMode(canDraw) {
      resizeCanvases(true);
      els.drawCanvas.classList.toggle('hidden', !canDraw);
      els.watchCanvas.classList.toggle('hidden', canDraw);
      els.toolsPanel.classList.toggle('hidden', !canDraw);
      els.canvasLock.classList.toggle('show', state.room.status === 'draw' && !canDraw);
      if (canDraw) initDrawEvents();
    }

    function resizeCanvases(replay = false) {
      [els.drawCanvas, els.watchCanvas].forEach(canvas => {
        const rect = canvas.getBoundingClientRect();
        if (!rect.width || !rect.height) return;
        const ratio = Math.max(window.devicePixelRatio || 1, 1);
        const w = Math.max(240, Math.round(rect.width * ratio));
        const h = Math.max(240, Math.round(rect.height * ratio));
        if (canvas.width !== w || canvas.height !== h) {
          canvas.width = w;
          canvas.height = h;
          fillWhite(canvas.getContext('2d'));
        }
      });
      state.ctx = els.drawCanvas.getContext('2d');
      state.watchCtx = els.watchCanvas.getContext('2d');
      if (replay) replaySegments();
    }

    function fillWhite(ctx) {
      if (!ctx) return;
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, ctx.canvas.width, ctx.canvas.height);
    }

    function resetCanvas(emit = false) {
      state.segments = [];
      resizeCanvases(false);
      fillWhite(state.ctx);
      fillWhite(state.watchCtx);
      if (emit && state.roomCode) update(roomRef(), { strokes: null, clearSignal: now() }).catch(err => showError('Effacement impossible.', err));
    }

    let drawEventsReady = false;
    function initDrawEvents() {
      if (drawEventsReady) return;
      drawEventsReady = true;
      const canvas = els.drawCanvas;
      canvas.addEventListener('pointerdown', startStroke, { passive: false });
      canvas.addEventListener('pointermove', moveStroke, { passive: false });
      canvas.addEventListener('pointerup', endStroke, { passive: false });
      canvas.addEventListener('pointercancel', endStroke, { passive: false });
      canvas.addEventListener('touchstart', e => e.preventDefault(), { passive: false });
      canvas.addEventListener('touchmove', e => e.preventDefault(), { passive: false });
    }

    function pointFromEvent(e) {
      const rect = els.drawCanvas.getBoundingClientRect();
      return {
        x: clamp((e.clientX - rect.left) / Math.max(1, rect.width), 0, 1),
        y: clamp((e.clientY - rect.top) / Math.max(1, rect.height), 0, 1)
      };
    }

    function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

    function startStroke(e) {
      if (!isArtist() || state.room?.status !== 'draw') return;
      e.preventDefault();
      state.drawing = true;
      state.lastPoint = pointFromEvent(e);
      els.drawCanvas.setPointerCapture?.(e.pointerId);
    }

    function moveStroke(e) {
      if (!state.drawing || !state.lastPoint) return;
      e.preventDefault();
      const to = pointFromEvent(e);
      const segment = {
        from: state.lastPoint,
        to,
        color: state.eraser ? '#ffffff' : state.selectedColor,
        size: state.eraser ? state.selectedSize * 2.2 : state.selectedSize,
        t: now()
      };
      state.segments.push(segment);
      drawSegment(state.ctx, segment);
      push(roomRef('strokes'), segment).catch(err => showError('Envoi du trait impossible.', err));
      state.lastPoint = to;
    }

    function endStroke() {
      state.drawing = false;
      state.lastPoint = null;
    }

    function drawSegment(ctx, s) {
      if (!ctx || !s?.from || !s?.to) return;
      const w = ctx.canvas.width;
      const h = ctx.canvas.height;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.strokeStyle = s.color;
      ctx.lineWidth = Math.max(1, s.size * Math.max(w, h) / 430);
      ctx.beginPath();
      ctx.moveTo(s.from.x * w, s.from.y * h);
      ctx.lineTo(s.to.x * w, s.to.y * h);
      ctx.stroke();
    }

    function replaySegments() {
      fillWhite(state.ctx);
      fillWhite(state.watchCtx);
      for (const segment of state.segments) {
        drawSegment(state.ctx, segment);
        drawSegment(state.watchCtx, segment);
      }
    }

    function attachStrokesListener() {
      const key = `${state.roomCode}:${state.room?.round || 1}`;
      if (state.strokesKey === key) return;

      state.childUnsub.forEach(fn => fn());
      state.childUnsub = [];
      state.strokesKey = key;
      resetCanvas(false);

      const strokesRef = roomRef('strokes');
      const cb = snap => {
        const segment = snap.val();
        state.segments.push(segment);
        drawSegment(state.watchCtx, segment);
        if (!isArtist()) drawSegment(state.ctx, segment);
      };
      onChildAdded(strokesRef, cb);
      state.childUnsub.push(() => off(strokesRef, 'child_added', cb));

      const clearRef = roomRef('clearSignal');
      const clearCb = () => resetCanvas(false);
      onValue(clearRef, clearCb);
      state.childUnsub.push(() => off(clearRef, 'value', clearCb));
    }

    function buildTools() {
      els.palette.innerHTML = CONFIG.colors.map(c => `<button class="color-dot" data-color="${c}" style="background:${c}" aria-label="Couleur ${c}"></button>`).join('');
      els.palette.querySelectorAll('[data-color]').forEach(btn => {
        btn.addEventListener('click', () => {
          state.selectedColor = btn.dataset.color;
          state.eraser = false;
          updateToolState();
        });
      });

      els.sizes.innerHTML = CONFIG.sizes.map(s => `<button class="size-dot" data-size="${s}" aria-label="Taille ${s}"><span style="width:${Math.min(s,18)}px;height:${Math.min(s,18)}px"></span></button>`).join('');
      els.sizes.querySelectorAll('[data-size]').forEach(btn => {
        btn.addEventListener('click', () => {
          state.selectedSize = Number(btn.dataset.size);
          updateToolState();
        });
      });
      updateToolState();
    }

    function updateToolState() {
      els.palette.querySelectorAll('[data-color]').forEach(btn => btn.classList.toggle('active', btn.dataset.color === state.selectedColor && !state.eraser));
      els.sizes.querySelectorAll('[data-size]').forEach(btn => btn.classList.toggle('active', Number(btn.dataset.size) === state.selectedSize));
      els.toolEraser.classList.toggle('ring-2', state.eraser);
      els.toolEraser.classList.toggle('ring-white', state.eraser);
    }

    function renderGallery() {
      if (!state.room || state.room.status !== 'gameOver') return;
      const players = playerList();
      const sorted = [...players].sort((a,b) => scoreOf(b[0]) - scoreOf(a[0]));
      els.rankingBox.innerHTML = sorted.map(([id, p], idx) => `
        <div class="flex items-center justify-between rounded-2xl bg-white/[.06] px-3 py-3 gap-2">
          <div class="flex items-center gap-3 min-w-0">
            <div class="w-9 h-9 shrink-0 rounded-full grid place-items-center font-black ${idx === 0 ? 'bg-yellow-300 text-slate-950' : 'bg-white/10'}">${idx + 1}</div>
            <div class="font-black truncate">${escapeHtml(p.name || 'Joueur')}${id === state.playerId ? ' <span class="text-white/40 text-xs">toi</span>' : ''}</div>
          </div>
          <div class="text-2xl font-black">${scoreOf(id)}</div>
        </div>
      `).join('');

      const gallery = Object.entries(state.room.gallery || {}).sort((a,b) => Number(a[0]) - Number(b[0]));
      els.galleryGrid.innerHTML = gallery.map(([round, item]) => {
        const votes = state.room.votes || {};
        const voteCount = Object.values(votes).filter(v => String(v) === String(round)).length;
        const voted = String(votes[state.playerId] || '') === String(round);
        return `
          <article class="glass rounded-[22px] p-2 overflow-hidden">
            <img src="${item.dataUrl}" alt="Dessin manche ${round}" class="w-full aspect-square object-cover rounded-[16px] bg-white" />
            <div class="p-2">
              <div class="text-xs text-white/45">Manche ${round} • ${escapeHtml(item.difficulty || '')}</div>
              <div class="font-black truncate">${escapeHtml(item.word || '')}</div>
              <div class="text-xs text-white/50 truncate">par ${escapeHtml(item.artistName || 'Joueur')}</div>
              <button data-vote="${round}" class="btn btn-dark w-full !min-h-0 !py-2 !px-2 text-xs mt-2 ${voted ? 'ring-2 ring-yellow-300' : ''}">🏆 ${voteCount}</button>
            </div>
          </article>
        `;
      }).join('');

      els.galleryGrid.querySelectorAll('[data-vote]').forEach(btn => btn.addEventListener('click', () => voteFor(btn.dataset.vote)));
    }

    async function voteFor(round) {
      try {
        await update(roomRef('votes'), { [state.playerId]: String(round) });
        showToast('Vote enregistré');
      } catch (err) {
        showError('Vote impossible.', err);
      }
    }

    function escapeHtml(str) {
      return String(str).replace(/[&<>'"]/g, ch => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', "'":'&#39;', '"':'&quot;' }[ch]));
    }

    els.createRoomBtn.addEventListener('click', createRoom);
    els.joinRoomBtn.addEventListener('click', joinRoom);
    els.joinCode.addEventListener('input', () => {
      els.joinCode.value = els.joinCode.value.toUpperCase().replace(/[^A-Z0-9]/g, '').slice(0, 5);
    });
    els.leaveBtn.addEventListener('click', leaveRoom);
    els.startGameBtn.addEventListener('click', startGame);
    els.toolEraser.addEventListener('click', () => { state.eraser = !state.eraser; updateToolState(); });
    els.toolClear.addEventListener('click', () => resetCanvas(true));
    els.toolDone.addEventListener('click', finishDrawing);
    els.guessBtn.addEventListener('click', submitGuess);
    els.guessInput.addEventListener('keydown', e => { if (e.key === 'Enter') submitGuess(); });
    els.nextRoundBtn.addEventListener('click', nextRound);
    els.newGameBtn.addEventListener('click', () => { detachRoom(); showView('home'); });

    els.playerName.value = localStorage.getItem('drawduel_name') || '';
    buildTools();
    initFirebase();
    setTimeout(() => resizeCanvases(true), 250);
  </script>
</body>
</html>
