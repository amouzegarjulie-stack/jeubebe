<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#09090f" />
  <title>DrawDuel Fix</title>
  <style>
    :root {
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --vh: 1vh;
      --bg: #09090f;
      --panel: rgba(17,24,39,.86);
      --panel2: rgba(255,255,255,.08);
      --line: rgba(255,255,255,.14);
      --text: #f9fafb;
      --muted: rgba(255,255,255,.62);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: system-ui, -apple-system, BlinkMacSystemFont, Arial, sans-serif; -webkit-text-size-adjust: 100%; }
    body { background: radial-gradient(circle at 0 0, rgba(34,211,238,.28), transparent 32%), radial-gradient(circle at 100% 100%, rgba(236,72,153,.22), transparent 32%), #09090f; }

    button, input, select { font: inherit; font-size: 16px; }
    button { border: 0; color: inherit; cursor: pointer; touch-action: manipulation; user-select: none; }
    input, select { border: 1px solid var(--line); outline: 0; color: white; background: var(--panel2); }
    select option { color: #111827; }

    #app { width: 100%; max-width: 430px; height: calc(var(--vh) * 100); margin: 0 auto; padding: calc(10px + var(--safe-top)) 12px calc(10px + var(--safe-bottom)); overflow: hidden; }
    .view { display: none; height: 100%; min-height: 0; overflow: hidden; }
    .view.active { display: grid; }

    .card { background: var(--panel); border: 1px solid var(--line); border-radius: 24px; box-shadow: 0 18px 50px rgba(0,0,0,.25); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); }
    .btn { min-height: 48px; border-radius: 16px; padding: 12px 14px; font-weight: 900; display: grid; place-items: center; line-height: 1.05; }
    .btn:active { transform: scale(.97); }
    .btn:disabled { opacity: .45; }
    .primary { background: linear-gradient(135deg, #22d3ee, #6366f1, #ec4899); }
    .dark { background: var(--panel2); border: 1px solid var(--line); }
    .danger { background: linear-gradient(135deg, #fb7185, #ef4444); }
    .good { background: linear-gradient(135deg, #34d399, #14b8a6); color: #061113; }
    .field { width: 100%; min-height: 48px; border-radius: 16px; padding: 0 14px; }
    .muted { color: var(--muted); }
    .hidden { display: none !important; }

    #home { grid-template-rows: auto 1fr auto; gap: 10px; }
    .brand { align-self: end; min-height: 0; overflow: hidden; }
    .brand h1 { margin: 0; font-size: clamp(44px, 14vw, 68px); line-height: .86; letter-spacing: -3px; }
    .brand p { margin: 12px 0 0; color: var(--muted); font-size: 15px; }
    .homeBox { padding: 14px; display: grid; gap: 10px; align-self: end; overflow: auto; }
    label { display: block; margin: 0 0 5px 4px; font-size: 10px; color: rgba(255,255,255,.48); text-transform: uppercase; letter-spacing: .12em; }

    #lobby { grid-template-rows: auto minmax(0,1fr); gap: 10px; }
    .topbar { display: grid; grid-template-columns: auto 1fr; gap: 10px; align-items: center; }
    .roomCode { text-align: right; font-size: 28px; font-weight: 1000; letter-spacing: .18em; }
    .lobbyMain { padding: 12px; min-height: 0; overflow: auto; display: grid; align-content: start; gap: 12px; }
    .playerRow { background: var(--panel2); border-radius: 18px; padding: 12px; display: flex; justify-content: space-between; gap: 10px; align-items: center; }
    .playerName { font-weight: 900; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    #game { grid-template-rows: auto minmax(0,1fr); gap: 8px; }
    .hud { display: grid; grid-template-columns: 1fr auto 1fr; gap: 7px; }
    .hudItem { padding: 8px 10px; border-radius: 16px; background: var(--panel); border: 1px solid var(--line); min-width: 0; }
    .hudLabel { font-size: 10px; color: rgba(255,255,255,.48); text-transform: uppercase; }
    .hudValue { font-weight: 1000; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .gameMain { padding: 9px; min-height: 0; overflow: hidden; display: grid; grid-template-rows: auto minmax(0,1fr); gap: 8px; }
    #phase { min-height: 38px; border-radius: 16px; background: var(--panel2); color: rgba(255,255,255,.75); padding: 8px 10px; display: grid; place-items: center; text-align: center; font-size: 13px; line-height: 1.2; }
    #playArea { min-height: 0; overflow: hidden; display: grid; }

    #choosePanel { min-height: 0; overflow: auto; display: grid; align-content: center; gap: 10px; }
    #choosePanel h2 { text-align: center; margin: 0; font-size: 24px; }
    .wordBtn { width: 100%; min-height: 72px; text-align: left; align-items: stretch; place-items: stretch; }
    .wordTop { display: flex; justify-content: space-between; gap: 10px; width: 100%; }
    .word { font-size: 20px; font-weight: 1000; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .points { background: rgba(255,255,255,.1); border-radius: 999px; padding: 4px 10px; font-size: 12px; font-weight: 900; flex: none; }
    #waitingPanel { min-height: 0; display: grid; place-items: center; text-align: center; padding: 20px; }

    #drawPanel { min-height: 0; overflow: hidden; display: grid; grid-template-rows: minmax(0,1fr) auto; gap: 7px; }
    .canvasWrap { min-height: 0; background: white; border-radius: 20px; overflow: hidden; position: relative; }
    canvas { width: 100%; height: 100%; display: block; background: white; touch-action: none; }
    #tools { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 6px; }
    #colors, #sizes { grid-column: 1 / -1; display: grid; gap: 5px; }
    #colors { grid-template-columns: repeat(10, minmax(0,1fr)); }
    #sizes { grid-template-columns: repeat(4, minmax(0,1fr)); }
    .dot, .sizeDot { height: 30px; border-radius: 999px; border: 2px solid rgba(255,255,255,.22); }
    .dot.active, .sizeDot.active { border-color: white; transform: scale(1.04); }
    .sizeDot { background: white; display: grid; place-items: center; }
    .sizeDot span { display: block; background: #111827; border-radius: 999px; }

    #guessPanel { min-height: 0; overflow: hidden; display: grid; grid-template-rows: minmax(0,1fr) auto; gap: 8px; }
    #guessCanvasWrap { min-height: 0; background: white; border-radius: 20px; overflow: hidden; }
    .guessBox { display: grid; gap: 7px; }
    #masked { padding: 10px; border-radius: 18px; background: var(--panel2); text-align: center; font-size: clamp(20px, 7vw, 32px); font-weight: 1000; letter-spacing: .14em; overflow-wrap: anywhere; }
    .guessRow { display: grid; grid-template-columns: 1fr 64px; gap: 7px; }

    #endPanel { min-height: 0; overflow: auto; display: grid; align-content: center; text-align: center; gap: 12px; }
    #gallery { grid-template-rows: auto auto minmax(0,1fr); gap: 8px; }
    #ranking { padding: 12px; display: grid; gap: 8px; }
    #galleryGrid { min-height: 0; overflow: auto; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .thumb { padding: 8px; overflow: hidden; }
    .thumb img { width: 100%; aspect-ratio: 1; object-fit: cover; background: white; border-radius: 16px; display: block; }

    #toast { position: fixed; left: 14px; right: 14px; bottom: calc(16px + var(--safe-bottom)); z-index: 99; opacity: 0; transform: translateY(16px); pointer-events: none; transition: .18s ease; padding: 12px 14px; border-radius: 18px; background: rgba(17,24,39,.94); border: 1px solid var(--line); color: white; }
    #toast.show { opacity: 1; transform: translateY(0); }

    @media (max-height: 700px) {
      #app { padding-top: calc(7px + var(--safe-top)); padding-bottom: calc(7px + var(--safe-bottom)); }
      .brand p { display: none; }
      .brand h1 { font-size: 42px; }
      .btn, .field { min-height: 42px; border-radius: 14px; }
      .homeBox { padding: 10px; gap: 7px; }
      .gameMain { padding: 7px; gap: 6px; }
      .dot, .sizeDot { height: 26px; }
      #tools .btn { min-height: 36px; font-size: 12px; padding: 8px 5px; }
    }
    @media (max-height: 610px) {
      #home { grid-template-rows: minmax(0,1fr) auto; }
      .brand { display: none; }
    }
  </style>
</head>
<body>
  <div id="app">
    <section id="home" class="view active">
      <div class="brand">
        <h1>Draw<br><span style="background:linear-gradient(90deg,#67e8f9,#a5b4fc,#f9a8d4);-webkit-background-clip:text;background-clip:text;color:transparent;">Duel</span></h1>
        <p>Version simplifiée et robuste pour iPhone.</p>
      </div>
      <div></div>
      <div class="homeBox card">
        <div id="homeStatus" class="muted" style="font-size:13px;line-height:1.25;background:var(--panel2);border-radius:16px;padding:9px;">Initialisation...</div>
        <div>
          <label>Pseudo</label>
          <input id="playerName" class="field" maxlength="18" placeholder="Ton pseudo" autocomplete="nickname" />
        </div>
        <button id="createBtn" class="btn primary">Créer un salon</button>
        <div style="display:grid;grid-template-columns:1fr 64px;gap:8px;">
          <input id="joinCode" class="field" maxlength="5" placeholder="CODE" autocomplete="off" autocapitalize="characters" style="text-align:center;font-weight:1000;letter-spacing:.22em;text-transform:uppercase;" />
          <button id="joinBtn" class="btn dark">OK</button>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
          <div><label>Dessin</label><select id="drawTimer" class="field"><option value="0">Infini</option><option value="60">1 min</option><option value="180" selected>3 min</option></select></div>
          <div><label>Deviner</label><select id="guessTimer" class="field"><option value="180">3 min</option><option value="300" selected>5 min</option><option value="600">10 min</option></select></div>
        </div>
      </div>
    </section>

    <section id="lobby" class="view">
      <header class="topbar">
        <button id="leaveBtn" class="btn dark" style="min-height:40px;padding:8px 12px;">Quitter</button>
        <div>
          <div class="muted" style="text-align:right;font-size:10px;text-transform:uppercase;letter-spacing:.12em;">Salon</div>
          <div id="roomCodeLabel" class="roomCode"></div>
        </div>
      </header>
      <main class="lobbyMain card">
        <div style="font-size:13px;line-height:1.3;background:var(--panel2);border-radius:16px;padding:10px;" id="lobbyStatus">Salon connecté.</div>
        <div>
          <div class="muted" style="font-size:10px;text-transform:uppercase;letter-spacing:.12em;margin-bottom:8px;">Joueurs</div>
          <div id="playersList" style="display:grid;gap:8px;"></div>
        </div>
        <p id="lobbyHint" class="muted" style="margin:0;font-size:14px;line-height:1.35;"></p>
        <button id="startBtn" class="btn primary">Lancer la partie</button>
      </main>
    </section>

    <section id="game" class="view">
      <header class="hud">
        <div class="hudItem"><div class="hudLabel">Manche</div><div id="roundLabel" class="hudValue">1/6</div></div>
        <div class="hudItem" style="text-align:center;"><div class="hudLabel">Timer</div><div id="timerLabel" class="hudValue">∞</div></div>
        <div class="hudItem" style="text-align:right;"><div class="hudLabel">Score</div><div id="scoreLabel" class="hudValue">0 - 0</div></div>
      </header>
      <main class="gameMain card">
        <div id="phase">Chargement...</div>
        <div id="playArea">
          <div id="waitingPanel" class="hidden">
            <div>
              <div style="font-size:42px;">⌛</div>
              <h2 id="waitingTitle" style="margin:8px 0 4px;font-size:24px;">Patiente</h2>
              <p id="waitingText" class="muted" style="margin:0;line-height:1.35;">L’autre joueur doit agir.</p>
            </div>
          </div>

          <div id="choosePanel" class="hidden">
            <h2>Choisis le mot à dessiner</h2>
            <div id="wordChoices" style="display:grid;gap:8px;"></div>
          </div>

          <div id="drawPanel" class="hidden">
            <div class="canvasWrap"><canvas id="drawCanvas"></canvas></div>
            <div id="tools">
              <div id="colors"></div>
              <div id="sizes"></div>
              <button id="eraserBtn" class="btn dark">Gomme</button>
              <button id="clearBtn" class="btn danger">Effacer</button>
              <button id="finishBtn" class="btn good">Terminer</button>
            </div>
          </div>

          <div id="guessPanel" class="hidden">
            <div id="guessCanvasWrap"><canvas id="watchCanvas"></canvas></div>
            <div class="guessBox">
              <div id="masked">_ _ _</div>
              <div id="attempts" class="muted" style="text-align:center;font-size:13px;">0/5 erreurs</div>
              <div class="guessRow">
                <input id="guessInput" class="field" placeholder="Réponse" autocomplete="off" autocapitalize="none" />
                <button id="guessBtn" class="btn primary">Go</button>
              </div>
            </div>
          </div>

          <div id="endPanel" class="hidden">
            <div style="font-size:48px;">🏁</div>
            <h2 id="endTitle" style="margin:0;font-size:25px;">Fin de manche</h2>
            <p id="endText" class="muted" style="margin:0;line-height:1.35;"></p>
            <button id="nextBtn" class="btn primary">Manche suivante</button>
          </div>
        </div>
      </main>
    </section>

    <section id="gallery" class="view">
      <header class="topbar">
        <div><div class="muted" style="font-size:10px;text-transform:uppercase;letter-spacing:.12em;">Final</div><div style="font-size:30px;font-weight:1000;">Galerie</div></div>
        <button id="homeBtn" class="btn dark" style="min-height:40px;padding:8px 12px;">Accueil</button>
      </header>
      <div id="ranking" class="card"></div>
      <div id="galleryGrid"></div>
    </section>
  </div>

  <div id="toast"></div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js';
    import { getDatabase, ref, set, update, get, onValue, onChildAdded, push, serverTimestamp, remove, off } from 'https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js';

    const firebaseConfig = {
      apiKey: "AIzaSyDc2vXIRfWp2OCkcNrr13pme-x0kKbn3DM",
      authDomain: "mille-bornes-355ca.firebaseapp.com",
      databaseURL: "https://mille-bornes-355ca-default-rtdb.firebaseio.com",
      projectId: "mille-bornes-355ca",
      storageBucket: "mille-bornes-355ca.appspot.com",
      messagingSenderId: "1018160779227",
      appId: "1:1018160779227:web:e686d32f117dfef63261fe"
    };

    const WORDS = {
      easy: ['chat','chien','soleil','lune','maison','arbre','fleur','pomme','vélo','voiture','bateau','avion','livre','chaise','table','clé','étoile','nuage','pizza','oiseau','poisson','robot','train','montagne','banane','chapeau','téléphone'],
      medium: ['astronaute','volcan','dinosaure','parapluie','bibliothèque','caméléon','hélicoptère','labyrinthe','sirène','pirate','cascade','squelette','tornade','méduse','kangourou','accordéon','boussole','camping','grenouille'],
      hard: ['impressionnisme','paradoxe','microscope','constellation','montgolfière','météorite','équilibriste','sous-marin','illusion optique','trou noir','station spatiale','archéologue','écosystème','gravitation','kaléidoscope','nébuleuse','radiographie','biodiversité','quantique']
    };

    const CONFIG = { totalRounds: 6, maxAttempts: 5, colors: ['#111827','#ef4444','#f97316','#facc15','#22c55e','#14b8a6','#06b6d4','#3b82f6','#8b5cf6','#ec4899'], sizes: [4, 8, 14, 22] };
    const $ = id => document.getElementById(id);
    const els = {
      homeStatus: $('homeStatus'), playerName: $('playerName'), joinCode: $('joinCode'), createBtn: $('createBtn'), joinBtn: $('joinBtn'), drawTimer: $('drawTimer'), guessTimer: $('guessTimer'),
      leaveBtn: $('leaveBtn'), roomCodeLabel: $('roomCodeLabel'), lobbyStatus: $('lobbyStatus'), playersList: $('playersList'), lobbyHint: $('lobbyHint'), startBtn: $('startBtn'),
      roundLabel: $('roundLabel'), timerLabel: $('timerLabel'), scoreLabel: $('scoreLabel'), phase: $('phase'), waitingPanel: $('waitingPanel'), waitingTitle: $('waitingTitle'), waitingText: $('waitingText'),
      choosePanel: $('choosePanel'), wordChoices: $('wordChoices'), drawPanel: $('drawPanel'), drawCanvas: $('drawCanvas'), colors: $('colors'), sizes: $('sizes'), eraserBtn: $('eraserBtn'), clearBtn: $('clearBtn'), finishBtn: $('finishBtn'),
      guessPanel: $('guessPanel'), watchCanvas: $('watchCanvas'), masked: $('masked'), attempts: $('attempts'), guessInput: $('guessInput'), guessBtn: $('guessBtn'),
      endPanel: $('endPanel'), endTitle: $('endTitle'), endText: $('endText'), nextBtn: $('nextBtn'), ranking: $('ranking'), galleryGrid: $('galleryGrid'), homeBtn: $('homeBtn'), toast: $('toast')
    };

    const state = {
      app: null, db: null, ready: false, roomCode: null, room: null,
      playerId: getPlayerId(), unsubs: [], childUnsubs: [], timer: null,
      color: CONFIG.colors[0], size: CONFIG.sizes[1], eraser: false, drawing: false, last: null,
      segments: [], strokesKey: '', ctx: null, watchCtx: null
    };

    boot();

    function boot() {
      setVh();
      window.addEventListener('resize', () => { setVh(); setTimeout(() => resizeCanvas(true), 80); }, { passive: true });
      window.addEventListener('orientationchange', () => setTimeout(() => { setVh(); resizeCanvas(true); }, 260), { passive: true });
      els.playerName.value = localStorage.getItem('dd_name') || '';
      buildTools();
      bindEvents();
      initFirebase();
      setTimeout(() => resizeCanvas(true), 250);
    }

    function setVh() { document.documentElement.style.setProperty('--vh', `${window.innerHeight * 0.01}px`); }
    function getPlayerId() {
      const saved = localStorage.getItem('dd_pid');
      if (saved) return saved;
      const id = window.crypto?.randomUUID ? crypto.randomUUID() : 'p_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2);
      localStorage.setItem('dd_pid', id);
      return id;
    }
    function bindEvents() {
      els.createBtn.addEventListener('click', createRoom);
      els.joinBtn.addEventListener('click', joinRoom);
      els.joinCode.addEventListener('input', () => els.joinCode.value = els.joinCode.value.toUpperCase().replace(/[^A-Z0-9]/g, '').slice(0,5));
      els.leaveBtn.addEventListener('click', leaveRoom);
      els.startBtn.addEventListener('click', startGame);
      els.eraserBtn.addEventListener('click', () => { state.eraser = !state.eraser; updateTools(); });
      els.clearBtn.addEventListener('click', () => { if (!amArtist()) return toast('Seul le dessinateur peut effacer.'); clearCanvas(true); });
      els.finishBtn.addEventListener('click', finishDrawing);
      els.guessBtn.addEventListener('click', submitGuess);
      els.guessInput.addEventListener('keydown', e => { if (e.key === 'Enter') submitGuess(); });
      els.nextBtn.addEventListener('click', nextRound);
      els.homeBtn.addEventListener('click', () => { detach(); showView('home'); });
    }
    function initFirebase() {
      try {
        state.app = initializeApp(firebaseConfig);
        state.db = getDatabase(state.app);
        state.ready = true;
        status('Firebase prêt. Crée ou rejoins un salon.');
      } catch (err) {
        status('Firebase ne démarre pas : ' + (err.message || err), true);
      }
    }

    function status(msg, bad = false) { els.homeStatus.textContent = msg; els.homeStatus.style.color = bad ? '#fecdd3' : 'rgba(255,255,255,.72)'; console.log('[DrawDuel]', msg); }
    function toast(msg) { els.toast.textContent = msg; els.toast.classList.add('show'); console.log('[DrawDuel]', msg); clearTimeout(toast.t); toast.t = setTimeout(() => els.toast.classList.remove('show'), 2600); }
    function error(where, err) {
      console.error(where, err);
      const msg = err?.code === 'PERMISSION_DENIED' || String(err?.message || '').includes('Permission') ? 'Firebase bloque les droits. Dans Realtime Database > Rules, mets .read et .write à true sous rooms pour tester.' : `${where} : ${err?.message || err}`;
      toast(msg); status(msg, true); if (state.roomCode) els.lobbyStatus.textContent = msg;
    }
    function showView(name) { ['home','lobby','game','gallery'].forEach(v => $(v).classList.toggle('active', v === name)); requestAnimationFrame(() => resizeCanvas(true)); }
    function safeName() { return (els.playerName.value || localStorage.getItem('dd_name') || 'Joueur').trim().slice(0,18) || 'Joueur'; }
    function makeCode() { const a = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; return Array.from({length:5}, () => a[Math.floor(Math.random()*a.length)]).join(''); }
    function now() { return Date.now(); }
    function roomRef(path = '') { return ref(state.db, `rooms/${state.roomCode}${path ? '/' + path : ''}`); }
    function players(room = state.room) { return Object.entries(room?.players || {}).sort((a,b) => (a[1].joinedAt || 0) - (b[1].joinedAt || 0)); }
    function my() { return state.room?.players?.[state.playerId]; }
    function artistId(room = state.room) { const list = players(room).map(([id]) => id); return list.length ? list[((room?.round || 1) - 1) % list.length] : null; }
    function amArtist() { return artistId() === state.playerId; }
    function nameOf(id) { return state.room?.players?.[id]?.name || 'Joueur'; }
    function score(id) { return Number(state.room?.scores?.[id] || 0); }
    function deadline(seconds) { return seconds > 0 ? now() + seconds * 1000 : 0; }
    function fmt(sec) { if (!sec || sec <= 0) return '∞'; return `${String(Math.floor(sec/60)).padStart(2,'0')}:${String(sec%60).padStart(2,'0')}`; }

    async function createRoom() {
      if (!state.ready) return toast('Firebase pas prêt.');
      els.createBtn.disabled = true;
      try {
        localStorage.setItem('dd_name', safeName());
        let code = makeCode();
        for (let i = 0; i < 8; i++) {
          const s = await get(ref(state.db, `rooms/${code}`));
          if (!s.exists()) break;
          code = makeCode();
        }
        state.roomCode = code;
        await set(ref(state.db, `rooms/${code}`), {
          createdAt: serverTimestamp(), status: 'lobby', round: 1, totalRounds: CONFIG.totalRounds,
          settings: { drawTimer: Number(els.drawTimer.value), guessTimer: Number(els.guessTimer.value) },
          players: { [state.playerId]: { name: safeName(), joinedAt: now() } },
          scores: { [state.playerId]: 0 }, gallery: {}, votes: {}, hostId: state.playerId
        });
        attach(code); showView('lobby'); toast('Salon créé.');
      } catch (err) { error('Création impossible', err); }
      finally { els.createBtn.disabled = false; }
    }
    async function joinRoom() {
      if (!state.ready) return toast('Firebase pas prêt.');
      els.joinBtn.disabled = true;
      try {
        localStorage.setItem('dd_name', safeName());
        const code = els.joinCode.value.trim().toUpperCase();
        if (code.length !== 5) throw new Error('Entre un code à 5 caractères.');
        const s = await get(ref(state.db, `rooms/${code}`));
        if (!s.exists()) throw new Error('Salon introuvable.');
        const data = s.val();
        const count = Object.keys(data.players || {}).length;
        if (count >= 2 && !data.players?.[state.playerId]) throw new Error('Salon déjà complet.');
        state.roomCode = code;
        await update(ref(state.db, `rooms/${code}`), {
          [`players/${state.playerId}`]: { name: safeName(), joinedAt: data.players?.[state.playerId]?.joinedAt || now() },
          [`scores/${state.playerId}`]: data.scores?.[state.playerId] || 0
        });
        attach(code); showView('lobby'); toast('Salon rejoint.');
      } catch (err) { error('Connexion impossible', err); }
      finally { els.joinBtn.disabled = false; }
    }
    function attach(code) {
      detach(false); state.roomCode = code; els.roomCodeLabel.textContent = code;
      const r = ref(state.db, `rooms/${code}`);
      const cb = snap => { state.room = snap.val(); if (!state.room) { detach(); showView('home'); toast('Salon fermé.'); return; } render(); };
      onValue(r, cb, err => error('Lecture impossible', err));
      state.unsubs.push(() => off(r, 'value', cb));
    }
    function detach(clearCode = true) { state.unsubs.forEach(f => f()); state.childUnsubs.forEach(f => f()); state.unsubs = []; state.childUnsubs = []; clearInterval(state.timer); state.timer = null; state.room = null; state.strokesKey = ''; state.segments = []; if (clearCode) state.roomCode = null; }
    async function leaveRoom() {
      try {
        if (state.roomCode && state.room) {
          const list = players();
          if (list.length <= 1) await remove(roomRef()); else await remove(roomRef(`players/${state.playerId}`));
        }
      } catch (err) { error('Sortie impossible', err); }
      detach(); showView('home');
    }

    function pick(diff) { const arr = WORDS[diff]; return arr[Math.floor(Math.random()*arr.length)]; }
    function choices() { return [{ label:'Facile', points:1, word:pick('easy') }, { label:'Moyen', points:2, word:pick('medium') }, { label:'Difficile', points:3, word:pick('hard') }]; }
    async function startGame() {
      if (!state.room) return toast('Le salon n’est pas synchronisé.');
      if (players().length !== 2) return toast('Il faut être 2 joueurs.');
      els.startBtn.disabled = true;
      try {
        await update(roomRef(), { status:'choose', round:1, choices:choices(), activeWord:null, attempts:{}, revealed:[], roundWinner:null, phaseStartedAt:now(), phaseDeadline:0, strokes:null, clearSignal:now() });
        toast('Partie lancée.');
      } catch (err) { error('Lancement impossible', err); }
      finally { els.startBtn.disabled = false; }
    }
    async function chooseWord(c) {
      if (!amArtist()) return toast('C’est à l’autre joueur de choisir.');
      try {
        await update(roomRef(), { status:'draw', activeWord:c, attempts:{}, revealed:[], roundWinner:null, phaseStartedAt:now(), phaseDeadline:deadline(Number(state.room.settings?.drawTimer || 0)), strokes:null, clearSignal:now() });
        clearCanvas(false);
      } catch (err) { error('Choix impossible', err); }
    }
    async function finishDrawing() {
      if (!amArtist()) return toast('Seul le dessinateur peut terminer.');
      try {
        await saveDrawing();
        await update(roomRef(), { status:'guess', phaseStartedAt:now(), phaseDeadline:deadline(Number(state.room.settings?.guessTimer || 300)), attempts:{}, revealed:[] });
      } catch (err) { error('Fin du dessin impossible', err); }
    }
    function norm(s) { return (s || '').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[^a-z0-9]/g,''); }
    async function submitGuess() {
      if (amArtist()) return toast('Le dessinateur ne devine pas.');
      const g = els.guessInput.value.trim(); if (!g) return;
      els.guessInput.value = '';
      try {
        const word = state.room.activeWord?.word || '';
        if (norm(g) === norm(word)) { await winRound(); return; }
        const tries = Number(state.room.attempts?.[state.playerId] || 0) + 1;
        const up = { [`attempts/${state.playerId}`]: tries };
        const revealed = [...(state.room.revealed || [])];
        if ((tries === 2 || tries === 3) && revealed.length < 2) { const idx = hiddenIndex(word, revealed); if (idx !== null) revealed.push(idx); up.revealed = revealed; }
        if (tries >= CONFIG.maxAttempts) { up.status = 'roundEnd'; up.roundWinner = 'artist'; up.roundEndedAt = now(); }
        await update(roomRef(), up);
      } catch (err) { error('Réponse impossible', err); }
    }
    function hiddenIndex(word, revealed) { const cand = [...word].map((ch,i) => /[a-zA-ZÀ-ÿ0-9]/.test(ch) && !revealed.includes(i) ? i : null).filter(v => v !== null); return cand.length ? cand[Math.floor(Math.random()*cand.length)] : null; }
    async function winRound() {
      const pts = Number(state.room.activeWord?.points || 1), a = artistId(), g = state.playerId;
      await update(roomRef(), { status:'roundEnd', roundWinner:g, roundEndedAt:now(), [`scores/${g}`]:score(g)+pts, [`scores/${a}`]:score(a)+Math.max(1, Math.floor(pts/2)) });
    }
    async function nextRound() {
      if (!state.room) return;
      try {
        const r = Number(state.room.round || 1);
        if (r >= CONFIG.totalRounds) { await update(roomRef(), { status:'gameOver', phaseStartedAt:now() }); return; }
        await update(roomRef(), { status:'choose', round:r+1, choices:choices(), activeWord:null, attempts:{}, revealed:[], roundWinner:null, phaseStartedAt:now(), phaseDeadline:0, strokes:null, clearSignal:now() });
      } catch (err) { error('Manche suivante impossible', err); }
    }
    async function saveDrawing() {
      const canvas = els.drawCanvas;
      const out = document.createElement('canvas'); out.width = 900; out.height = 900;
      const ctx = out.getContext('2d'); ctx.fillStyle = '#fff'; ctx.fillRect(0,0,900,900); ctx.drawImage(canvas,0,0,900,900);
      await update(roomRef(`gallery/${state.room.round || 1}`), { dataUrl:out.toDataURL('image/jpeg', .82), word:state.room.activeWord?.word || '', difficulty:state.room.activeWord?.label || '', artistName:nameOf(artistId()), artistId:artistId(), createdAt:now() });
    }

    function render() {
      const r = state.room; if (!r) return;
      if (r.status === 'lobby') showView('lobby');
      if (['choose','draw','guess','roundEnd'].includes(r.status)) showView('game');
      if (r.status === 'gameOver') showView('gallery');
      renderLobby(); renderGame(); renderGallery(); ensureTimer();
    }
    function renderLobby() {
      const list = players(); els.roomCodeLabel.textContent = state.roomCode || '';
      els.lobbyStatus.textContent = `Connecté. État : ${state.room.status}. Joueurs : ${list.length}/2.`;
      els.playersList.innerHTML = list.map(([id,p],i) => `<div class="playerRow"><div style="min-width:0;"><div class="playerName">${esc(p.name)}${id === state.playerId ? ' · toi' : ''}</div><div class="muted" style="font-size:12px;">Joueur ${i+1}${id === artistId() ? ' · dessinateur prochain' : ''}</div></div><div style="font-weight:1000;font-size:22px;">${score(id)}</div></div>`).join('');
      els.lobbyHint.textContent = list.length < 2 ? 'Le bouton ne lancera pas tant que le second joueur n’est pas dans le salon.' : 'Vous êtes deux. Appuie sur Lancer la partie. Si rien ne change, regarde le message rouge ou la console Safari.';
      els.startBtn.textContent = list.length === 2 ? 'Lancer la partie' : 'En attente du 2e joueur';
    }
    function renderGame() {
      const r = state.room; if (!r || r.status === 'lobby' || r.status === 'gameOver') return;
      const list = players(), a = artistId(), meA = amArtist(), word = r.activeWord?.word || '';
      els.roundLabel.textContent = `${r.round || 1}/${CONFIG.totalRounds}`; els.scoreLabel.textContent = list.map(([id]) => score(id)).join(' - ');
      [els.waitingPanel, els.choosePanel, els.drawPanel, els.guessPanel, els.endPanel].forEach(el => el.classList.add('hidden'));
      if (r.status === 'choose') {
        els.phase.textContent = meA ? 'À toi : choisis un mot.' : `${nameOf(a)} choisit un mot.`;
        if (meA) { els.choosePanel.classList.remove('hidden'); renderChoices(r.choices || []); } else { wait('L’autre joueur choisit', 'Dès qu’il choisit, il verra le tableau de dessin.'); }
      }
      if (r.status === 'draw') {
        els.phase.textContent = meA ? `À toi de dessiner : ${word}` : `${nameOf(a)} dessine. Attends qu’il termine.`;
        if (meA) { els.drawPanel.classList.remove('hidden'); setupCanvas(true); } else { wait('Dessin en cours', 'Le tableau de réponse arrivera quand le dessinateur appuie sur Terminer.'); attachStrokes(); setupCanvas(false); }
      }
      if (r.status === 'guess') {
        els.phase.textContent = meA ? 'L’autre joueur devine ton dessin.' : 'À toi de deviner.';
        els.guessPanel.classList.remove('hidden'); setupCanvas(false); attachStrokes(); renderMask();
        els.guessInput.disabled = meA; els.guessBtn.disabled = meA;
        els.attempts.textContent = `${Number(r.attempts?.[state.playerId] || 0)}/${CONFIG.maxAttempts} erreurs`;
      }
      if (r.status === 'roundEnd') {
        els.phase.textContent = 'Manche terminée.'; els.endPanel.classList.remove('hidden');
        const guessed = r.roundWinner && r.roundWinner !== 'artist';
        els.endTitle.textContent = guessed ? 'Mot trouvé !' : 'Fin de manche';
        els.endText.textContent = guessed ? `${nameOf(r.roundWinner)} a trouvé « ${word} ».` : `Personne n’a trouvé « ${word} ».`;
        els.nextBtn.textContent = Number(r.round || 1) >= CONFIG.totalRounds ? 'Voir la galerie' : 'Manche suivante';
      }
      renderTimer();
    }
    function wait(title, text) { els.waitingPanel.classList.remove('hidden'); els.waitingTitle.textContent = title; els.waitingText.textContent = text; }
    function renderChoices(cs) { els.wordChoices.innerHTML = cs.map((c,i) => `<button class="btn dark wordBtn" data-i="${i}"><div class="wordTop"><span class="word">${esc(c.word)}</span><span class="points">${c.points} pt${c.points > 1 ? 's' : ''}</span></div><div class="muted" style="font-size:14px;margin-top:6px;">${esc(c.label)}</div></button>`).join(''); els.wordChoices.querySelectorAll('[data-i]').forEach(b => b.addEventListener('click', () => chooseWord(cs[Number(b.dataset.i)]))); }
    function renderMask() { const w = state.room.activeWord?.word || '', rev = state.room.revealed || []; els.masked.textContent = [...w].map((ch,i) => /[a-zA-ZÀ-ÿ0-9]/.test(ch) ? (rev.includes(i) ? ch.toUpperCase() : '_') : ch).join(' '); }
    function renderTimer() { const d = Number(state.room?.phaseDeadline || 0); if (!d) { els.timerLabel.textContent = '∞'; return; } els.timerLabel.textContent = fmt(Math.max(0, Math.ceil((d - now()) / 1000))); }
    function ensureTimer() { if (state.timer) return; state.timer = setInterval(async () => { if (!state.room) return; renderTimer(); const d = Number(state.room.phaseDeadline || 0); if (!d || now() < d) return; try { if (state.room.status === 'draw' && amArtist()) await finishDrawing(); if (state.room.status === 'guess') await update(roomRef(), { status:'roundEnd', roundWinner:'artist', roundEndedAt:now() }); } catch (e) { console.error(e); } }, 500); }
    function renderGallery() { if (!state.room || state.room.status !== 'gameOver') return; const list = players().sort((a,b) => score(b[0])-score(a[0])); els.ranking.innerHTML = list.map(([id,p],i) => `<div class="playerRow"><div class="playerName">${i+1}. ${esc(p.name)}${id === state.playerId ? ' · toi' : ''}</div><div style="font-weight:1000;font-size:22px;">${score(id)}</div></div>`).join(''); const g = Object.entries(state.room.gallery || {}).sort((a,b)=>Number(a[0])-Number(b[0])); els.galleryGrid.innerHTML = g.map(([round,item]) => `<article class="card thumb"><img src="${item.dataUrl}" alt="Dessin"><div style="padding:7px 2px 2px;"><div class="muted" style="font-size:12px;">Manche ${round}</div><div style="font-weight:1000;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(item.word || '')}</div></div></article>`).join(''); }

    function buildTools() { els.colors.innerHTML = CONFIG.colors.map(c => `<button class="dot" data-c="${c}" style="background:${c}"></button>`).join(''); els.colors.querySelectorAll('[data-c]').forEach(b => b.addEventListener('click', () => { state.color = b.dataset.c; state.eraser = false; updateTools(); })); els.sizes.innerHTML = CONFIG.sizes.map(s => `<button class="sizeDot" data-s="${s}"><span style="width:${Math.min(s,18)}px;height:${Math.min(s,18)}px"></span></button>`).join(''); els.sizes.querySelectorAll('[data-s]').forEach(b => b.addEventListener('click', () => { state.size = Number(b.dataset.s); updateTools(); })); updateTools(); }
    function updateTools() { els.colors.querySelectorAll('[data-c]').forEach(b => b.classList.toggle('active', b.dataset.c === state.color && !state.eraser)); els.sizes.querySelectorAll('[data-s]').forEach(b => b.classList.toggle('active', Number(b.dataset.s) === state.size)); els.eraserBtn.style.outline = state.eraser ? '2px solid white' : '0'; }
    function setupCanvas(draw) { resizeCanvas(true); if (draw) initDrawEvents(); }
    function resizeCanvas(replay=false) { [els.drawCanvas, els.watchCanvas].forEach(c => { const r = c.getBoundingClientRect(); if (!r.width || !r.height) return; const ratio = Math.max(1, devicePixelRatio || 1); const w = Math.max(240, Math.round(r.width * ratio)), h = Math.max(240, Math.round(r.height * ratio)); if (c.width !== w || c.height !== h) { c.width = w; c.height = h; fill(c.getContext('2d')); } }); state.ctx = els.drawCanvas.getContext('2d'); state.watchCtx = els.watchCanvas.getContext('2d'); if (replay) replay(); }
    function fill(ctx) { if (!ctx) return; ctx.fillStyle = '#fff'; ctx.fillRect(0,0,ctx.canvas.width,ctx.canvas.height); }
    function clearCanvas(emit=false) { state.segments = []; resizeCanvas(false); fill(state.ctx); fill(state.watchCtx); if (emit) update(roomRef(), { strokes:null, clearSignal:now() }).catch(e => error('Effacement impossible', e)); }
    let eventsReady = false;
    function initDrawEvents() { if (eventsReady) return; eventsReady = true; const c = els.drawCanvas; c.addEventListener('pointerdown', down, { passive:false }); c.addEventListener('pointermove', move, { passive:false }); c.addEventListener('pointerup', up, { passive:false }); c.addEventListener('pointercancel', up, { passive:false }); c.addEventListener('touchstart', e => e.preventDefault(), { passive:false }); c.addEventListener('touchmove', e => e.preventDefault(), { passive:false }); }
    function p(e) { const r = els.drawCanvas.getBoundingClientRect(); return { x: Math.max(0, Math.min(1, (e.clientX-r.left)/Math.max(1,r.width))), y: Math.max(0, Math.min(1, (e.clientY-r.top)/Math.max(1,r.height))) }; }
    function down(e) { if (!amArtist() || state.room?.status !== 'draw') return; e.preventDefault(); state.drawing = true; state.last = p(e); els.drawCanvas.setPointerCapture?.(e.pointerId); }
    function move(e) { if (!state.drawing || !state.last) return; e.preventDefault(); const to = p(e); const s = { from:state.last, to, color:state.eraser?'#ffffff':state.color, size:state.eraser?state.size*2.2:state.size, t:now() }; state.segments.push(s); draw(state.ctx,s); push(roomRef('strokes'), s).catch(err => error('Trait impossible', err)); state.last = to; }
    function up() { state.drawing = false; state.last = null; }
    function draw(ctx,s) { if (!ctx || !s?.from || !s?.to) return; const w = ctx.canvas.width, h = ctx.canvas.height; ctx.lineCap='round'; ctx.lineJoin='round'; ctx.strokeStyle=s.color; ctx.lineWidth=Math.max(1, s.size * Math.max(w,h) / 430); ctx.beginPath(); ctx.moveTo(s.from.x*w, s.from.y*h); ctx.lineTo(s.to.x*w, s.to.y*h); ctx.stroke(); }
    function replay() { fill(state.ctx); fill(state.watchCtx); state.segments.forEach(s => { draw(state.ctx,s); draw(state.watchCtx,s); }); }
    function attachStrokes() { const key = `${state.roomCode}:${state.room?.round || 1}`; if (state.strokesKey === key) return; state.childUnsubs.forEach(f => f()); state.childUnsubs = []; state.strokesKey = key; clearCanvas(false); const sr = roomRef('strokes'); const cb = snap => { const s = snap.val(); state.segments.push(s); draw(state.watchCtx,s); if (!amArtist()) draw(state.ctx,s); }; onChildAdded(sr, cb); state.childUnsubs.push(() => off(sr, 'child_added', cb)); let lastClear = state.room?.clearSignal || 0; const cr = roomRef('clearSignal'); const ccb = snap => { const v = snap.val() || 0; if (!v || v === lastClear) return; lastClear = v; clearCanvas(false); }; onValue(cr, ccb); state.childUnsubs.push(() => off(cr, 'value', ccb)); }
    function esc(s) { return String(s ?? '').replace(/[&<>'"]/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[ch])); }
  </script>
</body>
