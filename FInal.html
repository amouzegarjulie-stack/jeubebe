<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>1000 Bornes Mobile</title>

  <style>
    :root {
      --bg: #F4F4F9;
      --text: #333;
      --muted: #767676;
      --card: #FFFFFF;
      --border: #E2E2EA;
      --shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
      --mint: #BDEBD0;
      --coral: #FFAAA5;
      --sky: #B8E4FF;
      --gold: #FFE8A3;
      --danger: #FF6B6B;
      --success: #51C878;
      --radius: 22px;
      --tap: 52px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      overflow: hidden;
    }

    button,
    input {
      font: inherit;
    }

    button {
      min-height: var(--tap);
      border: 0;
      border-radius: 18px;
      background: #333;
      color: white;
      font-weight: 800;
      padding: 0 18px;
      cursor: pointer;
      touch-action: manipulation;
    }

    button.secondary {
      background: #ECECF3;
      color: var(--text);
    }

    button.ghost {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
    }

    button:disabled {
      opacity: 0.42;
      cursor: not-allowed;
    }

    input {
      width: 100%;
      min-height: var(--tap);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 0 14px;
      background: white;
      color: var(--text);
      outline: none;
    }

    .app {
      width: 100%;
      max-width: 480px;
      height: 100dvh;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    .screen {
      height: 100%;
      padding: 18px;
      overflow-y: auto;
    }

    .hidden {
      display: none !important;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: env(safe-area-inset-top) 14px 10px;
      background: rgba(244, 244, 249, 0.9);
      backdrop-filter: blur(16px);
      z-index: 5;
    }

    .title {
      font-size: 1.05rem;
      font-weight: 900;
      letter-spacing: -0.02em;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      padding: 8px 12px;
      background: white;
      border: 1px solid var(--border);
      font-size: 0.82rem;
      font-weight: 800;
      white-space: nowrap;
    }

    .card-panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: var(--shadow);
    }

    .landing {
      display: grid;
      gap: 16px;
      padding-top: 32px;
    }

    .brand {
      display: grid;
      gap: 8px;
    }

    .brand h1 {
      margin: 0;
      font-size: clamp(2rem, 10vw, 3.2rem);
      letter-spacing: -0.08em;
      line-height: 0.95;
    }

    .brand p {
      margin: 0;
      color: var(--muted);
      line-height: 1.45;
    }

    .form-grid {
      display: grid;
      gap: 10px;
    }

    .row {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .row > * {
      flex: 1;
    }

    .game {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      overflow: hidden;
    }

    .table {
      flex: 1;
      overflow-y: auto;
      padding: 10px 14px 170px;
      display: grid;
      gap: 12px;
    }

    .status-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .metric {
      background: white;
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 12px;
      min-height: 84px;
      display: grid;
      align-content: space-between;
    }

    .metric small {
      color: var(--muted);
      font-weight: 800;
      font-size: 0.72rem;
    }

    .metric strong {
      font-size: 1.15rem;
      letter-spacing: -0.04em;
    }

    .player-card {
      display: grid;
      gap: 12px;
    }

    .player-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }

    .player-name {
      font-weight: 900;
    }

    .zones {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .zone {
      min-height: 96px;
      border-radius: 18px;
      padding: 12px;
      background: #FAFAFD;
      border: 1px dashed #D9D9E5;
      display: grid;
      gap: 8px;
    }

    .zone h4 {
      margin: 0;
      font-size: 0.78rem;
      color: var(--muted);
    }

    .mini-cards {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .mini-card {
      border-radius: 999px;
      padding: 6px 9px;
      font-size: 0.75rem;
      font-weight: 900;
      background: #EFEFF6;
    }

    .mini-card.distance { background: var(--mint); }
    .mini-card.attack { background: var(--coral); }
    .mini-card.remedy { background: var(--sky); }
    .mini-card.safety { background: var(--gold); }

    .center-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .log {
      max-height: 116px;
      overflow-y: auto;
      color: var(--muted);
      font-size: 0.82rem;
      line-height: 1.4;
    }

    .hand-drawer {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 10px 12px calc(12px + env(safe-area-inset-bottom));
      background: rgba(244, 244, 249, 0.92);
      backdrop-filter: blur(16px);
      border-top: 1px solid var(--border);
      border-radius: 24px 24px 0 0;
      box-shadow: 0 -14px 34px rgba(0, 0, 0, 0.09);
      transform: translateY(calc(100% - 70px));
      transition: transform 180ms ease;
      z-index: 10;
    }

    .hand-drawer.open {
      transform: translateY(0);
    }

    .drawer-handle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 50px;
    }

    .drawer-handle strong {
      font-size: 0.95rem;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      max-height: 50dvh;
      overflow-y: auto;
      padding-bottom: 4px;
    }

    .game-card {
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 12px;
      background: white;
      min-height: 124px;
      display: grid;
      align-content: space-between;
      gap: 10px;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.04);
    }

    .game-card.distance { background: linear-gradient(135deg, white, var(--mint)); }
    .game-card.attack { background: linear-gradient(135deg, white, var(--coral)); }
    .game-card.remedy { background: linear-gradient(135deg, white, var(--sky)); }
    .game-card.safety { background: linear-gradient(135deg, white, var(--gold)); }

    .game-card h3 {
      margin: 0;
      font-size: 0.98rem;
      letter-spacing: -0.03em;
    }

    .game-card p {
      margin: 0;
      color: #555;
      font-size: 0.78rem;
      line-height: 1.25;
    }

    .card-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .card-actions button {
      min-height: 42px;
      padding: 0 8px;
      font-size: 0.78rem;
      border-radius: 14px;
    }

    .leaderboard {
      display: grid;
      gap: 10px;
    }

    .leader-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      padding: 12px;
      background: #FAFAFD;
      border-radius: 16px;
      border: 1px solid var(--border);
      font-size: 0.9rem;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 92px;
      transform: translateX(-50%);
      background: #333;
      color: white;
      border-radius: 999px;
      padding: 10px 14px;
      font-weight: 800;
      font-size: 0.84rem;
      max-width: calc(100vw - 28px);
      z-index: 99;
      opacity: 0;
      pointer-events: none;
      transition: opacity 150ms ease;
    }

    .toast.show {
      opacity: 1;
    }

    svg {
      width: 22px;
      height: 22px;
      flex: 0 0 auto;
    }

    @media (min-width: 481px) {
      body {
        background: #EAEAEE;
      }

      .app {
        border-left: 1px solid var(--border);
        border-right: 1px solid var(--border);
        background: var(--bg);
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section id="lobbyScreen" class="screen landing">
      <div class="brand">
        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M4 14h11l3 3h2" stroke="#333" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M6 17h.01M15 17h.01" stroke="#333" stroke-width="4" stroke-linecap="round"/>
          <path d="M7 10h6l2 4H5l2-4Z" stroke="#333" stroke-width="2" stroke-linejoin="round"/>
        </svg>
        <h1>1000<br>Bornes</h1>
        <p>Version mobile, minimaliste, deux joueurs en ligne avec synchronisation temps réel. Sans config Firebase, le jeu fonctionne en mode test local entre deux onglets.</p>
      </div>

      <div class="card-panel form-grid">
        <input id="playerName" placeholder="Ton pseudo" autocomplete="nickname" />
        <input id="roomId" placeholder="Code salon, ex: route42" autocomplete="off" />
        <div class="row">
          <button id="createRoomBtn">Créer</button>
          <button id="joinRoomBtn" class="secondary">Rejoindre</button>
        </div>
        <button id="quickRoomBtn" class="ghost">Salon aléatoire</button>
      </div>

      <div class="card-panel leaderboard">
        <div class="player-head">
          <strong>Classement</strong>
          <span class="pill">Ratio victoires</span>
        </div>
        <div id="leaderboardList"></div>
      </div>
    </section>

    <section id="gameScreen" class="game hidden">
      <header class="topbar">
        <div>
          <div class="title">1000 Bornes</div>
          <small id="roomLabel">Salon</small>
        </div>
        <span id="turnPill" class="pill">Tour</span>
      </header>

      <div class="table">
        <section class="status-grid">
          <div class="metric">
            <small>Pioche</small>
            <strong id="deckCount">0</strong>
          </div>
          <div class="metric">
            <small>Défausse</small>
            <strong id="discardTop">-</strong>
          </div>
          <div class="metric">
            <small>Manche</small>
            <strong id="roundState">...</strong>
          </div>
        </section>

        <section id="playersArea"></section>

        <section class="center-actions">
          <button id="drawBtn">Piocher</button>
          <button id="endTurnBtn" class="secondary">Fin du tour</button>
        </section>

        <section class="card-panel">
          <div class="player-head">
            <strong>Journal</strong>
            <span class="pill" id="scorePill">0 - 0</span>
          </div>
          <div id="log" class="log"></div>
        </section>
      </div>

      <aside id="handDrawer" class="hand-drawer">
        <div id="drawerHandle" class="drawer-handle">
          <strong id="handTitle">Main</strong>
          <span class="pill" id="handCount">0 carte</span>
        </div>
        <div id="handCards" class="cards"></div>
      </aside>
    </section>

    <div id="toast" class="toast"></div>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getDatabase,
      ref,
      set,
      update,
      get,
      onValue,
      runTransaction,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    /*****************************************************************
     * 1) CONFIG FIREBASE
     * Remplace ces valeurs par celles de ton projet Firebase.
     * Active Realtime Database en mode test pendant le développement.
     *****************************************************************/
    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_PROJECT.firebaseapp.com",
      databaseURL: "https://YOUR_PROJECT-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "YOUR_PROJECT",
      storageBucket: "YOUR_PROJECT.appspot.com",
      messagingSenderId: "YOUR_SENDER_ID",
      appId: "YOUR_APP_ID"
    };

    const usingLocalSync = firebaseConfig.apiKey === "YOUR_API_KEY";
    const app = usingLocalSync ? null : initializeApp(firebaseConfig);
    const db = usingLocalSync ? null : getDatabase(app);

    // Mode test local : permet de jouer sur le même PC dans deux onglets,
    // sans Firebase configuré. La synchro passe par localStorage + BroadcastChannel.
    const localChannel = usingLocalSync ? new BroadcastChannel("mille-bornes-local-sync") : null;
    let localRoomListener = null;

    if (localChannel) {
      localChannel.onmessage = event => {
        if (!event.data || event.data.roomId !== state.roomId || !localRoomListener) return;
        localRoomListener(localReadRoom(event.data.roomId));
      };
    }

    window.addEventListener("storage", event => {
      if (!usingLocalSync || !state.roomId || event.key !== localRoomKey(state.roomId) || !localRoomListener) return;
      localRoomListener(localReadRoom(state.roomId));
    });

    function localRoomKey(roomId) {
      return `mille-bornes-room-${roomId}`;
    }

    function localLeaderboardKey() {
      return "mille-bornes-leaderboard";
    }

    function localReadRoom(roomId) {
      return JSON.parse(localStorage.getItem(localRoomKey(roomId)) || "null");
    }

    function localWriteRoom(roomId, game) {
      localStorage.setItem(localRoomKey(roomId), JSON.stringify(game));
      if (localChannel) localChannel.postMessage({ roomId });
    }

    /*****************************************************************
     * 2) DONNÉES DU JEU
     *****************************************************************/
    const CARD_DEFS = {
      d25: { id: "d25", type: "distance", value: 25, name: "25 km", text: "Avance de 25 km.", count: 10 },
      d50: { id: "d50", type: "distance", value: 50, name: "50 km", text: "Avance de 50 km.", count: 10 },
      d75: { id: "d75", type: "distance", value: 75, name: "75 km", text: "Avance de 75 km.", count: 10 },
      d100: { id: "d100", type: "distance", value: 100, name: "100 km", text: "Avance de 100 km.", count: 12 },
      d200: { id: "d200", type: "distance", value: 200, name: "200 km", text: "Avance de 200 km. Max deux par joueur.", count: 4 },

      redLight: { id: "redLight", type: "attack", name: "Feu rouge", text: "Stoppe l'adversaire.", problem: "redLight", count: 5 },
      speedLimit: { id: "speedLimit", type: "attack", name: "Limitation", text: "Limite l'adversaire à 50 km.", problem: "speedLimit", count: 4 },
      flatTire: { id: "flatTire", type: "attack", name: "Crevaison", text: "L'adversaire doit réparer puis repartir.", problem: "flatTire", count: 3 },
      outOfGas: { id: "outOfGas", type: "attack", name: "Panne d'essence", text: "L'adversaire doit ravitailler puis repartir.", problem: "outOfGas", count: 3 },
      accident: { id: "accident", type: "attack", name: "Accident", text: "L'adversaire doit réparer puis repartir.", problem: "accident", count: 3 },

      greenLight: { id: "greenLight", type: "remedy", name: "Feu vert", text: "Permet de repartir.", solves: "redLight", count: 14 },
      endLimit: { id: "endLimit", type: "remedy", name: "Fin limitation", text: "Annule la limitation de vitesse.", solves: "speedLimit", count: 6 },
      spareTire: { id: "spareTire", type: "remedy", name: "Roue de secours", text: "Répare une crevaison.", solves: "flatTire", count: 6 },
      gas: { id: "gas", type: "remedy", name: "Essence", text: "Répare une panne d'essence.", solves: "outOfGas", count: 6 },
      repair: { id: "repair", type: "remedy", name: "Réparations", text: "Répare un accident.", solves: "accident", count: 6 },

      rightOfWay: { id: "rightOfWay", type: "safety", name: "Prioritaire", text: "Protège contre feu rouge et limitation.", protects: ["redLight", "speedLimit"], count: 1 },
      punctureProof: { id: "punctureProof", type: "safety", name: "Increvable", text: "Protège contre crevaison.", protects: ["flatTire"], count: 1 },
      extraTank: { id: "extraTank", type: "safety", name: "Citerne", text: "Protège contre panne d'essence.", protects: ["outOfGas"], count: 1 },
      drivingAce: { id: "drivingAce", type: "safety", name: "As du volant", text: "Protège contre accident.", protects: ["accident"], count: 1 }
    };

    const PROBLEM_LABELS = {
      none: "OK",
      redLight: "Feu rouge",
      speedLimit: "Limité",
      flatTire: "Crevaison",
      outOfGas: "Panne essence",
      accident: "Accident"
    };

    const SAFETY_BY_PROBLEM = Object.values(CARD_DEFS)
      .filter(card => card.type === "safety")
      .reduce((acc, card) => {
        card.protects.forEach(problem => acc[problem] = card.id);
        return acc;
      }, {});

    const urlParams = new URLSearchParams(location.search);
    const forceNewPlayer = urlParams.has("newPlayer");
    const storedPlayerId = localStorage.getItem("mille-bornes-player-id");

    const state = {
      playerId: forceNewPlayer || !storedPlayerId ? crypto.randomUUID() : storedPlayerId,
      playerName: localStorage.getItem("mille-bornes-player-name") || "",
      roomId: "",
      game: null,
      unsub: null,
      selectedCard: null
    };
    localStorage.setItem("mille-bornes-player-id", state.playerId);

    /*****************************************************************
     * 3) HELPERS UI
     *****************************************************************/
    const $ = selector => document.querySelector(selector);

    const refs = {
      lobbyScreen: $("#lobbyScreen"),
      gameScreen: $("#gameScreen"),
      playerName: $("#playerName"),
      roomId: $("#roomId"),
      createRoomBtn: $("#createRoomBtn"),
      joinRoomBtn: $("#joinRoomBtn"),
      quickRoomBtn: $("#quickRoomBtn"),
      leaderboardList: $("#leaderboardList"),
      roomLabel: $("#roomLabel"),
      turnPill: $("#turnPill"),
      deckCount: $("#deckCount"),
      discardTop: $("#discardTop"),
      roundState: $("#roundState"),
      playersArea: $("#playersArea"),
      drawBtn: $("#drawBtn"),
      endTurnBtn: $("#endTurnBtn"),
      log: $("#log"),
      scorePill: $("#scorePill"),
      handDrawer: $("#handDrawer"),
      drawerHandle: $("#drawerHandle"),
      handTitle: $("#handTitle"),
      handCount: $("#handCount"),
      handCards: $("#handCards"),
      toast: $("#toast")
    };

    refs.playerName.value = state.playerName;

    function toast(message) {
      refs.toast.textContent = message;
      refs.toast.classList.add("show");
      setTimeout(() => refs.toast.classList.remove("show"), 1700);
    }

    function iconFor(card) {
      if (card.type === "distance") return "<svg viewBox='0 0 24 24' fill='none'><path d='M5 12h14M13 6l6 6-6 6' stroke='#333' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'/></svg>";
      if (card.type === "attack") return "<svg viewBox='0 0 24 24' fill='none'><path d='M12 8v5M12 17h.01M10.3 4.4 2.8 17.5A2 2 0 0 0 4.5 20h15a2 2 0 0 0 1.7-2.5L13.7 4.4a2 2 0 0 0-3.4 0Z' stroke='#333' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'/></svg>";
      if (card.type === "remedy") return "<svg viewBox='0 0 24 24' fill='none'><path d='M12 5v14M5 12h14' stroke='#333' stroke-width='2' stroke-linecap='round'/></svg>";
      return "<svg viewBox='0 0 24 24' fill='none'><path d='M12 3 5 6v5c0 5 3.2 8.7 7 10 3.8-1.3 7-5 7-10V6l-7-3Z' stroke='#333' stroke-width='2' stroke-linejoin='round'/></svg>";
    }

    function cardName(cardId) {
      return CARD_DEFS[cardId]?.name || "-";
    }

    /*****************************************************************
     * 4) CRÉATION DE DECK ET ÉTAT INITIAL
     *****************************************************************/
    function shuffle(array) {
      const copy = [...array];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function buildDeck() {
      const deck = [];
      Object.values(CARD_DEFS).forEach(card => {
        for (let i = 0; i < card.count; i++) deck.push(card.id);
      });
      return shuffle(deck);
    }

    function makePlayer(name) {
      return {
        id: crypto.randomUUID(),
        name,
        hand: [],
        distance: 0,
        speedLimit: false,
        problem: "redLight",
        safeties: [],
        distanceCards: [],
        score: 0,
        wins: 0,
        losses: 0,
        drewThisTurn: false
      };
    }

    function createInitialGame(firstPlayerName) {
      const deck = buildDeck();
      const p1 = makePlayer(firstPlayerName);
      p1.id = state.playerId;
      p1.hand = deck.splice(0, 6);

      return {
        createdAt: Date.now(),
        status: "waiting",
        hostId: state.playerId,
        players: { [p1.id]: p1 },
        playerOrder: [p1.id],
        turnPlayerId: p1.id,
        deck,
        discard: [],
        log: [`${firstPlayerName} a créé le salon.`],
        winnerId: null,
        round: 1
      };
    }

    /*****************************************************************
     * 5) SYNCHRONISATION FIREBASE
     *****************************************************************/
    function roomRef(roomId) {
      return ref(db, `rooms/${roomId}`);
    }

    async function readRoom(roomId) {
      if (usingLocalSync) return localReadRoom(roomId);
      const snap = await get(roomRef(roomId));
      return snap.exists() ? snap.val() : null;
    }

    async function saveGame(nextGame) {
      if (usingLocalSync) {
        localWriteRoom(state.roomId, nextGame);
        state.game = nextGame;
        render();
        return;
      }
      await set(roomRef(state.roomId), nextGame);
    }

    async function mutateGame(mutator) {
      if (usingLocalSync) {
        const current = localReadRoom(state.roomId);
        if (!current) throw new Error("Salon introuvable.");
        const next = mutator(structuredClone(current));
        localWriteRoom(state.roomId, next);
        state.game = next;
        render();
        return;
      }

      await runTransaction(roomRef(state.roomId), current => {
        if (!current) return current;
        return mutator(structuredClone(current));
      });
    }

    function subscribeRoom(roomId) {
      if (state.unsub) state.unsub();

      if (usingLocalSync) {
        localRoomListener = game => {
          state.game = game;
          render();
        };
        localRoomListener(localReadRoom(roomId));
        state.unsub = () => { localRoomListener = null; };
        return;
      }

      state.unsub = onValue(roomRef(roomId), snapshot => {
        state.game = snapshot.val();
        render();
      });
    }

    async function loadLeaderboard() {
      const board = usingLocalSync
        ? JSON.parse(localStorage.getItem(localLeaderboardKey()) || "{}")
        : ((await get(ref(db, "leaderboard"))).val() || {});
      const rows = Object.values(board)
        .sort((a, b) => (b.wins / Math.max(1, b.games)) - (a.wins / Math.max(1, a.games)))
        .slice(0, 8);

      refs.leaderboardList.innerHTML = rows.length ? rows.map(row => {
        const ratio = Math.round((row.wins / Math.max(1, row.games)) * 100);
        return `<div class="leader-row"><strong>${escapeHtml(row.name)}</strong><span>${ratio}% · ${row.wins}/${row.games}</span></div>`;
      }).join("") : `<div class="leader-row"><span>Aucun résultat</span><span>-</span></div>`;
    }

    async function recordWin(winner, loser) {
      if (usingLocalSync) {
        const board = JSON.parse(localStorage.getItem(localLeaderboardKey()) || "{}");
        board[winner.id] = {
          name: winner.name,
          wins: (board[winner.id]?.wins || 0) + 1,
          games: (board[winner.id]?.games || 0) + 1
        };
        board[loser.id] = {
          name: loser.name,
          wins: board[loser.id]?.wins || 0,
          games: (board[loser.id]?.games || 0) + 1
        };
        localStorage.setItem(localLeaderboardKey(), JSON.stringify(board));
        loadLeaderboard().catch(console.error);
        return;
      }

      const updates = {};
      updates[`leaderboard/${winner.id}/name`] = winner.name;
      updates[`leaderboard/${winner.id}/wins`] = (winner.wins || 0) + 1;
      updates[`leaderboard/${winner.id}/games`] = (winner.wins || 0) + (winner.losses || 0) + 1;
      updates[`leaderboard/${loser.id}/name`] = loser.name;
      updates[`leaderboard/${loser.id}/wins`] = loser.wins || 0;
      updates[`leaderboard/${loser.id}/games`] = (loser.wins || 0) + (loser.losses || 0) + 1;
      await update(ref(db), updates);
    }

    /*****************************************************************
     * 6) RÈGLES DU JEU
     *****************************************************************/
    function currentPlayer(game) {
      return game.players[game.turnPlayerId];
    }

    function opponentOf(game, playerId) {
      const otherId = game.playerOrder.find(id => id !== playerId);
      return otherId ? game.players[otherId] : null;
    }

    function hasSafety(player, problem) {
      const safetyId = SAFETY_BY_PROBLEM[problem];
      return safetyId && player.safeties.includes(safetyId);
    }

    function canMove(player) {
      return player.problem === "none" || player.safeties.includes("rightOfWay");
    }

    function canPlayDistance(player, card) {
      if (!canMove(player)) return false;
      if (player.speedLimit && card.value > 50 && !player.safeties.includes("rightOfWay")) return false;
      if (card.value === 200 && player.distanceCards.filter(id => id === "d200").length >= 2) return false;
      if (player.distance + card.value > 1000) return false;
      return true;
    }

    function canPlayRemedy(player, card) {
      if (card.solves === "speedLimit") return player.speedLimit;
      return player.problem === card.solves;
    }

    function canAttack(opponent, card) {
      if (!opponent) return false;
      if (hasSafety(opponent, card.problem)) return false;
      if (card.problem === "speedLimit") return !opponent.speedLimit;
      return opponent.problem === "none" || opponent.safeties.includes("rightOfWay");
    }

    function canPlaySafety(player, card) {
      return !player.safeties.includes(card.id);
    }

    function validatePlay(game, playerId, cardId, target) {
      if (game.status !== "playing") return "La manche n'est pas active.";
      if (game.turnPlayerId !== playerId) return "Ce n'est pas ton tour.";
      const player = game.players[playerId];
      if (!player.hand.includes(cardId)) return "Cette carte n'est pas dans ta main.";
      const card = CARD_DEFS[cardId];
      const opponent = opponentOf(game, playerId);

      if (target === "discard") return null;
      if (card.type === "distance") return canPlayDistance(player, card) ? null : "Tu ne peux pas poser cette borne.";
      if (card.type === "remedy") return canPlayRemedy(player, card) ? null : "Cette parade ne correspond pas à ton état.";
      if (card.type === "attack") return canAttack(opponent, card) ? null : "Cette attaque n'est pas possible.";
      if (card.type === "safety") return canPlaySafety(player, card) ? null : "Cette botte est déjà posée.";
      return "Action invalide.";
    }

    function removeCardFromHand(player, cardId) {
      const index = player.hand.indexOf(cardId);
      if (index >= 0) player.hand.splice(index, 1);
    }

    function playCardInGame(game, playerId, cardId, target) {
      const error = validatePlay(game, playerId, cardId, target);
      if (error) throw new Error(error);

      const player = game.players[playerId];
      const opponent = opponentOf(game, playerId);
      const card = CARD_DEFS[cardId];
      removeCardFromHand(player, cardId);

      if (target === "discard") {
        game.discard.push(cardId);
        game.log.unshift(`${player.name} défausse ${card.name}.`);
        return game;
      }

      if (card.type === "distance") {
        player.distance += card.value;
        player.distanceCards.push(cardId);
        game.log.unshift(`${player.name} pose ${card.name}.`);
      }

      if (card.type === "remedy") {
        if (card.solves === "speedLimit") player.speedLimit = false;
        else player.problem = "none";
        game.discard.push(cardId);
        game.log.unshift(`${player.name} joue ${card.name}.`);
      }

      if (card.type === "attack") {
        if (card.problem === "speedLimit") opponent.speedLimit = true;
        else opponent.problem = card.problem;
        game.discard.push(cardId);
        game.log.unshift(`${player.name} attaque avec ${card.name}.`);
      }

      if (card.type === "safety") {
        player.safeties.push(cardId);
        card.protects.forEach(problem => {
          if (problem === "speedLimit") player.speedLimit = false;
          if (player.problem === problem) player.problem = "none";
        });
        game.log.unshift(`${player.name} pose la botte ${card.name}.`);
      }

      if (player.distance === 1000) finishRound(game, playerId);
      return game;
    }

    function tryCoupFourre(game, attackedPlayerId, attackCardId) {
      const attacked = game.players[attackedPlayerId];
      const attack = CARD_DEFS[attackCardId];
      const safetyId = SAFETY_BY_PROBLEM[attack.problem];
      if (!safetyId || !attacked.hand.includes(safetyId)) return false;

      removeCardFromHand(attacked, safetyId);
      attacked.safeties.push(safetyId);
      attacked.problem = "none";
      if (attack.problem === "speedLimit") attacked.speedLimit = false;
      attacked.score += 300;
      game.turnPlayerId = attackedPlayerId;
      game.log.unshift(`Coup-fourré ! ${attacked.name} pose ${CARD_DEFS[safetyId].name}.`);
      return true;
    }

    function nextTurn(game) {
      const index = game.playerOrder.indexOf(game.turnPlayerId);
      const nextIndex = (index + 1) % game.playerOrder.length;
      game.turnPlayerId = game.playerOrder[nextIndex];
      game.players[game.turnPlayerId].drewThisTurn = false;
    }

    function drawFor(game, playerId) {
      const player = game.players[playerId];
      if (game.status !== "playing") throw new Error("La manche n'est pas active.");
      if (game.turnPlayerId !== playerId) throw new Error("Ce n'est pas ton tour.");
      if (player.drewThisTurn) throw new Error("Tu as déjà pioché ce tour-ci.");
      if (!game.deck.length) throw new Error("La pioche est vide.");
      player.hand.push(game.deck.shift());
      player.drewThisTurn = true;
      game.log.unshift(`${player.name} pioche.`);
      return game;
    }

    function finishRound(game, winnerId) {
      const winner = game.players[winnerId];
      const loser = opponentOf(game, winnerId);
      winner.wins = (winner.wins || 0) + 1;
      loser.losses = (loser.losses || 0) + 1;
      winner.score += calculateScore(winner, true);
      loser.score += calculateScore(loser, false);
      game.status = "finished";
      game.winnerId = winnerId;
      game.log.unshift(`${winner.name} gagne la manche !`);
      recordWin(winner, loser).catch(console.error);
    }

    function calculateScore(player, won) {
      let score = player.distance;
      score += player.safeties.length * 100;
      if (won) score += 400;
      if (player.distance === 1000) score += 300;
      return score;
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    /*****************************************************************
     * 7) ACTIONS UTILISATEUR
     *****************************************************************/
    function getLobbyInput() {
      const name = refs.playerName.value.trim() || "Pilote";
      const roomId = refs.roomId.value.trim().toLowerCase().replace(/[^a-z0-9-]/g, "") || `route-${Math.floor(Math.random() * 9999)}`;
      state.playerName = name;
      state.roomId = roomId;
      localStorage.setItem("mille-bornes-player-name", name);
      return { name, roomId };
    }

    refs.createRoomBtn.addEventListener("click", async () => {
      try {
        const { name, roomId } = getLobbyInput();
        const existing = await readRoom(roomId);
        if (existing) return toast("Ce salon existe déjà.");
        await saveGame(createInitialGame(name));
        enterRoom(roomId);
      } catch (error) {
        console.error(error);
        toast(error.message || "Erreur création salon.");
      }
    });

    refs.joinRoomBtn.addEventListener("click", async () => {
      try {
        const { name, roomId } = getLobbyInput();
        const game = await readRoom(roomId);
        if (!game) return toast("Salon introuvable.");

        const sameBrowserHost = game.playerOrder.length === 1 && game.players[state.playerId];
        if (sameBrowserHost) {
          state.playerId = crypto.randomUUID();
          localStorage.setItem("mille-bornes-player-id", state.playerId);
        }

        if (!game.players[state.playerId]) {
          if (game.playerOrder.length >= 2) return toast("Salon complet.");
          const deck = game.deck || [];
          const player = makePlayer(name);
          player.id = state.playerId;
          player.hand = deck.splice(0, 6);
          game.deck = deck;
          game.players[state.playerId] = player;
          game.playerOrder.push(state.playerId);
          game.status = "playing";
          game.log.unshift(`${name} rejoint la partie.`);

          if (usingLocalSync) localWriteRoom(roomId, game);
          else await set(roomRef(roomId), game);
        }

        enterRoom(roomId);
      } catch (error) {
        console.error(error);
        toast(error.message || "Erreur rejoindre salon.");
      }
    });

    refs.quickRoomBtn.addEventListener("click", () => {
      refs.roomId.value = `route-${Math.floor(1000 + Math.random() * 9000)}`;
      refs.createRoomBtn.click();
    });

    function enterRoom(roomId) {
      state.roomId = roomId;
      refs.lobbyScreen.classList.add("hidden");
      refs.gameScreen.classList.remove("hidden");
      refs.roomLabel.textContent = `Salon ${roomId}`;
      subscribeRoom(roomId);
    }

    refs.drawBtn.addEventListener("click", async () => {
      try {
        await mutateGame(game => drawFor(game, state.playerId));
      } catch (error) {
        toast(error.message);
      }
    });

    refs.endTurnBtn.addEventListener("click", async () => {
      try {
        await mutateGame(game => {
          if (game.turnPlayerId !== state.playerId) throw new Error("Ce n'est pas ton tour.");
          nextTurn(game);
          return game;
        });
      } catch (error) {
        toast(error.message);
      }
    });

    refs.drawerHandle.addEventListener("click", () => {
      refs.handDrawer.classList.toggle("open");
    });

    async function playCard(cardId, target) {
      try {
        await mutateGame(game => {
          const player = game.players[state.playerId];
          const opponent = opponentOf(game, state.playerId);
          const card = CARD_DEFS[cardId];

          playCardInGame(game, state.playerId, cardId, target);

          if (target !== "discard" && card.type === "attack" && opponent) {
            tryCoupFourre(game, opponent.id, cardId);
          }

          if (game.status === "playing" && game.turnPlayerId === state.playerId) {
            nextTurn(game);
          }

          return game;
        });
      } catch (error) {
        toast(error.message);
      }
    }

    /*****************************************************************
     * 8) RENDU
     *****************************************************************/
    function render() {
      const game = state.game;
      if (!game) return;

      const me = game.players[state.playerId];
      const isMyTurn = game.turnPlayerId === state.playerId;
      const players = game.playerOrder.map(id => game.players[id]).filter(Boolean);
      const p1 = players[0];
      const p2 = players[1];

      refs.turnPill.textContent = game.status === "waiting" ? "En attente" : isMyTurn ? "À toi" : "Adversaire";
      refs.deckCount.textContent = game.deck?.length || 0;
      refs.discardTop.textContent = cardName(game.discard?.at(-1));
      refs.roundState.textContent = game.status === "finished" ? "Finie" : game.status === "waiting" ? "Attente" : "Active";
      refs.scorePill.textContent = p1 && p2 ? `${p1.score || 0} - ${p2.score || 0}` : "0 - 0";
      refs.drawBtn.disabled = !me || !isMyTurn || game.status !== "playing" || me.drewThisTurn;
      refs.endTurnBtn.disabled = !me || !isMyTurn || game.status !== "playing";

      refs.playersArea.innerHTML = players.map(player => renderPlayer(player, player.id === state.playerId)).join("");
      refs.log.innerHTML = (game.log || []).slice(0, 12).map(item => `<div>${escapeHtml(item)}</div>`).join("");

      renderHand(me, isMyTurn, game.status === "playing");
    }

    function renderPlayer(player, isMe) {
      return `
        <section class="card-panel player-card">
          <div class="player-head">
            <div>
              <div class="player-name">${escapeHtml(player.name)} ${isMe ? "· toi" : ""}</div>
              <small>${player.distance}/1000 km · ${PROBLEM_LABELS[player.problem] || player.problem}</small>
            </div>
            <span class="pill">${player.hand?.length || 0} cartes</span>
          </div>

          <div class="status-grid">
            <div class="metric"><small>Distance</small><strong>${player.distance}</strong></div>
            <div class="metric"><small>Vitesse</small><strong>${player.speedLimit ? "≤ 50" : "Libre"}</strong></div>
            <div class="metric"><small>État</small><strong>${PROBLEM_LABELS[player.problem] || "OK"}</strong></div>
          </div>

          <div class="zones">
            <div class="zone">
              <h4>Bottes</h4>
              <div class="mini-cards">${(player.safeties || []).map(id => `<span class="mini-card safety">${cardName(id)}</span>`).join("") || "<small>Aucune</small>"}</div>
            </div>
            <div class="zone">
              <h4>Bornes</h4>
              <div class="mini-cards">${(player.distanceCards || []).slice(-8).map(id => `<span class="mini-card distance">${cardName(id)}</span>`).join("") || "<small>Aucune</small>"}</div>
            </div>
          </div>
        </section>
      `;
    }

    function renderHand(player, isMyTurn, isPlaying) {
      if (!player) {
        refs.handTitle.textContent = "Main";
        refs.handCount.textContent = "0 carte";
        refs.handCards.innerHTML = "";
        return;
      }

      refs.handTitle.textContent = isMyTurn ? "Ta main · choisis une carte" : "Ta main";
      refs.handCount.textContent = `${player.hand.length} carte${player.hand.length > 1 ? "s" : ""}`;
      refs.handCards.innerHTML = player.hand.map(cardId => {
        const card = CARD_DEFS[cardId];
        const disabled = !isMyTurn || !isPlaying;
        return `
          <article class="game-card ${card.type}">
            <div>
              ${iconFor(card)}
              <h3>${escapeHtml(card.name)}</h3>
              <p>${escapeHtml(card.text)}</p>
            </div>
            <div class="card-actions">
              <button ${disabled ? "disabled" : ""} onclick="window.playCardFromUI('${cardId}', 'play')">Jouer</button>
              <button ${disabled ? "disabled" : ""} class="secondary" onclick="window.playCardFromUI('${cardId}', 'discard')">Jeter</button>
            </div>
          </article>
        `;
      }).join("");
    }

    window.playCardFromUI = (cardId, action) => {
      playCard(cardId, action === "discard" ? "discard" : "play");
    };

    loadLeaderboard().catch(console.error);
  </script>
</body>
</html>
