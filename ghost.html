<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ghost - Le Mot Fantôme</title>

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <!-- Lucide Icons CDN -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- Firebase Compat SDKs pour un fichier HTML simple -->
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'ui-sans-serif', 'system-ui'] },
          colors: {
            cream: '#F8F9FA',
            violet: '#7C3AED',
            mint: '#34D399',
            coral: '#FB7185',
            ink: '#111827'
          },
          boxShadow: {
            glass: '0 24px 80px rgba(17, 24, 39, 0.10)',
            glow: '0 0 40px rgba(124, 58, 237, 0.25)'
          }
        }
      }
    }
  </script>

  <style>
    * { -webkit-tap-highlight-color: transparent; }

    body {
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(124, 58, 237, 0.20), transparent 32rem),
        radial-gradient(circle at bottom right, rgba(52, 211, 153, 0.22), transparent 34rem),
        radial-gradient(circle at 75% 25%, rgba(251, 113, 133, 0.14), transparent 26rem),
        #F8F9FA;
      color: #111827;
      overflow-x: hidden;
    }

    .glass {
      background: rgba(255, 255, 255, 0.62);
      border: 1px solid rgba(255, 255, 255, 0.78);
      box-shadow: 0 24px 80px rgba(17, 24, 39, 0.10);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
    }

    .soft-card {
      border-radius: 32px;
      transition: transform 220ms ease, box-shadow 220ms ease, border-color 220ms ease;
    }

    .soft-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 32px 90px rgba(17, 24, 39, 0.14);
    }

    .pressable { transition: transform 120ms ease, opacity 180ms ease, box-shadow 180ms ease; }
    .pressable:active { transform: scale(0.96); }

    .screen { animation: fadeSlide 360ms ease both; }

    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(18px) scale(0.985); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .active-player {
      position: relative;
      border-color: rgba(124, 58, 237, 0.7) !important;
      box-shadow: 0 0 0 4px rgba(124, 58, 237, 0.12), 0 18px 50px rgba(124, 58, 237, 0.18);
    }

    .active-player::after {
      content: '';
      position: absolute;
      inset: -6px;
      border-radius: 30px;
      border: 2px solid rgba(124, 58, 237, 0.28);
      animation: pulseRing 1.4s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes pulseRing {
      0%, 100% { opacity: 0.35; transform: scale(0.99); }
      50% { opacity: 0.9; transform: scale(1.025); }
    }

    .letter-space {
      letter-spacing: 0.12em;
      text-indent: 0.12em;
    }

    .keyboard-grid {
      display: grid;
      grid-template-columns: repeat(9, minmax(0, 1fr));
      gap: 0.5rem;
    }

    @media (max-width: 520px) {
      .keyboard-grid { grid-template-columns: repeat(7, minmax(0, 1fr)); }
    }

    .toast { animation: toastIn 220ms ease both; }
    @keyframes toastIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body>
  <main class="min-h-screen px-4 py-6 sm:px-6 lg:px-8 flex items-center justify-center">
    <section class="w-full max-w-5xl">
      <header class="mb-7 flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
        <div>
          <div class="inline-flex items-center gap-2 rounded-full border border-white/70 bg-white/55 px-4 py-2 text-sm font-bold text-gray-700 shadow-sm backdrop-blur-xl">
            <i data-lucide="ghost" class="h-4 w-4 text-violet"></i>
            Le Mot Fantôme
          </div>
          <h1 class="mt-4 text-4xl font-black tracking-tight text-ink sm:text-6xl">Ghost</h1>
          <p class="mt-2 max-w-xl text-base font-medium text-gray-600 sm:text-lg">10 manches. Les joueurs commencent à tour de rôle. Écris un mot, valide-le, et gagne le point si le mot existe.</p>
        </div>

        <button id="resetBtn" class="pressable hidden rounded-full bg-white/70 px-5 py-3 text-sm font-extrabold text-gray-700 shadow-sm ring-1 ring-white/80 backdrop-blur hover:bg-white">
          Quitter
        </button>
      </header>

      <div id="app" class="screen"></div>
    </section>
  </main>

  <div id="toast" class="fixed bottom-5 left-1/2 z-50 hidden w-[calc(100%-2rem)] max-w-md -translate-x-1/2 rounded-3xl border border-white/70 bg-white/80 p-4 text-center text-sm font-bold text-gray-700 shadow-glass backdrop-blur-xl"></div>

  <script>
    /************************************************************
     * 1. CONFIGURATION FIREBASE
     * Remplace ces placeholders par ta configuration Firebase.
     ************************************************************/
   const firebaseConfig = {
  apiKey: "AIzaSyDc2vXIRfWp2OCkcNrr13pme-x0kKbn3DM",
  authDomain: "mille-bornes-355ca.firebaseapp.com",
  databaseURL: "https://mille-bornes-355ca-default-rtdb.firebaseio.com",
  projectId: "mille-bornes-355ca",
  storageBucket: "mille-bornes-355ca.appspot.com",
  messagingSenderId: "1018160779227",
  appId: "1:1018160779227:web:e686d32f117dfef63261fe"
};

    let db = null;
    let firebaseReady = false;

    try {
      firebase.initializeApp(firebaseConfig);
      db = firebase.database();
      firebaseReady = !firebaseConfig.apiKey.includes('YOUR_');
    } catch (error) {
      console.warn('Firebase non initialisé. Renseigne firebaseConfig.', error);
    }

    /************************************************************
     * 2. DICTIONNAIRE EXTERNE EN LIGNE
     * Ici on utilise l'API publique MediaWiki du Wiktionnaire FR.
     * Avantage : pas de liste locale limitée.
     * Limite : cela vérifie l'existence d'une page Wiktionnaire, pas un dictionnaire arbitral officiel.
     * Tu peux remplacer cette fonction par ta propre API plus tard.
     ************************************************************/
    const wordValidityCache = new Map();

    function normalizeWord(value) {
      return String(value || '')
        .toLowerCase()
        .normalize('NFD')
        .replace(/[̀-ͯ]/g, '')
        .replace(/[^a-zœæ]/g, '')
        .replaceAll('œ', 'oe')
        .replaceAll('æ', 'ae');
    }

    async function checkValidity(word) {
      const normalized = normalizeWord(word);
      if (!normalized || normalized.length < 2) return false;

      if (wordValidityCache.has(normalized)) {
        return wordValidityCache.get(normalized);
      }

      const url = 'https://fr.wiktionary.org/w/api.php?' + new URLSearchParams({
        action: 'query',
        format: 'json',
        origin: '*',
        titles: normalized
      });

      try {
        const response = await fetch(url);
        if (!response.ok) throw new Error('Réponse API invalide');
        const data = await response.json();
        const pages = data?.query?.pages || {};
        const exists = Object.values(pages).some(page => !page.missing && page.pageid);
        wordValidityCache.set(normalized, exists);
        return exists;
      } catch (error) {
        console.warn('Erreur dictionnaire externe :', error);
        throw new Error('Le dictionnaire en ligne ne répond pas. Réessaie dans quelques secondes.');
      }
    }

    /************************************************************
     * 3. ÉTAT LOCAL
     ************************************************************/
    const TOTAL_ROUNDS = 10;
    const app = document.getElementById('app');
    const resetBtn = document.getElementById('resetBtn');
    const toast = document.getElementById('toast');

    const localPlayerId = getOrCreateLocalId();
    let roomId = new URLSearchParams(location.search).get('room') || '';
    let roomRef = null;
    let unsubscribeRoom = null;
    let currentRoom = null;
    let isCheckingWord = false;

    function getOrCreateLocalId() {
      const key = 'ghostPlayerId';
      let id = localStorage.getItem(key);
      if (!id) {
        id = 'p_' + Math.random().toString(36).slice(2, 11);
        localStorage.setItem(key, id);
      }
      return id;
    }

    function showToast(message, type = 'info') {
      toast.textContent = message;
      toast.className = 'fixed bottom-5 left-1/2 z-50 w-[calc(100%-2rem)] max-w-md -translate-x-1/2 rounded-3xl border p-4 text-center text-sm font-extrabold shadow-glass backdrop-blur-xl toast ' +
        (type === 'error'
          ? 'border-coral/30 bg-rose-50/90 text-rose-700'
          : type === 'success'
            ? 'border-mint/30 bg-emerald-50/90 text-emerald-700'
            : 'border-white/70 bg-white/80 text-gray-700');
      toast.classList.remove('hidden');
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => toast.classList.add('hidden'), 3400);
    }

    function setScreen(html) {
      app.classList.remove('screen');
      void app.offsetWidth;
      app.innerHTML = html;
      app.classList.add('screen');
      lucide.createIcons();
    }

    function requireFirebase() {
      if (!firebaseReady || !db) {
        showToast('Ajoute ta configuration Firebase avant de lancer une partie.', 'error');
        return false;
      }
      return true;
    }

    function generateRoomId() {
      const letters = 'ABCDEFGHJKLMNPQRSTUVWXYZ';
      return Array.from({ length: 4 }, () => letters[Math.floor(Math.random() * letters.length)]).join('');
    }

    function makePlayer(slot) {
      return {
        id: localPlayerId,
        name: slot === 'p1' ? 'Joueur 1' : 'Joueur 2',
        slot,
        joinedAt: Date.now()
      };
    }

    /************************************************************
     * 4. ÉCRAN D'ENTRÉE
     ************************************************************/
    function renderHome() {
      resetBtn.classList.add('hidden');
      setScreen(`
        <div class="grid gap-5 lg:grid-cols-5">
          <button id="createGameBtn" class="soft-card pressable glass group min-h-[260px] p-7 text-left lg:col-span-3">
            <div class="flex h-full flex-col justify-between gap-8">
              <div class="flex items-start justify-between gap-5">
                <div class="rounded-[28px] bg-violet p-4 text-white shadow-glow">
                  <i data-lucide="sparkles" class="h-8 w-8"></i>
                </div>
                <span class="rounded-full bg-violet/10 px-4 py-2 text-sm font-black text-violet">Host</span>
              </div>
              <div>
                <h2 class="text-3xl font-black tracking-tight text-ink sm:text-4xl">Créer une partie</h2>
                <p class="mt-3 max-w-md text-base font-semibold leading-7 text-gray-600">Génère un code de 4 lettres. La partie se joue en ${TOTAL_ROUNDS} manches avec alternance du premier joueur.</p>
              </div>
            </div>
          </button>

          <div class="soft-card glass min-h-[260px] p-7 lg:col-span-2">
            <div class="flex h-full flex-col justify-between gap-7">
              <div class="flex items-start justify-between gap-5">
                <div class="rounded-[28px] bg-mint p-4 text-white shadow-lg">
                  <i data-lucide="log-in" class="h-8 w-8"></i>
                </div>
                <span class="rounded-full bg-mint/10 px-4 py-2 text-sm font-black text-emerald-600">Join</span>
              </div>

              <div>
                <h2 class="text-3xl font-black tracking-tight text-ink">Rejoindre</h2>
                <p class="mt-3 text-base font-semibold leading-7 text-gray-600">Entre le code reçu.</p>
              </div>

              <div class="flex gap-3">
                <input id="joinInput" maxlength="4" placeholder="ABCD" class="w-full rounded-[24px] border border-white/80 bg-white/75 px-5 py-4 text-center text-2xl font-black uppercase tracking-[0.35em] text-ink outline-none ring-0 transition focus:border-violet/30 focus:bg-white focus:shadow-glow" />
                <button id="joinBtn" class="pressable rounded-[24px] bg-ink px-5 text-white shadow-lg hover:opacity-90" aria-label="Rejoindre la partie">
                  <i data-lucide="arrow-right" class="h-6 w-6"></i>
                </button>
              </div>
            </div>
          </div>
        </div>

        <div class="mt-5 grid gap-5 md:grid-cols-3">
          <div class="glass rounded-[28px] p-5">
            <div class="flex items-center gap-3 text-sm font-black text-gray-700"><i data-lucide="keyboard" class="h-5 w-5 text-coral"></i> Plusieurs lettres</div>
            <p class="mt-2 text-sm font-semibold leading-6 text-gray-500">Chaque joueur peut composer le mot qu'il veut pendant son tour.</p>
          </div>
          <div class="glass rounded-[28px] p-5">
            <div class="flex items-center gap-3 text-sm font-black text-gray-700"><i data-lucide="database" class="h-5 w-5 text-violet"></i> Dico en ligne</div>
            <p class="mt-2 text-sm font-semibold leading-6 text-gray-500">Validation via Wiktionnaire français, sans liste locale limitée.</p>
          </div>
          <div class="glass rounded-[28px] p-5">
            <div class="flex items-center gap-3 text-sm font-black text-gray-700"><i data-lucide="trophy" class="h-5 w-5 text-mint"></i> 10 manches</div>
            <p class="mt-2 text-sm font-semibold leading-6 text-gray-500">Le score final départage les joueurs après la dixième manche.</p>
          </div>
        </div>
      `);

      document.getElementById('createGameBtn').addEventListener('click', createGame);
      document.getElementById('joinBtn').addEventListener('click', () => joinGame(document.getElementById('joinInput').value));
      document.getElementById('joinInput').addEventListener('input', (e) => {
        e.target.value = e.target.value.toUpperCase().replace(/[^A-Z]/g, '');
      });
      document.getElementById('joinInput').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') joinGame(e.target.value);
      });
    }

    /************************************************************
     * 5. FIREBASE ROOMS
     ************************************************************/
    async function createGame() {
      if (!requireFirebase()) return;

      roomId = generateRoomId();
      roomRef = db.ref('ghostRooms/' + roomId);

      const room = {
        roomId,
        currentWord: '',
        turn: localPlayerId,
        round: 1,
        totalRounds: TOTAL_ROUNDS,
        starterSlot: 'p1',
        scores: { p1: 0, p2: 0 },
        roundResult: null,
        matchWinner: null,
        status: 'lobby',
        lastAction: 'Partie créée.',
        createdAt: Date.now(),
        players: { p1: makePlayer('p1') }
      };

      await roomRef.set(room);
      history.replaceState(null, '', '?room=' + roomId);
      listenRoom(roomId);
      showToast('Partie créée. Code : ' + roomId, 'success');
    }

    async function joinGame(rawCode) {
      if (!requireFirebase()) return;

      const code = String(rawCode || '').toUpperCase().trim();
      if (code.length !== 4) {
        showToast('Entre un code de 4 lettres.', 'error');
        return;
      }

      roomId = code;
      roomRef = db.ref('ghostRooms/' + roomId);
      const snapshot = await roomRef.get();

      if (!snapshot.exists()) {
        showToast('Partie introuvable.', 'error');
        return;
      }

      const room = snapshot.val();
      const existingSlot = getMySlot(room);

      if (!existingSlot) {
        if (room.players?.p2) {
          showToast('Cette partie est déjà complète.', 'error');
          return;
        }
        await roomRef.child('players/p2').set(makePlayer('p2'));
        await roomRef.update({ status: 'playing', lastAction: 'Joueur 2 a rejoint la partie.' });
      }

      history.replaceState(null, '', '?room=' + roomId);
      listenRoom(roomId);
      showToast('Partie rejointe.', 'success');
    }

    function listenRoom(code) {
      if (unsubscribeRoom) roomRef.off('value', unsubscribeRoom);
      roomRef = db.ref('ghostRooms/' + code);
      unsubscribeRoom = roomRef.on('value', snapshot => {
        currentRoom = snapshot.val();
        if (!currentRoom) {
          renderHome();
          showToast('La partie a été supprimée.', 'error');
          return;
        }
        renderRoom(currentRoom);
      });
    }

    function getMySlot(room) {
      if (room?.players?.p1?.id === localPlayerId) return 'p1';
      if (room?.players?.p2?.id === localPlayerId) return 'p2';
      return null;
    }

    function getOpponentSlot(slot) {
      return slot === 'p1' ? 'p2' : 'p1';
    }

    function getPlayerById(room, playerId) {
      return Object.values(room.players || {}).find(player => player.id === playerId);
    }

    function getSlotById(room, playerId) {
      if (room?.players?.p1?.id === playerId) return 'p1';
      if (room?.players?.p2?.id === playerId) return 'p2';
      return null;
    }

    function getPlayerLabel(room, slot) {
      return room.players?.[slot]?.name || (slot === 'p1' ? 'Joueur 1' : 'Joueur 2');
    }

    /************************************************************
     * 6. LOBBY + JEU
     ************************************************************/
    function renderRoom(room) {
      resetBtn.classList.remove('hidden');
      resetBtn.onclick = leaveRoom;

      const mySlot = getMySlot(room);
      const amInRoom = Boolean(mySlot);
      const isPlaying = room.status === 'playing' && room.players?.p1 && room.players?.p2;
      const isMyTurn = room.turn === localPlayerId;
      const activePlayer = getPlayerById(room, room.turn);
      const word = room.currentWord || '';

      setScreen(`
        <div class="glass rounded-[36px] p-5 sm:p-7 lg:p-8">
          <div class="flex flex-col gap-5 lg:flex-row lg:items-center lg:justify-between">
            <div>
              <div class="flex flex-wrap items-center gap-3">
                <span class="rounded-full bg-ink px-4 py-2 text-sm font-black text-white">Code ${room.roomId}</span>
                <button id="copyCodeBtn" class="pressable rounded-full bg-white/75 px-4 py-2 text-sm font-extrabold text-gray-700 ring-1 ring-white/80 hover:bg-white">Copier le code</button>
              </div>
              <h2 class="mt-5 text-3xl font-black tracking-tight text-ink sm:text-4xl">
                ${room.matchWinner ? 'Match terminé' : isPlaying ? `Manche ${room.round}/${room.totalRounds || TOTAL_ROUNDS}` : 'Lobby'}
              </h2>
              <p class="mt-2 text-base font-semibold text-gray-600">${escapeHtml(room.lastAction || 'En attente...')}</p>
            </div>

            <div class="grid min-w-full gap-3 sm:grid-cols-2 lg:min-w-[420px]">
              ${playerCard(room, 'p1', room.turn)}
              ${playerCard(room, 'p2', room.turn)}
            </div>
          </div>

          ${!amInRoom ? spectatorNotice() : ''}
          ${!isPlaying ? lobbyContent(room) : gameContent(room, isMyTurn, activePlayer, word)}
        </div>
      `);

      document.getElementById('copyCodeBtn')?.addEventListener('click', async () => {
        await navigator.clipboard.writeText(room.roomId);
        showToast('Code copié.', 'success');
      });

      if (isPlaying && amInRoom && !room.matchWinner) bindGameEvents(room, isMyTurn);
    }

    function playerCard(room, slot, activeId) {
      const player = room.players?.[slot];
      const connected = Boolean(player);
      const active = connected && player.id === activeId && !room.roundResult && !room.matchWinner;
      const score = room.scores?.[slot] || 0;
      const label = slot === 'p1' ? 'Joueur 1' : 'Joueur 2';
      const badgeColor = slot === 'p1' ? 'bg-violet/10 text-violet' : 'bg-mint/10 text-emerald-600';

      return `
        <div class="${active ? 'active-player' : ''} relative rounded-[26px] border border-white/80 bg-white/62 p-4 backdrop-blur transition">
          <div class="flex items-center justify-between gap-4">
            <div>
              <div class="text-xs font-black uppercase tracking-[0.22em] text-gray-400">${label}</div>
              <div class="mt-1 text-lg font-black text-ink">${connected ? escapeHtml(player.name) : 'En attente'}</div>
            </div>
            <div class="text-right">
              <div class="rounded-full ${connected ? badgeColor : 'bg-gray-100 text-gray-400'} px-3 py-2 text-xs font-black">${connected ? (active ? 'À jouer' : 'Connecté') : 'Vide'}</div>
              <div class="mt-2 text-sm font-black text-gray-600">${score} pt${score > 1 ? 's' : ''}</div>
            </div>
          </div>
        </div>
      `;
    }

    function spectatorNotice() {
      return `
        <div class="mt-6 rounded-[28px] border border-coral/20 bg-rose-50/70 p-5 text-sm font-extrabold text-rose-700">
          Cette partie est complète. Tu peux la regarder, mais pas jouer.
        </div>
      `;
    }

    function lobbyContent(room) {
      return `
        <div class="mt-7 rounded-[32px] bg-white/52 p-7 text-center ring-1 ring-white/70">
          <div class="mx-auto flex h-16 w-16 items-center justify-center rounded-[24px] bg-violet/10 text-violet">
            <i data-lucide="users" class="h-8 w-8"></i>
          </div>
          <h3 class="mt-5 text-2xl font-black text-ink">En attente du deuxième joueur</h3>
          <p class="mx-auto mt-3 max-w-lg text-base font-semibold leading-7 text-gray-600">Partage le code <span class="font-black text-violet">${room.roomId}</span>. La partie démarre automatiquement dès que Joueur 2 rejoint.</p>
        </div>
      `;
    }

    function gameContent(room, isMyTurn, activePlayer, word) {
      const matchWinner = room.matchWinner;
      const roundResult = room.roundResult;
      const displayWord = word ? word.toUpperCase() : '· · ·';
      const statusText = matchWinner
        ? matchWinner.reason
        : roundResult
          ? roundResult.reason
          : isMyTurn
            ? 'Compose un mot avec autant de lettres que tu veux, puis valide.'
            : `Tour de ${escapeHtml(activePlayer?.name || 'l’autre joueur')}.`;

      return `
        <div class="mt-8 grid gap-5 lg:grid-cols-5">
          <section class="rounded-[34px] bg-white/50 p-6 ring-1 ring-white/70 lg:col-span-3">
            <div class="flex items-center justify-between gap-4">
              <div>
                <p class="text-sm font-black uppercase tracking-[0.22em] text-gray-400">Mot proposé</p>
                <p class="mt-2 text-base font-extrabold text-gray-600">${escapeHtml(statusText)}</p>
              </div>
              <div class="rounded-full ${isMyTurn ? 'bg-violet/10 text-violet' : 'bg-coral/10 text-coral'} px-4 py-2 text-sm font-black">
                ${matchWinner ? 'Final' : roundResult ? 'Point attribué' : isMyTurn ? 'Ton tour' : 'Attente'}
              </div>
            </div>

            <div class="my-10 flex min-h-[150px] items-center justify-center rounded-[32px] border border-white/80 bg-white/65 px-5 py-8 shadow-inner">
              <div class="letter-space break-all text-center text-4xl font-black uppercase tracking-[0.12em] text-ink sm:text-6xl lg:text-7xl">${escapeHtml(displayWord)}</div>
            </div>

            ${matchWinner ? matchWinnerContent(room) : roundResult ? roundResultContent(room) : turnControls(isMyTurn, word)}
          </section>

          <aside class="flex flex-col gap-5 lg:col-span-2">
            <div class="rounded-[34px] bg-white/50 p-6 ring-1 ring-white/70">
              <h3 class="text-xl font-black text-ink">Score</h3>
              <div class="mt-5 space-y-3">
                ${scoreRow(room, 'p1')}
                ${scoreRow(room, 'p2')}
              </div>
              <div class="mt-5 rounded-[24px] bg-white/55 p-4 text-sm font-semibold leading-6 text-gray-600">
                Le joueur qui valide un mot existant gagne 1 point. Si le mot n'existe pas, il perd la manche et l'autre joueur gagne 1 point.
              </div>
            </div>

            <div class="rounded-[34px] bg-white/50 p-6 ring-1 ring-white/70">
              <div class="flex items-center gap-3">
                <div class="rounded-[22px] bg-violet/10 p-3 text-violet"><i data-lucide="repeat-2" class="h-6 w-6"></i></div>
                <div>
                  <h3 class="text-lg font-black text-ink">Alternance</h3>
                  <p class="text-sm font-bold text-gray-500">La manche suivante commence avec l'autre joueur.</p>
                </div>
              </div>
              <div class="mt-5 rounded-[24px] bg-white/55 p-4 text-sm font-semibold leading-6 text-gray-600">
                Manche ${room.round}/${room.totalRounds || TOTAL_ROUNDS}. Départ de cette manche : ${escapeHtml(getPlayerLabel(room, room.starterSlot || 'p1'))}.
              </div>
            </div>
          </aside>
        </div>
      `;
    }

    function scoreRow(room, slot) {
      const score = room.scores?.[slot] || 0;
      const name = getPlayerLabel(room, slot);
      const color = slot === 'p1' ? 'bg-violet' : 'bg-mint';
      const percent = Math.min(100, (score / Math.ceil((room.totalRounds || TOTAL_ROUNDS) / 2)) * 100);
      return `
        <div class="rounded-[24px] bg-white/60 p-4 ring-1 ring-white/80">
          <div class="flex items-center justify-between gap-3 text-sm font-black text-gray-700">
            <span>${escapeHtml(name)}</span>
            <span>${score}</span>
          </div>
          <div class="mt-3 h-3 overflow-hidden rounded-full bg-gray-100">
            <div class="h-full ${color} rounded-full transition-all" style="width:${percent}%"></div>
          </div>
        </div>
      `;
    }

    function turnControls(isMyTurn, word) {
      return `
        <div>
          <div class="mb-4 flex items-center justify-between gap-3">
            <p class="text-sm font-black uppercase tracking-[0.22em] text-gray-400">Clavier</p>
            <p class="text-sm font-extrabold ${isMyTurn ? 'text-violet' : 'text-gray-400'}">${isMyTurn ? 'Ajoute autant de lettres que tu veux' : 'Verrouillé'}</p>
          </div>
          <div class="keyboard-grid">
            ${'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('').map(letter => `
              <button data-letter="${letter}" ${isMyTurn ? '' : 'disabled'} class="pressable aspect-square rounded-[18px] bg-ink text-sm font-black text-white shadow-md transition hover:opacity-90 disabled:cursor-not-allowed disabled:bg-gray-200 disabled:text-gray-400 disabled:shadow-none sm:text-base">${letter}</button>
            `).join('')}
          </div>

          <div class="mt-5 grid gap-3 sm:grid-cols-3">
            <button id="backspaceBtn" ${isMyTurn && word ? '' : 'disabled'} class="pressable rounded-[24px] bg-white/75 px-5 py-4 text-base font-black text-gray-700 ring-1 ring-white/80 transition hover:bg-white disabled:cursor-not-allowed disabled:bg-gray-200 disabled:text-gray-400">
              Effacer
            </button>
            <button id="clearBtn" ${isMyTurn && word ? '' : 'disabled'} class="pressable rounded-[24px] bg-white/75 px-5 py-4 text-base font-black text-gray-700 ring-1 ring-white/80 transition hover:bg-white disabled:cursor-not-allowed disabled:bg-gray-200 disabled:text-gray-400">
              Vider
            </button>
            <button id="validateBtn" ${isMyTurn && word ? '' : 'disabled'} class="pressable rounded-[24px] bg-coral px-5 py-4 text-base font-black text-white shadow-lg transition hover:opacity-95 disabled:cursor-not-allowed disabled:bg-gray-200 disabled:text-gray-400 disabled:shadow-none">
              Valider le mot
            </button>
          </div>
        </div>
      `;
    }

    function roundResultContent(room) {
      const winnerSlot = room.roundResult?.pointSlot;
      return `
        <div class="rounded-[32px] border border-mint/20 bg-emerald-50/80 p-6 text-center">
          <div class="mx-auto flex h-16 w-16 items-center justify-center rounded-[24px] bg-mint text-white shadow-lg">
            <i data-lucide="badge-check" class="h-8 w-8"></i>
          </div>
          <h3 class="mt-5 text-3xl font-black text-ink">Point pour ${escapeHtml(getPlayerLabel(room, winnerSlot))}</h3>
          <p class="mt-2 text-base font-bold text-emerald-700">${escapeHtml(room.roundResult?.reason || 'Manche terminée.')}</p>
          <button id="nextRoundBtn" class="pressable mt-6 rounded-[28px] bg-ink px-6 py-4 text-base font-black text-white shadow-lg hover:opacity-90">Manche suivante</button>
        </div>
      `;
    }

    function matchWinnerContent(room) {
      const winnerSlot = room.matchWinner?.winnerSlot;
      const isDraw = winnerSlot === 'draw';
      return `
        <div class="rounded-[32px] border border-violet/20 bg-violet/10 p-6 text-center">
          <div class="mx-auto flex h-16 w-16 items-center justify-center rounded-[24px] bg-violet text-white shadow-lg">
            <i data-lucide="trophy" class="h-8 w-8"></i>
          </div>
          <h3 class="mt-5 text-3xl font-black text-ink">${isDraw ? 'Égalité !' : `${escapeHtml(getPlayerLabel(room, winnerSlot))} gagne le match !`}</h3>
          <p class="mt-2 text-base font-bold text-violet">${escapeHtml(room.matchWinner?.reason || 'Match terminé.')}</p>
          <button id="restartMatchBtn" class="pressable mt-6 rounded-[28px] bg-ink px-6 py-4 text-base font-black text-white shadow-lg hover:opacity-90">Rejouer 10 manches</button>
        </div>
      `;
    }

    function bindGameEvents(room, isMyTurn) {
      document.querySelectorAll('[data-letter]').forEach(button => {
        button.addEventListener('click', () => addLetter(button.dataset.letter));
      });

      document.getElementById('backspaceBtn')?.addEventListener('click', backspaceLetter);
      document.getElementById('clearBtn')?.addEventListener('click', clearWord);
      document.getElementById('validateBtn')?.addEventListener('click', validateWord);
      document.getElementById('nextRoundBtn')?.addEventListener('click', nextRound);
      document.getElementById('restartMatchBtn')?.addEventListener('click', restartMatch);
    }

    /************************************************************
     * 7. LOGIQUE DE JEU
     ************************************************************/
    async function addLetter(letter) {
      if (!currentRoom || currentRoom.roundResult || currentRoom.matchWinner) return;
      if (currentRoom.turn !== localPlayerId) {
        showToast("Ce n'est pas ton tour.", 'error');
        return;
      }

      const nextWord = normalizeWord((currentRoom.currentWord || '') + letter);
      await roomRef.update({
        currentWord: nextWord,
        lastAction: `${getPlayerById(currentRoom, localPlayerId)?.name || 'Un joueur'} compose son mot.`,
        updatedAt: Date.now()
      });
    }

    async function backspaceLetter() {
      if (!currentRoom || currentRoom.turn !== localPlayerId || currentRoom.roundResult || currentRoom.matchWinner) return;
      const nextWord = normalizeWord(currentRoom.currentWord || '').slice(0, -1);
      await roomRef.update({ currentWord: nextWord, updatedAt: Date.now() });
    }

    async function clearWord() {
      if (!currentRoom || currentRoom.turn !== localPlayerId || currentRoom.roundResult || currentRoom.matchWinner) return;
      await roomRef.update({ currentWord: '', updatedAt: Date.now() });
    }

    async function validateWord() {
      if (!currentRoom || currentRoom.roundResult || currentRoom.matchWinner || isCheckingWord) return;
      if (currentRoom.turn !== localPlayerId) {
        showToast("Ce n'est pas ton tour.", 'error');
        return;
      }

      const word = normalizeWord(currentRoom.currentWord || '');
      if (!word) {
        showToast('Compose un mot avant de valider.', 'error');
        return;
      }

      isCheckingWord = true;
      showToast('Vérification dans le dictionnaire en ligne...');

      try {
        const antiCheat = await checkAntiCheatWord(word);
        if (!antiCheat.allowed) {
          await applyRoundPoint({
            word,
            exists: false,
            forcedReason: antiCheat.reason
          });
          return;
        }

        const exists = await checkValidity(word);
        await applyRoundPoint({ word, exists });
      } catch (error) {
        showToast(error.message || 'Impossible de vérifier le mot.', 'error');
      } finally {
        isCheckingWord = false;
      }
    }

    async function applyRoundPoint({ word, exists, forcedReason = null }) {
      const freshSnapshot = await roomRef.get();
      const room = freshSnapshot.val() || currentRoom;
      if (!room || room.roundResult || room.matchWinner) return;

      const playerSlot = getSlotById(room, localPlayerId);
      const opponentSlot = getOpponentSlot(playerSlot);
      const pointSlot = exists ? playerSlot : opponentSlot;
      const nextScores = { ...(room.scores || { p1: 0, p2: 0 }) };
      nextScores[pointSlot] = (nextScores[pointSlot] || 0) + 1;

      const reason = forcedReason || (exists
        ? `${word.toUpperCase()} existe dans le dictionnaire. Mot validé.`
        : `${word.toUpperCase()} est introuvable. Point donné à l'autre joueur.`);

      const matchWinner = computeMatchWinner(room, nextScores);

      await roomRef.update({
        scores: nextScores,
        roundResult: {
          word,
          valid: exists,
          pointSlot,
          validatorSlot: playerSlot,
          reason
        },
        matchWinner,
        lastAction: reason,
        updatedAt: Date.now()
      });
    }

    async function checkAntiCheatWord(word) {
      const normalized = normalizeWord(word);

      const blockedEndings = [
        { suffix: 's', label: 'pluriel en S' },
        { suffix: 'x', label: 'pluriel en X' },
        { suffix: 'es', label: 'pluriel ou féminin en ES' },
        { suffix: 'e', label: 'féminin simple en E' },
        { suffix: 'ent', label: 'conjugaison en ENT' },
        { suffix: 'ons', label: 'conjugaison en ONS' },
        { suffix: 'ez', label: 'conjugaison en EZ' },
        { suffix: 'ais', label: 'conjugaison en AIS' },
        { suffix: 'ait', label: 'conjugaison en AIT' },
        { suffix: 'aient', label: 'conjugaison en AIENT' },
        { suffix: 'erai', label: 'conjugaison future en ERAI' },
        { suffix: 'eras', label: 'conjugaison future en ERAS' },
        { suffix: 'era', label: 'conjugaison future en ERA' },
        { suffix: 'eront', label: 'conjugaison future en ERONT' }
      ];

      for (const rule of blockedEndings) {
        if (normalized.length <= rule.suffix.length + 2) continue;
        if (!normalized.endsWith(rule.suffix)) continue;

        const base = normalized.slice(0, -rule.suffix.length);
        if (base.length < 2) continue;

        const baseExists = await checkValidity(base);
        if (baseExists) {
          return {
            allowed: false,
            reason: `${normalized.toUpperCase()} est bloqué : ajout de ${rule.label} à un mot déjà valide (${base.toUpperCase()}). Point donné à l'autre joueur.`
          };
        }
      }

      return { allowed: true };
    }

    function computeMatchWinner(room, scores) {
      const round = room.round || 1;
      const totalRounds = room.totalRounds || TOTAL_ROUNDS;
      if (round < totalRounds) return null;

      if ((scores.p1 || 0) > (scores.p2 || 0)) {
        return { winnerSlot: 'p1', reason: `${getPlayerLabel(room, 'p1')} gagne ${scores.p1} à ${scores.p2}.` };
      }
      if ((scores.p2 || 0) > (scores.p1 || 0)) {
        return { winnerSlot: 'p2', reason: `${getPlayerLabel(room, 'p2')} gagne ${scores.p2} à ${scores.p1}.` };
      }
      return { winnerSlot: 'draw', reason: `Score final : ${scores.p1} à ${scores.p2}.` };
    }

    async function nextRound() {
      if (!currentRoom || !currentRoom.roundResult || currentRoom.matchWinner) return;
      const nextRoundNumber = (currentRoom.round || 1) + 1;
      const nextStarterSlot = (currentRoom.starterSlot || 'p1') === 'p1' ? 'p2' : 'p1';
      const nextStarterId = currentRoom.players?.[nextStarterSlot]?.id;

      await roomRef.update({
        round: nextRoundNumber,
        starterSlot: nextStarterSlot,
        currentWord: '',
        roundResult: null,
        turn: nextStarterId,
        lastAction: `Manche ${nextRoundNumber} lancée. ${getPlayerLabel(currentRoom, nextStarterSlot)} commence.`,
        updatedAt: Date.now()
      });
    }

    async function restartMatch() {
      if (!currentRoom) return;
      await roomRef.update({
        currentWord: '',
        turn: currentRoom.players?.p1?.id,
        round: 1,
        totalRounds: TOTAL_ROUNDS,
        starterSlot: 'p1',
        scores: { p1: 0, p2: 0 },
        roundResult: null,
        matchWinner: null,
        status: 'playing',
        lastAction: 'Nouveau match lancé.',
        updatedAt: Date.now()
      });
    }

    function leaveRoom() {
      if (unsubscribeRoom && roomRef) roomRef.off('value', unsubscribeRoom);
      unsubscribeRoom = null;
      currentRoom = null;
      roomId = '';
      history.replaceState(null, '', location.pathname);
      renderHome();
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    /************************************************************
     * 8. INIT
     ************************************************************/
    renderHome();

    if (roomId && firebaseReady) {
      joinGame(roomId);
    }
  </script>
</body>
</html>
