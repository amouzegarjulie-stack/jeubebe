<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>1000 Bornes Mobile</title>

  <style>
    :root {
      --bg: #f6f8fc;
      --text: #121826;
      --muted: #737b8c;
      --card: rgba(255, 255, 255, 0.82);
      --card-solid: #ffffff;
      --border: rgba(15, 23, 42, 0.08);
      --border-strong: rgba(15, 23, 42, 0.14);
      --shadow: 0 18px 42px rgba(15, 23, 42, 0.09);
      --shadow-soft: 0 10px 24px rgba(15, 23, 42, 0.07);
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --sky: #38bdf8;
      --mint: #86efac;
      --mint-soft: #dcfce7;
      --coral: #fb7185;
      --coral-soft: #ffe4e6;
      --gold: #facc15;
      --gold-soft: #fef3c7;
      --violet: #a78bfa;
      --violet-soft: #ede9fe;
      --danger: #ef4444;
      --danger-dark: #dc2626;
      --road: #171d29;
      --road-light: #2b3443;
      --radius: 24px;
      --tap: 52px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      overscroll-behavior: none;
    }

    body {
      font-family: Inter, ui-rounded, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 0% 0%, rgba(56, 189, 248, 0.22), transparent 32%),
        radial-gradient(circle at 100% 6%, rgba(250, 204, 21, 0.22), transparent 28%),
        radial-gradient(circle at 50% 100%, rgba(167, 139, 250, 0.16), transparent 32%),
        linear-gradient(180deg, #f8fafc 0%, #eef2ff 100%);
      color: var(--text);
      min-height: 100dvh;
      overflow: hidden;
    }

    button,
    input {
      font: inherit;
    }

    button {
      min-height: var(--tap);
      border: 0;
      border-radius: 18px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
      font-weight: 900;
      padding: 0 18px;
      cursor: pointer;
      touch-action: manipulation;
      box-shadow: 0 12px 24px rgba(37, 99, 235, 0.22);
      transition: transform 120ms ease, opacity 120ms ease, box-shadow 120ms ease;
    }

    button:active {
      transform: scale(0.97);
    }

    button.secondary {
      background: #eef2ff;
      color: #1e293b;
      box-shadow: none;
    }

    button.ghost {
      background: rgba(255, 255, 255, 0.7);
      color: #1e293b;
      border: 1px solid var(--border);
      box-shadow: none;
    }

    button.danger {
      background: linear-gradient(135deg, var(--danger), var(--danger-dark));
      box-shadow: 0 12px 24px rgba(239, 68, 68, 0.2);
    }

    button:disabled {
      opacity: 0.42;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    input {
      width: 100%;
      min-height: var(--tap);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 0 15px;
      background: rgba(255, 255, 255, 0.78);
      color: var(--text);
      outline: none;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.55);
    }

    input:focus {
      border-color: rgba(37, 99, 235, 0.35);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.09);
    }

    .app {
      width: 100%;
      max-width: 480px;
      height: 100dvh;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    .screen {
      height: 100%;
      padding: calc(16px + env(safe-area-inset-top)) 18px calc(18px + env(safe-area-inset-bottom));
      overflow-y: auto;
    }

    .hidden {
      display: none !important;
    }

    .glass {
      background: var(--card);
      border: 1px solid rgba(255, 255, 255, 0.72);
      box-shadow: var(--shadow);
      backdrop-filter: blur(20px);
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: calc(12px + env(safe-area-inset-top)) 16px 12px;
      background: rgba(247, 248, 252, 0.72);
      border-bottom: 1px solid rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(22px);
      z-index: 5;
    }

    .title {
      font-size: 1.14rem;
      font-weight: 950;
      letter-spacing: -0.05em;
      line-height: 1.05;
    }

    #roomLabel {
      display: inline-block;
      margin-top: 2px;
      color: var(--muted);
      font-size: 0.74rem;
      font-weight: 800;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      border-radius: 999px;
      padding: 8px 12px;
      background: rgba(255, 255, 255, 0.76);
      border: 1px solid var(--border);
      color: #172033;
      font-size: 0.8rem;
      font-weight: 900;
      white-space: nowrap;
      box-shadow: 0 8px 18px rgba(15, 23, 42, 0.05);
    }

    .pill.hot {
      background: linear-gradient(135deg, #dbeafe, #bfdbfe);
      color: #1e3a8a;
    }

    .card-panel {
      background: var(--card);
      border: 1px solid rgba(255, 255, 255, 0.74);
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: var(--shadow-soft);
      backdrop-filter: blur(18px);
    }

    .landing {
      display: grid;
      align-content: start;
      gap: 16px;
      padding-top: calc(30px + env(safe-area-inset-top));
    }

    .hero-card {
      position: relative;
      overflow: hidden;
      min-height: 250px;
      padding: 22px;
      border-radius: 32px;
      background:
        radial-gradient(circle at top right, rgba(250, 204, 21, 0.28), transparent 32%),
        radial-gradient(circle at bottom left, rgba(56, 189, 248, 0.28), transparent 34%),
        linear-gradient(145deg, rgba(255, 255, 255, 0.88), rgba(255, 255, 255, 0.62));
      border: 1px solid rgba(255, 255, 255, 0.78);
      box-shadow: var(--shadow);
      backdrop-filter: blur(22px);
    }

    .hero-card::after {
      content: "";
      position: absolute;
      left: -20px;
      right: -20px;
      bottom: 28px;
      height: 72px;
      background:
        repeating-linear-gradient(90deg, transparent 0 22px, rgba(255, 255, 255, 0.34) 22px 34px),
        linear-gradient(180deg, var(--road-light), var(--road));
      transform: rotate(-4deg);
      border-radius: 999px;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.06);
    }

    .hero-car {
      position: absolute;
      right: 30px;
      bottom: 56px;
      z-index: 2;
      font-size: 3.2rem;
      filter: drop-shadow(0 14px 14px rgba(15, 23, 42, 0.28));
      animation: heroDrive 2.4s ease-in-out infinite;
    }

    @keyframes heroDrive {
      0%, 100% { transform: translateY(0) rotate(-4deg); }
      50% { transform: translateY(-7px) rotate(-2deg); }
    }

    .brand {
      position: relative;
      z-index: 3;
      display: grid;
      gap: 10px;
      max-width: 285px;
    }

    .brand h1 {
      margin: 0;
      font-size: clamp(2.55rem, 13vw, 4.35rem);
      letter-spacing: -0.09em;
      line-height: 0.88;
    }

    .brand p {
      margin: 0;
      color: #535c6e;
      font-weight: 700;
      line-height: 1.45;
    }

    .form-grid {
      display: grid;
      gap: 10px;
    }

    .row {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .row > * {
      flex: 1;
    }

    .game {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      overflow: hidden;
    }

    .table {
      flex: 1;
      overflow-y: auto;
      padding: 12px 14px 178px;
      display: grid;
      gap: 14px;
    }

    .race-progress {
      display: grid;
      gap: 11px;
      padding: 14px;
      border-radius: 28px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.84), rgba(255, 255, 255, 0.62)),
        radial-gradient(circle at top right, rgba(59, 130, 246, 0.14), transparent 35%);
      border: 1px solid rgba(255, 255, 255, 0.74);
      box-shadow: var(--shadow);
      backdrop-filter: blur(20px);
    }

    .race-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      font-weight: 950;
      letter-spacing: -0.04em;
    }

    .race-title small {
      color: var(--muted);
      font-size: 0.76rem;
      font-weight: 900;
      letter-spacing: 0;
    }

    .race-lane {
      display: grid;
      gap: 6px;
    }

    .race-meta {
      display: flex;
      justify-content: space-between;
      color: #475569;
      font-size: 0.78rem;
      font-weight: 900;
    }

    .road {
      position: relative;
      height: 42px;
      border-radius: 999px;
      background:
        repeating-linear-gradient(90deg, transparent 0 18px, rgba(255, 255, 255, 0.28) 18px 30px),
        linear-gradient(180deg, var(--road-light), var(--road));
      overflow: hidden;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.08);
    }

    .road::before {
      content: "";
      position: absolute;
      left: 12px;
      right: 12px;
      top: 50%;
      height: 2px;
      transform: translateY(-50%);
      background: repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.45) 0 18px, transparent 18px 34px);
    }

    .car {
      position: absolute;
      top: 50%;
      left: var(--progress);
      transform: translate(-50%, -50%);
      font-size: 1.45rem;
      filter: drop-shadow(0 6px 6px rgba(0, 0, 0, 0.3));
      transition: left 450ms cubic-bezier(.2,.9,.2,1);
      z-index: 2;
    }

    .car.me {
      animation: carBounce 1.2s ease-in-out infinite;
    }

    .finish-flag {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1rem;
      z-index: 3;
    }

    @keyframes carBounce {
      0%, 100% { transform: translate(-50%, -50%) rotate(-1deg); }
      50% { transform: translate(-50%, -56%) rotate(1deg); }
    }

    .status-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .metric {
      background: rgba(255, 255, 255, 0.78);
      border: 1px solid rgba(255, 255, 255, 0.72);
      border-radius: 22px;
      padding: 12px;
      min-height: 78px;
      display: grid;
      align-content: space-between;
      box-shadow: var(--shadow-soft);
      backdrop-filter: blur(18px);
    }

    .metric small {
      color: var(--muted);
      font-weight: 900;
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .metric strong {
      color: #111827;
      font-size: 1.06rem;
      letter-spacing: -0.04em;
    }

    .player-card {
      position: relative;
      display: grid;
      gap: 12px;
      margin-bottom: 12px;
      overflow: hidden;
    }

    .player-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at top right, rgba(56, 189, 248, 0.14), transparent 34%),
        radial-gradient(circle at bottom left, rgba(250, 204, 21, 0.13), transparent 32%);
      pointer-events: none;
    }

    .player-card > * {
      position: relative;
    }

    .player-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }

    .player-name {
      font-size: 1.05rem;
      font-weight: 950;
      letter-spacing: -0.04em;
    }

    .player-head small {
      display: inline-block;
      margin-top: 3px;
      color: var(--muted);
      font-weight: 800;
      line-height: 1.25;
    }

    .progress-line {
      height: 12px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(15, 23, 42, 0.08);
    }

    .progress-fill {
      height: 100%;
      width: var(--progress);
      border-radius: inherit;
      background: linear-gradient(90deg, #38bdf8, #2563eb);
      transition: width 350ms ease;
    }

    .zones {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    .zone {
      min-height: 86px;
      border-radius: 20px;
      padding: 12px;
      background: rgba(248, 250, 252, 0.8);
      border: 1px dashed rgba(15, 23, 42, 0.13);
      display: grid;
      gap: 8px;
    }

    .zone h4 {
      margin: 0;
      font-size: 0.76rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .mini-cards {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .mini-card {
      border-radius: 999px;
      padding: 6px 9px;
      font-size: 0.73rem;
      font-weight: 950;
      color: #111827;
      background: #eef2ff;
      box-shadow: 0 5px 10px rgba(15, 23, 42, 0.05);
    }

    .mini-card.distance { background: var(--mint-soft); }
    .mini-card.attack { background: var(--coral-soft); }
    .mini-card.remedy { background: #dbeafe; }
    .mini-card.safety { background: var(--gold-soft); }

    .center-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .log {
      max-height: 116px;
      overflow-y: auto;
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 700;
      line-height: 1.45;
    }

    .log div + div {
      margin-top: 6px;
    }

    .hand-drawer {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 10px 12px calc(12px + env(safe-area-inset-bottom));
      background: rgba(248, 250, 252, 0.9);
      backdrop-filter: blur(24px);
      border-top: 1px solid rgba(255, 255, 255, 0.8);
      border-radius: 28px 28px 0 0;
      box-shadow: 0 -18px 38px rgba(15, 23, 42, 0.1);
      transform: translateY(calc(100% - 72px));
      transition: transform 200ms cubic-bezier(.2,.9,.2,1);
      z-index: 10;
    }

    .hand-drawer.open {
      transform: translateY(0);
    }

    .drawer-handle {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 52px;
      padding-top: 8px;
    }

    .drawer-handle::before {
      content: "";
      position: absolute;
      top: 7px;
      left: 50%;
      width: 46px;
      height: 5px;
      transform: translateX(-50%);
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.18);
    }

    .drawer-handle strong {
      font-size: 0.95rem;
      font-weight: 950;
      letter-spacing: -0.03em;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      max-height: 52dvh;
      overflow-y: auto;
      padding-bottom: 4px;
    }

    .game-card {
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.72);
      border-radius: 22px;
      padding: 12px;
      background: rgba(255, 255, 255, 0.86);
      min-height: 132px;
      display: grid;
      align-content: space-between;
      gap: 10px;
      box-shadow: 0 10px 20px rgba(15, 23, 42, 0.06);
    }

    .game-card::after {
      content: "";
      position: absolute;
      width: 96px;
      height: 96px;
      right: -34px;
      top: -34px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.38);
    }

    .game-card.distance { background: linear-gradient(135deg, #ffffff, #dcfce7); }
    .game-card.attack { background: linear-gradient(135deg, #ffffff, #ffe4e6); }
    .game-card.remedy { background: linear-gradient(135deg, #ffffff, #dbeafe); }
    .game-card.safety { background: linear-gradient(135deg, #ffffff, #fef3c7); }

    .game-card h3,
    .game-card p,
    .game-card .card-actions,
    .card-type {
      position: relative;
      z-index: 1;
    }

    .card-type {
      display: inline-flex;
      width: fit-content;
      margin-bottom: 8px;
      padding: 5px 8px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.62);
      color: #334155;
      font-size: 0.66rem;
      font-weight: 950;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .game-card h3 {
      margin: 0;
      font-size: 1rem;
      letter-spacing: -0.04em;
    }

    .game-card p {
      margin: 6px 0 0;
      color: #4b5563;
      font-size: 0.78rem;
      font-weight: 700;
      line-height: 1.28;
    }

    .card-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .card-actions button {
      min-height: 42px;
      padding: 0 8px;
      font-size: 0.78rem;
      border-radius: 14px;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 92px;
      transform: translateX(-50%);
      background: rgba(17, 24, 39, 0.94);
      color: white;
      border-radius: 999px;
      padding: 10px 14px;
      font-weight: 900;
      font-size: 0.84rem;
      max-width: calc(100vw - 28px);
      z-index: 99;
      opacity: 0;
      pointer-events: none;
      transition: opacity 150ms ease, transform 150ms ease;
      box-shadow: 0 12px 24px rgba(15, 23, 42, 0.2);
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(-4px);
    }

    .help {
      font-size: 0.84rem;
      color: var(--muted);
      font-weight: 700;
      line-height: 1.45;
    }

    @media (max-width: 380px) {
      .table {
        padding-left: 10px;
        padding-right: 10px;
      }

      .status-grid {
        gap: 8px;
      }

      .metric {
        padding: 10px;
      }

      .metric strong {
        font-size: 0.98rem;
      }

      .cards {
        grid-template-columns: 1fr;
      }
    }

    @media (min-width: 481px) {
      body {
        background:
          radial-gradient(circle at 30% 0%, rgba(56, 189, 248, 0.18), transparent 32%),
          linear-gradient(180deg, #e5e7eb, #f8fafc);
      }

      .app {
        border-left: 1px solid var(--border);
        border-right: 1px solid var(--border);
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section id="lobbyScreen" class="screen landing">
      <div class="hero-card">
        <div class="brand">
          <span class="pill hot">🏎️ Duel mobile</span>
          <h1>1000<br>Bornes</h1>
          <p>Crée un salon, invite un deuxième pilote, et fonce jusqu'à 1000 km.</p>
        </div>
        <div class="hero-car">🏎️</div>
      </div>

      <div class="card-panel form-grid">
        <input id="playerName" placeholder="Ton pseudo" autocomplete="nickname" />
        <input id="roomId" placeholder="Code salon, ex: route42" autocomplete="off" />
        <div class="row">
          <button id="createRoomBtn">Créer</button>
          <button id="joinRoomBtn" class="secondary">Rejoindre</button>
        </div>
        <button id="quickRoomBtn" class="ghost">Créer salon aléatoire</button>
        <div id="connectionStatus" class="help"></div>
      </div>

      <div class="card-panel help">
        Téléphone 1: crée un salon. Téléphone 2: entre exactement le même code puis rejoins la partie.
      </div>
    </section>

    <section id="gameScreen" class="game hidden">
      <header class="topbar">
        <div>
          <div class="title">1000 Bornes</div>
          <small id="roomLabel">Salon</small>
        </div>
        <span id="turnPill" class="pill">Tour</span>
      </header>

      <div class="table">
        <section id="raceProgress" class="race-progress"></section>

        <section class="status-grid">
          <div class="metric">
            <small>Pioche</small>
            <strong id="deckCount">0</strong>
          </div>
          <div class="metric">
            <small>Défausse</small>
            <strong id="discardTop">-</strong>
          </div>
          <div class="metric">
            <small>Manche</small>
            <strong id="roundState">...</strong>
          </div>
        </section>

        <section id="playersArea"></section>

        <section class="center-actions">
          <button id="drawBtn">Piocher</button>
          <button id="endTurnBtn" class="secondary">Fin du tour</button>
        </section>

        <section class="center-actions">
          <button id="newRoundBtn" class="ghost">Nouvelle manche</button>
          <button id="leaveBtn" class="danger">Quitter</button>
        </section>

        <section class="card-panel">
          <div class="player-head">
            <strong>Journal</strong>
            <span class="pill" id="scorePill">0 - 0</span>
          </div>
          <div id="log" class="log"></div>
        </section>
      </div>

      <aside id="handDrawer" class="hand-drawer">
        <div id="drawerHandle" class="drawer-handle">
          <strong id="handTitle">Main</strong>
          <span class="pill" id="handCount">0 carte</span>
        </div>
        <div id="handCards" class="cards"></div>
      </aside>
    </section>

    <div id="toast" class="toast"></div>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getDatabase,
      ref,
      set,
      get,
      onValue,
      runTransaction,
      onDisconnect
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    /***************************************************************
     * IMPORTANT
     * Replace this object with your real Firebase web app config.
     * Firebase Console > Project settings > Your apps > Web app.
     * You must also enable Realtime Database.
     ***************************************************************/
    const firebaseConfig = {

      drivingAce: { id: "drivingAce", type: "safety", name: "As du volant", text: "Protège contre accident.", protects: ["accident"], count: 1 }
    };

    const PROBLEM_LABELS = {
      none: "OK",
      redLight: "Feu rouge",
      speedLimit: "Limité",
      flatTire: "Crevaison",
      outOfGas: "Panne essence",
      accident: "Accident"
    };

    const TYPE_LABELS = {
      distance: "Borne",
      attack: "Attaque",
      remedy: "Parade",
      safety: "Botte"
    };

    const SAFETY_BY_PROBLEM = Object.values(CARD_DEFS)
      .filter(card => card.type === "safety")
      .reduce((acc, card) => {
        card.protects.forEach(problem => acc[problem] = card.id);
        return acc;
      }, {});

    const $ = selector => document.querySelector(selector);

    const refs = {
      lobbyScreen: $("#lobbyScreen"),
      gameScreen: $("#gameScreen"),
      playerName: $("#playerName"),

      createRoomBtn: $("#createRoomBtn"),
      joinRoomBtn: $("#joinRoomBtn"),
      quickRoomBtn: $("#quickRoomBtn"),
      connectionStatus: $("#connectionStatus"),
      roomLabel: $("#roomLabel"),
      turnPill: $("#turnPill"),
      raceProgress: $("#raceProgress"),
      deckCount: $("#deckCount"),
      discardTop: $("#discardTop"),
      roundState: $("#roundState"),
      playersArea: $("#playersArea"),
      drawBtn: $("#drawBtn"),
      endTurnBtn: $("#endTurnBtn"),
      newRoundBtn: $("#newRoundBtn"),
      leaveBtn: $("#leaveBtn"),
      log: $("#log"),
      scorePill: $("#scorePill"),
      handDrawer: $("#handDrawer"),
      drawerHandle: $("#drawerHandle"),
      handTitle: $("#handTitle"),
      handCount: $("#handCount"),
      handCards: $("#handCards"),

    };

    const savedName = localStorage.getItem("mille-bornes-player-name") || "";
    refs.playerName.value = savedName;

    let playerId = sessionStorage.getItem("mille-bornes-session-player-id");
    if (!playerId) {
      playerId = crypto.randomUUID();
      sessionStorage.setItem("mille-bornes-session-player-id", playerId);
    }

    const state = {
      roomId: "",
      game: null,
      unsub: null
    };

    refs.connectionStatus.textContent = firebaseReady
      ? "Firebase configuré. Le jeu peut fonctionner entre deux téléphones."
      : "Firebase non configuré. Remplace firebaseConfig avant de tester entre deux téléphones.";

    function toast(message) {
      refs.toast.textContent = message;
      refs.toast.classList.add("show");
      setTimeout(() => refs.toast.classList.remove("show"), 1800);
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function cardName(cardId) {
      return CARD_DEFS[cardId]?.name || "-";
    }

    function requireFirebase() {
      if (!firebaseReady || !db) {
        throw new Error("Firebase n'est pas configuré dans le code.");
      }
    }

    function roomPath(roomId) {
      return `rooms/${roomId}`;
    }

    function roomRef(roomId) {
      return ref(db, roomPath(roomId));
    }

    function cleanRoomId(value) {
      return value.trim().toLowerCase().replace(/[^a-z0-9-]/g, "");
    }

    function getLobbyInput() {
      const name = refs.playerName.value.trim() || "Pilote";
      const roomId = cleanRoomId(refs.roomId.value) || `route-${Math.floor(1000 + Math.random() * 9000)}`;
      refs.roomId.value = roomId;
      localStorage.setItem("mille-bornes-player-name", name);
      return { name, roomId };
    }

    function shuffle(array) {
      const copy = [...array];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function buildDeck() {
      const deck = [];
      Object.values(CARD_DEFS).forEach(card => {
        for (let i = 0; i < card.count; i++) deck.push(card.id);
      });
      return shuffle(deck);
    }

    function makePlayer(name, id) {
      return {
        id,
        name,
        online: true,
        hand: [],
        distance: 0,
        speedLimit: false,
        problem: "redLight",
        safeties: [],
        distanceCards: [],
        score: 0,
        wins: 0,
        losses: 0,
        drewThisTurn: false
      };
    }

    function createInitialGame(name) {
      const deck = buildDeck();
      const p1 = makePlayer(name, playerId);
      p1.hand = deck.splice(0, 6);

      return {
        createdAt: Date.now(),
        updatedAt: Date.now(),
        status: "waiting",
        hostId: playerId,
        players: { [playerId]: p1 },
        playerOrder: [playerId],
        turnPlayerId: playerId,
        deck,
        discard: [],
        log: [`${name} a créé le salon.`],
        winnerId: null,
        round: 1
      };
    }

    async function createRoom() {
      const { name, roomId } = getLobbyInput();
      requireFirebase();

      const result = await runTransaction(roomRef(roomId), current => {
        if (current) return;
        return createInitialGame(name);
      });

      if (!result.committed) {
        toast("Ce salon existe déjà.");
        return;
      }

      enterRoom(roomId);
    }

    async function joinRoom() {
      const { name, roomId } = getLobbyInput();
      requireFirebase();

      const result = await runTransaction(roomRef(roomId), current => {
        if (!current) return current;

        current.players = current.players || {};
        current.playerOrder = current.playerOrder || [];
        current.deck = current.deck || [];
        current.log = current.log || [];

        if (!current.players[playerId]) {
          if (current.playerOrder.length >= 2) return current;

          const player = makePlayer(name, playerId);
          player.hand = current.deck.splice(0, 6);
          current.players[playerId] = player;
          current.playerOrder.push(playerId);
          current.status = "playing";
          current.log.unshift(`${name} rejoint la partie.`);
        } else {
          current.players[playerId].online = true;
          current.players[playerId].name = name;
        }

        current.updatedAt = Date.now();
        return current;
      });

      const game = result.snapshot.val();
      if (!game) {
        toast("Salon introuvable.");
        return;
      }
      if (!game.players || !game.players[playerId]) {
        toast("Salon complet.");
        return;
      }

      enterRoom(roomId);
    }

    function enterRoom(roomId) {
      state.roomId = roomId;
      refs.lobbyScreen.classList.add("hidden");
      refs.gameScreen.classList.remove("hidden");
      refs.roomLabel.textContent = `Salon ${roomId}`;
      subscribeRoom(roomId);
      setupPresence(roomId).catch(console.error);
    }

    function subscribeRoom(roomId) {
      if (state.unsub) state.unsub();
      state.unsub = onValue(roomRef(roomId), snapshot => {
        state.game = snapshot.val() ? normalizeGame(snapshot.val()) : null;
        render();
      });
    }

    async function setupPresence(roomId) {
      if (!firebaseReady) return;
      const onlineRef = ref(db, `${roomPath(roomId)}/players/${playerId}/online`);
      await set(onlineRef, true);
      onDisconnect(onlineRef).set(false);
    }

    function asArray(value) {
      if (Array.isArray(value)) return value;
      if (!value) return [];
      return Object.values(value);
    }

    function normalizeGame(game) {
      if (!game) return game;

      game.deck = asArray(game.deck);
      game.discard = asArray(game.discard);
      game.log = asArray(game.log);
      game.playerOrder = asArray(game.playerOrder);

      Object.values(game.players || {}).forEach(player => {
        player.hand = asArray(player.hand);
        player.safeties = asArray(player.safeties);
        player.distanceCards = asArray(player.distanceCards);
      });

      return game;
    }

    async function mutateGame(mutator) {
      requireFirebase();
      await runTransaction(roomRef(state.roomId), current => {
        if (!current) return current;
        current = normalizeGame(current);
        const next = mutator(current);
        next.updatedAt = Date.now();
        return next;
      });
    }

    function opponentOf(game, id) {
      const otherId = (game.playerOrder || []).find(pid => pid !== id);
      return otherId ? game.players[otherId] : null;
    }

    function hasSafety(player, problem) {
      const safetyId = SAFETY_BY_PROBLEM[problem];
      return safetyId && player.safeties.includes(safetyId);
    }

    function canMove(player) {
      return player.problem === "none" || player.safeties.includes("rightOfWay");
    }

    function canPlayDistance(player, card) {
      if (!canMove(player)) return false;
      if (player.speedLimit && card.value > 50 && !player.safeties.includes("rightOfWay")) return false;
      if (card.value === 200 && player.distanceCards.filter(id => id === "d200").length >= 2) return false;
      if (player.distance + card.value > 1000) return false;
      return true;
    }

    function canPlayRemedy(player, card) {
      if (card.solves === "speedLimit") return player.speedLimit;
      return player.problem === card.solves;
    }

    function canAttack(opponent, card) {
      if (!opponent) return false;
      if (hasSafety(opponent, card.problem)) return false;
      if (card.problem === "speedLimit") return !opponent.speedLimit;
      return opponent.problem === "none" || opponent.safeties.includes("rightOfWay");
    }

    function canPlaySafety(player, card) {
      return !player.safeties.includes(card.id);
    }

    function validatePlay(game, id, cardId, target) {
      if (game.status !== "playing") return "La manche n'est pas active.";
      if (game.turnPlayerId !== id) return "Ce n'est pas ton tour.";
      const player = game.players[id];
      if (!player) return "Joueur introuvable.";
      if (!player.hand.includes(cardId)) return "Cette carte n'est pas dans ta main.";
      const card = CARD_DEFS[cardId];
      const opponent = opponentOf(game, id);

      if (target === "discard") return null;
      if (card.type === "distance") return canPlayDistance(player, card) ? null : "Tu ne peux pas poser cette borne.";
      if (card.type === "remedy") return canPlayRemedy(player, card) ? null : "Cette parade ne correspond pas à ton état.";
      if (card.type === "attack") return canAttack(opponent, card) ? null : "Cette attaque n'est pas possible.";
      if (card.type === "safety") return canPlaySafety(player, card) ? null : "Cette botte est déjà posée.";
      return "Action invalide.";
    }

    function removeCardFromHand(player, cardId) {
      const index = player.hand.indexOf(cardId);
      if (index >= 0) player.hand.splice(index, 1);
    }

    function nextTurn(game) {
      const order = game.playerOrder || [];
      const index = order.indexOf(game.turnPlayerId);
      const nextIndex = (index + 1) % order.length;
      game.turnPlayerId = order[nextIndex];
      if (game.players[game.turnPlayerId]) {
        game.players[game.turnPlayerId].drewThisTurn = false;
      }
    }

    function drawFor(game, id) {
      const player = game.players[id];
      if (game.status !== "playing") throw new Error("La manche n'est pas active.");
      if (game.turnPlayerId !== id) throw new Error("Ce n'est pas ton tour.");
      if (player.drewThisTurn) throw new Error("Tu as déjà pioché ce tour-ci.");
      if (!game.deck.length) throw new Error("La pioche est vide.");
      player.hand.push(game.deck.shift());
      player.drewThisTurn = true;
      game.log.unshift(`${player.name} pioche.`);
      return game;
    }

    function calculateScore(player, won) {
      let score = player.distance;
      score += player.safeties.length * 100;
      if (won) score += 400;
      if (player.distance === 1000) score += 300;
      return score;
    }

    function finishRound(game, winnerId) {
      const winner = game.players[winnerId];
      const loser = opponentOf(game, winnerId);
      winner.wins = (winner.wins || 0) + 1;
      winner.score += calculateScore(winner, true);
      if (loser) {
        loser.losses = (loser.losses || 0) + 1;
        loser.score += calculateScore(loser, false);
      }
      game.status = "finished";
      game.winnerId = winnerId;
      game.log.unshift(`${winner.name} gagne la manche !`);
    }

    function tryCoupFourre(game, attackedPlayerId, attackCardId) {
      const attacked = game.players[attackedPlayerId];
      const attack = CARD_DEFS[attackCardId];
      const safetyId = SAFETY_BY_PROBLEM[attack.problem];
      if (!safetyId || !attacked.hand.includes(safetyId)) return false;

      removeCardFromHand(attacked, safetyId);
      attacked.safeties.push(safetyId);
      attacked.problem = "none";
      if (attack.problem === "speedLimit") attacked.speedLimit = false;
      attacked.score += 300;
      game.turnPlayerId = attackedPlayerId;
      game.log.unshift(`Coup-fourré ! ${attacked.name} pose ${CARD_DEFS[safetyId].name}.`);
      return true;
    }

    function playCardInGame(game, id, cardId, target) {
      const error = validatePlay(game, id, cardId, target);
      if (error) throw new Error(error);

      const player = game.players[id];
      const opponent = opponentOf(game, id);
      const card = CARD_DEFS[cardId];
      removeCardFromHand(player, cardId);

      if (target === "discard") {
        game.discard.push(cardId);
        game.log.unshift(`${player.name} défausse ${card.name}.`);
        return game;
      }

      if (card.type === "distance") {
        player.distance += card.value;
        player.distanceCards.push(cardId);
        game.log.unshift(`${player.name} pose ${card.name}.`);
      }

      if (card.type === "remedy") {
        if (card.solves === "speedLimit") player.speedLimit = false;
        else player.problem = "none";
        game.discard.push(cardId);
        game.log.unshift(`${player.name} joue ${card.name}.`);
      }

      if (card.type === "attack") {
        if (card.problem === "speedLimit") opponent.speedLimit = true;
        else opponent.problem = card.problem;
        game.discard.push(cardId);
        game.log.unshift(`${player.name} attaque avec ${card.name}.`);
      }

      if (card.type === "safety") {
        player.safeties.push(cardId);
        card.protects.forEach(problem => {
          if (problem === "speedLimit") player.speedLimit = false;
          if (player.problem === problem) player.problem = "none";
        });
        game.log.unshift(`${player.name} pose la botte ${card.name}.`);
      }

      if (player.distance === 1000) finishRound(game, id);
      return game;
    }

    function startNewRound(game) {
      if (game.status !== "finished") throw new Error("La manche n'est pas finie.");
      const order = game.playerOrder || [];
      if (order.length < 2) throw new Error("Il faut deux joueurs.");

      const oldPlayers = game.players;
      const deck = buildDeck();
      const players = {};

      order.forEach(id => {
        const old = oldPlayers[id];
        const p = makePlayer(old.name, id);
        p.score = old.score || 0;
        p.wins = old.wins || 0;
        p.losses = old.losses || 0;
        p.online = old.online !== false;
        p.hand = deck.splice(0, 6);
        players[id] = p;
      });

      game.players = players;
      game.deck = deck;
      game.discard = [];
      game.status = "playing";
      game.winnerId = null;
      game.round = (game.round || 1) + 1;
      game.turnPlayerId = order[(game.round + 1) % 2];
      game.log.unshift(`Nouvelle manche ${game.round}.`);
      return game;
    }

    refs.createRoomBtn.addEventListener("click", async () => {
      try {
        await createRoom();
      } catch (error) {
        console.error(error);
        toast(error.message || "Erreur création salon.");
      }

    refs.joinRoomBtn.addEventListener("click", async () => {
      try {
        await joinRoom();

        console.error(error);
        toast(error.message || "Erreur rejoindre salon.");
      }
    });

    refs.quickRoomBtn.addEventListener("click", () => {
      refs.roomId.value = `route-${Math.floor(1000 + Math.random() * 9000)}`;
      refs.createRoomBtn.click();
    });

    refs.drawBtn.addEventListener("click", async () => {
      try {
        await mutateGame(game => drawFor(game, playerId));
      } catch (error) {
        toast(error.message);
      }
    });

    refs.endTurnBtn.addEventListener("click", async () => {
      try {
        await mutateGame(game => {
          if (game.turnPlayerId !== playerId) throw new Error("Ce n'est pas ton tour.");
          if (game.status !== "playing") throw new Error("La manche n'est pas active.");
          nextTurn(game);
          return game;
        });
      } catch (error) {
        toast(error.message);
      }
    });

    refs.newRoundBtn.addEventListener("click", async () => {
      try {
        await mutateGame(game => startNewRound(game));
      } catch (error) {
        toast(error.message);
      }
    });

    refs.leaveBtn.addEventListener("click", async () => {
      try {
        if (state.roomId && firebaseReady) {
          await set(ref(db, `${roomPath(state.roomId)}/players/${playerId}/online`), false);
        }
      } catch (error) {
        console.error(error);
      }
      location.reload();
    });

    refs.drawerHandle.addEventListener("click", () => {
      refs.handDrawer.classList.toggle("open");
    });

    async function playCard(cardId, target) {
      try {
        await mutateGame(game => {
          const opponent = opponentOf(game, playerId);
          const card = CARD_DEFS[cardId];

          playCardInGame(game, playerId, cardId, target);

          if (target !== "discard" && card.type === "attack" && opponent) {
            tryCoupFourre(game, opponent.id, cardId);
          }

          if (game.status === "playing" && game.turnPlayerId === playerId) {
            nextTurn(game);
          }

          return game;
        });
      } catch (error) {
        toast(error.message);
      }
    }

    window.playCardFromUI = (cardId, action) => {
      playCard(cardId, action === "discard" ? "discard" : "play");
    };

    function render() {
      const game = state.game;
      if (!game) return;

      const me = game.players?.[playerId];
      const isMyTurn = game.turnPlayerId === playerId;
      const players = (game.playerOrder || []).map(id => game.players[id]).filter(Boolean);
      const p1 = players[0];
      const p2 = players[1];

      refs.turnPill.textContent = game.status === "waiting" ? "⏳ En attente" : isMyTurn ? "🔥 À toi" : "👀 Adversaire";
      refs.turnPill.classList.toggle("hot", isMyTurn && game.status === "playing");
      refs.raceProgress.innerHTML = renderRaceProgress(players);
      refs.deckCount.textContent = game.deck?.length || 0;
      refs.discardTop.textContent = cardName(game.discard?.at(-1));
      refs.roundState.textContent = game.status === "finished" ? "Finie" : game.status === "waiting" ? "Attente" : "Active";
      refs.scorePill.textContent = p1 && p2 ? `${p1.score || 0} - ${p2.score || 0}` : "0 - 0";
      refs.drawBtn.disabled = !me || !isMyTurn || game.status !== "playing" || me.drewThisTurn;
      refs.endTurnBtn.disabled = !me || !isMyTurn || game.status !== "playing";
      refs.newRoundBtn.disabled = game.status !== "finished";

      refs.playersArea.innerHTML = players.map(player => renderPlayer(player, player.id === playerId)).join("");
      refs.log.innerHTML = (game.log || []).slice(0, 12).map(item => `<div>${escapeHtml(item)}</div>`).join("");

      renderHand(me, isMyTurn, game.status === "playing");
    }

    function renderRaceProgress(players) {
      if (!players.length) {
        return `
          <div class="race-title">
            <span>🏁 Course vers 1000 km</span>
            <small>En attente</small>
          </div>
        `;
      }

      return `
        <div class="race-title">
          <span>🏁 Course vers 1000 km</span>
          <small>${players.length}/2 pilotes</small>
        </div>

        ${players.map((player, index) => {
          const progress = Math.max(0, Math.min(100, (player.distance || 0) / 1000 * 100));
          const isMe = player.id === playerId;
          const car = index === 0 ? "🏎️" : "🚙";

          return `
            <div class="race-lane">
              <div class="race-meta">
                <span>${escapeHtml(player.name)}${isMe ? " · toi" : ""}</span>
                <span>${player.distance || 0}/1000 km</span>
              </div>
              <div class="road">
                <span class="car ${isMe ? "me" : ""}" style="--progress: ${progress}%">${car}</span>
                <span class="finish-flag">🏁</span>
              </div>
            </div>
          `;
        }).join("")}
      `;
    }

    function renderPlayer(player, isMe) {
      const progress = Math.max(0, Math.min(100, (player.distance || 0) / 1000 * 100));
      const statusIcon = player.online === false ? "⚪" : "🟢";
      const problem = PROBLEM_LABELS[player.problem] || player.problem;

      return `
        <section class="card-panel player-card">
          <div class="player-head">
            <div>
              <div class="player-name">${statusIcon} ${escapeHtml(player.name)} ${isMe ? "· toi" : ""}</div>
              <small>${player.distance}/1000 km · ${problem} · ${player.online === false ? "hors ligne" : "en ligne"}</small>
            </div>
            <span class="pill">${player.hand?.length || 0} cartes</span>
          </div>

          <div class="progress-line">
            <div class="progress-fill" style="--progress: ${progress}%"></div>
          </div>

          <div class="status-grid">
            <div class="metric"><small>Distance</small><strong>${player.distance}</strong></div>
            <div class="metric"><small>Vitesse</small><strong>${player.speedLimit ? "≤ 50" : "Libre"}</strong></div>
            <div class="metric"><small>État</small><strong>${problem}</strong></div>
          </div>

          <div class="zones">
            <div class="zone">
              <h4>Bottes</h4>
              <div class="mini-cards">${(player.safeties || []).map(id => `<span class="mini-card safety">${cardName(id)}</span>`).join("") || "<small>Aucune</small>"}</div>
            </div>
            <div class="zone">
              <h4>Bornes posées</h4>
              <div class="mini-cards">${(player.distanceCards || []).slice(-10).map(id => `<span class="mini-card distance">${cardName(id)}</span>`).join("") || "<small>Aucune</small>"}</div>
            </div>
          </div>
        </section>
      `;
    }

    function renderHand(player, isMyTurn, isPlaying) {
      if (!player) {
        refs.handTitle.textContent = "Main";
        refs.handCount.textContent = "0 carte";
        refs.handCards.innerHTML = "";
        return;
      }

      refs.handTitle.textContent = isMyTurn ? "Ta main · choisis une carte" : "Ta main";
      refs.handCount.textContent = `${player.hand.length} carte${player.hand.length > 1 ? "s" : ""}`;

      refs.handCards.innerHTML = player.hand.map(cardId => {
        const card = CARD_DEFS[cardId];
        if (!card) return "";
        const disabled = !isMyTurn || !isPlaying;
        return `
          <article class="game-card ${card.type}">
            <div>
              <span class="card-type">${TYPE_LABELS[card.type] || card.type}</span>
              <h3>${escapeHtml(card.name)}</h3>
              <p>${escapeHtml(card.text)}</p>
            </div>
            <div class="card-actions">
              <button ${disabled ? "disabled" : ""} onclick="window.playCardFromUI('${cardId}', 'play')">Jouer</button>
              <button ${disabled ? "disabled" : ""} class="secondary" onclick="window.playCardFromUI('${cardId}', 'discard')">Jeter</button>
            </div>
          </article>
        `;
      }).join("");
    }
  </script>
</body>
</html>
