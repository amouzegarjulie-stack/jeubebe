<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Questions de Couple</title>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000000;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      height: 100dvh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 18px;
    }

    .app {
      width: 100%;
      height: 100dvh;
      max-width: 430px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: center;
      padding: 26px 0 18px;
    }

    .card-area {
      flex: 1;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      perspective: 1200px;
    }

    .card {
      width: min(82vw, 340px);
      height: min(82vw, 340px);
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.75s cubic-bezier(0.2, 0.8, 0.2, 1);
      cursor: pointer;
    }

    .card.flipped {
      transform: rotateY(180deg);
    }

    .face {
      position: absolute;
      inset: 0;
      border-radius: 28px;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 28px;
      box-shadow: 0 18px 45px rgba(255, 0, 127, 0.22);
    }

    .back {
      background: #FF007F;
      color: white;
      font-size: 110px;
      font-weight: 900;
    }

    .front {
      background: white;
      color: black;
      transform: rotateY(180deg);
      font-size: clamp(21px, 5.5vw, 30px);
      line-height: 1.15;
      font-weight: 900;
      letter-spacing: -0.7px;
      flex-direction: column;
      padding: 58px 28px 28px;
      position: relative;
    }

    .category-label {
      position: absolute;
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
      color: #ff9ec9;
      font-size: 13px;
      font-weight: 900;
      letter-spacing: 1.4px;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .question-text {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
    }

    .nav {
      width: 100%;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
      padding: 0 8px;
    }

    .dice-btn {
      font-size: 22px;
      line-height: 1;
    }

    button {
      height: 44px;
      border: 2px solid #FF007F;
      border-radius: 999px;
      background: transparent;
      color: #FF007F;
      font-size: 12px;
      font-weight: 800;
      font-family: inherit;
      cursor: pointer;
      touch-action: manipulation;
    }

    button:active {
      background: #FF007F;
      color: #000000;
      transform: scale(0.96);
    }
  </style>
</head>

    <section class="card-area">

          <div class="question-text" id="questionText">Choisis une catégorie</div>

      <button data-category="enfance">Enfance</button>
      <button data-category="societe">Société</button>

      <button data-category="chretien">Chrétien</button>

    const categoryNames = {
      enfance: "Enfance",
      societe: "Société",
      cul: "Intime",
      chretien: "Chrétien"
    };

    const card = document.getElementById("card");
    const questionText = document.getElementById("questionText");
    const categoryText = document.getElementById("categoryText");
    const buttons = document.querySelectorAll("button[data-category]");
    const randomBtn = document.getElementById("randomBtn");

    const lastQuestions = {
      enfance: null,
      societe: null,
      cul: null,
      chretien: null
    };

    let currentQuestion = "Choisis une catégorie";
    let currentCategory = "";

    function getRandomFromAll() {
      const categories = Object.keys(questions);
      const randomCategory = categories[Math.floor(Math.random() * categories.length)];

      currentCategory = randomCategory;
      return getRandomQuestion(randomCategory);
    }

    randomBtn.addEventListener("click", () => {
      card.classList.remove("flipped");
      currentQuestion = getRandomFromAll();

      setTimeout(() => {
        questionText.textContent = currentQuestion;
        categoryText.textContent = categoryNames[currentCategory];
      }, 300);
    });

    function getRandomQuestion(category) {
      const list = questions[category];
      let selected;

      do {
        selected = list[Math.floor(Math.random() * list.length)];
      } while (selected === lastQuestions[category] && list.length > 1);

      lastQuestions[category] = selected;
      return selected;
    }

    buttons.forEach(button => {
      button.addEventListener("click", () => {
        const category = button.dataset.category;

        currentCategory = category;

        card.classList.remove("flipped");

        currentQuestion = getRandomQuestion(category);

        setTimeout(() => {
          questionText.textContent = currentQuestion;
          categoryText.textContent = categoryNames[currentCategory];
        }, 300);
      });
    });

    card.addEventListener("click", () => {
      card.classList.toggle("flipped");
    });
