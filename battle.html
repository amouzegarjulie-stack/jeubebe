<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bataille</title>

  <style>
    :root {
      --bg1: #6c5ce7;
      --bg2: #00cec9;
      --card: rgba(255, 255, 255, 0.92);
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #6c5ce7;
      --primary-dark: #5649c9;
      --danger: #ef4444;
      --success: #10b981;
      --shadow: 0 18px 45px rgba(0, 0, 0, 0.18);
      --radius: 24px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(255,255,255,.35), transparent 35%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 18px;
    }

    .app {
      width: 100%;
      max-width: 440px;
    }

    .panel {
      background: var(--card);
      backdrop-filter: blur(14px);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 22px;
      border: 1px solid rgba(255,255,255,.45);
      animation: fadeIn .25s ease;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 44px;
      text-align: center;
      letter-spacing: -1px;
    }

    .subtitle {
      margin: 0 0 22px;
      text-align: center;
      color: var(--muted);
      font-weight: 600;
    }

    .hidden {
      display: none !important;
    }

    input {
      width: 100%;
      border: 0;
      outline: none;
      border-radius: 18px;
      padding: 16px;
      font-size: 18px;
      background: #f3f4f6;
      text-transform: uppercase;
      text-align: center;
      margin: 12px 0;
      font-weight: 800;
      letter-spacing: 2px;
    }

    button {
      width: 100%;
      border: 0;
      border-radius: 18px;
      padding: 16px 18px;
      font-size: 17px;
      font-weight: 800;
      color: white;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      box-shadow: 0 10px 24px rgba(108, 92, 231, .35);
      cursor: pointer;
      transition: transform .15s ease, opacity .15s ease;
      margin-top: 10px;
    }

    button:active {
      transform: scale(.98);
    }

    button:disabled {
      opacity: .45;
      cursor: not-allowed;
      transform: none;
    }

    .secondary {
      color: var(--primary);
      background: white;
      border: 1px solid rgba(108, 92, 231, .2);
      box-shadow: none;
    }

    .danger {
      background: linear-gradient(135deg, #fb7185, #ef4444);
      box-shadow: 0 10px 24px rgba(239, 68, 68, .28);
    }

    .code-box {
      background: #111827;
      color: white;
      text-align: center;
      border-radius: 22px;
      padding: 18px;
      font-size: 34px;
      letter-spacing: 5px;
      font-weight: 900;
      margin: 18px 0;
      user-select: all;
    }

    .status {
      margin: 14px 0 0;
      padding: 13px 14px;
      border-radius: 16px;
      background: rgba(255,255,255,.75);
      color: var(--text);
      text-align: center;
      font-weight: 800;
      min-height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .board-top {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }

    .mini {
      background: rgba(255,255,255,.78);
      border-radius: 18px;
      padding: 12px;
      text-align: center;
      font-weight: 800;
    }

    .mini span {
      display: block;
      margin-top: 4px;
      font-size: 24px;
      color: var(--primary);
    }

    .cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin: 18px 0;
    }

    .card-slot {
      text-align: center;
    }

    .label {
      font-size: 13px;
      color: var(--muted);
      font-weight: 900;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .playing-card {
      height: 170px;
      border-radius: 22px;
      background: white;
      box-shadow: 0 14px 28px rgba(0,0,0,.14);
      border: 1px solid rgba(0,0,0,.08);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      font-size: 42px;
      font-weight: 950;
      position: relative;
      overflow: hidden;
    }

    .playing-card.red {
      color: #dc2626;
    }

    .playing-card.black {
      color: #111827;
    }

    .playing-card.back {
      color: white;
      background:
        linear-gradient(135deg, rgba(255,255,255,.18), transparent),
        linear-gradient(135deg, #111827, #374151);
    }

    .playing-card small {
      font-size: 30px;
      line-height: 1;
    }

    .played {
      animation: pop .35s ease;
    }

    .pill {
      margin-top: 8px;
      display: inline-block;
      border-radius: 999px;
      padding: 7px 11px;
      background: rgba(108, 92, 231, .1);
      color: var(--primary);
      font-weight: 900;
      font-size: 13px;
    }

    .footer-info {
      margin-top: 10px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
      text-align: center;
      font-weight: 650;
    }

    @keyframes pop {
      0% { transform: translateY(12px) scale(.9); opacity: .3; }
      70% { transform: translateY(-4px) scale(1.04); opacity: 1; }
      100% { transform: translateY(0) scale(1); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body>
  <main class="app">
    <section id="homeScreen" class="panel">
      <h1>Bataille</h1>
      <p class="subtitle">Jeu de cartes multijoueur en temps réel</p>

      <button id="createBtn">Créer une partie</button>

      <input id="joinCodeInput" maxlength="6" placeholder="CODE PARTIE" />
      <button id="joinBtn" class="secondary">Rejoindre une partie</button>

      <div id="homeMessage" class="status hidden"></div>
    </section>

    <section id="lobbyScreen" class="panel hidden">
      <h1>Bataille</h1>
      <p class="subtitle">Partage ce code avec le deuxième joueur</p>

      <div id="gameCodeBox" class="code-box">------</div>
      <div id="lobbyMessage" class="status">En attente d’un joueur...</div>

      <button id="copyCodeBtn">Copier le code</button>
      <button id="leaveLobbyBtn" class="secondary">Quitter</button>
    </section>

    <section id="gameScreen" class="panel hidden">
      <div class="board-top">
        <div class="mini">Vos cartes<span id="myCount">0</span></div>
        <div class="mini">Cartes adverses<span id="oppCount">0</span></div>
        <div class="mini">Vos plis<span id="myScore">0</span></div>
        <div class="mini">Plis adverses<span id="oppScore">0</span></div>
      </div>

      <div class="cards">
        <div class="card-slot">
          <div class="label">Vous</div>
          <div id="myCard" class="playing-card back">★</div>
          <div id="myReady" class="pill">Prêt ?</div>
        </div>

        <div class="card-slot">
          <div class="label">Adversaire</div>
          <div id="oppCard" class="playing-card back">★</div>
          <div id="oppReady" class="pill">En attente</div>
        </div>
      </div>

      <div id="gameMessage" class="status">La partie commence.</div>

      <button id="playBtn">Jouer une carte</button>
      <button id="newGameBtn" class="secondary hidden">Nouvelle partie</button>
      <button id="quitGameBtn" class="danger">Quitter</button>

      <p class="footer-info">
        Code partie : <strong id="smallGameCode"></strong><br>
        Rôle : <strong id="roleLabel"></strong>
      </p>
    </section>
  </main>

  <script type="module">
    /*
      ============================================================
      CONFIGURATION FIREBASE
      ============================================================
      1. Crée un projet Firebase.
      2. Active Firestore Database.
      3. Active Authentication > Anonymous.
      4. Remplace l’objet ci-dessous par ta configuration Firebase.
    */

const firebaseConfig = {
  apiKey: "AIzaSyDc2vXIRfWp2OCkcNrr13pme-x0kKbn3DM",
  authDomain: "mille-bornes-355ca.firebaseapp.com",
  databaseURL: "https://mille-bornes-355ca-default-rtdb.firebaseio.com",
  projectId: "mille-bornes-355ca",
  storageBucket: "mille-bornes-355ca.appspot.com",
  messagingSenderId: "1018160779227",
  appId: "1:1018160779227:web:e686d32f117dfef63261fe"
};
    /*
      ============================================================
      IMPORT FIREBASE
      ============================================================
    */

    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";
    import {
      getFirestore,
      doc,
      getDoc,
      setDoc,
      updateDoc,
      onSnapshot,
      runTransaction,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-firestore.js";
    import {
      getAuth,
      signInAnonymously,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-auth.js";

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    /*
      ============================================================
      ÉTAT LOCAL
      ============================================================
    */

    let uid = null;
    let currentCode = null;
    let currentRole = null;
    let unsubscribeGame = null;
    let heartbeatTimer = null;
    let latestGame = null;

    const els = {
      home: document.getElementById("homeScreen"),
      lobby: document.getElementById("lobbyScreen"),
      game: document.getElementById("gameScreen"),
      createBtn: document.getElementById("createBtn"),
      joinBtn: document.getElementById("joinBtn"),
      joinCodeInput: document.getElementById("joinCodeInput"),
      homeMessage: document.getElementById("homeMessage"),
      gameCodeBox: document.getElementById("gameCodeBox"),
      lobbyMessage: document.getElementById("lobbyMessage"),
      copyCodeBtn: document.getElementById("copyCodeBtn"),
      leaveLobbyBtn: document.getElementById("leaveLobbyBtn"),
      myCount: document.getElementById("myCount"),
      oppCount: document.getElementById("oppCount"),
      myScore: document.getElementById("myScore"),
      oppScore: document.getElementById("oppScore"),
      myCard: document.getElementById("myCard"),
      oppCard: document.getElementById("oppCard"),
      myReady: document.getElementById("myReady"),
      oppReady: document.getElementById("oppReady"),
      gameMessage: document.getElementById("gameMessage"),
      playBtn: document.getElementById("playBtn"),
      newGameBtn: document.getElementById("newGameBtn"),
      quitGameBtn: document.getElementById("quitGameBtn"),
      smallGameCode: document.getElementById("smallGameCode"),
      roleLabel: document.getElementById("roleLabel")
    };

    /*
      ============================================================
      OUTILS UI
      ============================================================
    */

    function showScreen(name) {
      els.home.classList.add("hidden");
      els.lobby.classList.add("hidden");
      els.game.classList.add("hidden");
      els[name].classList.remove("hidden");
    }

    function showMessage(el, text) {
      el.textContent = text;
      el.classList.remove("hidden");
    }

    function setCard(el, card) {
      el.className = "playing-card played";

      if (!card) {
        el.className = "playing-card back";
        el.innerHTML = "★";
        return;
      }

      const red = card.suit === "♥" || card.suit === "♦";
      el.classList.add(red ? "red" : "black");
      el.innerHTML = `<div>${card.label}</div><small>${card.suit}</small>`;

      setTimeout(() => el.classList.remove("played"), 360);
    }

    function otherRole(role) {
      return role === "host" ? "guest" : "host";
    }

    function gameRef(code) {
      return doc(db, "bataille_games", code);
    }

    function generateCode() {
      const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
      let code = "";
      for (let i = 0; i < 5; i++) {
        code += chars[Math.floor(Math.random() * chars.length)];
      }
      return code;
    }

    /*
      ============================================================
      CARTES ET LOGIQUE DE BATAILLE
      ============================================================
    */

    function createDeck() {
      const suits = ["♠", "♥", "♦", "♣"];
      const ranks = [
        { label: "2", value: 2 },
        { label: "3", value: 3 },
        { label: "4", value: 4 },
        { label: "5", value: 5 },
        { label: "6", value: 6 },
        { label: "7", value: 7 },
        { label: "8", value: 8 },
        { label: "9", value: 9 },
        { label: "10", value: 10 },
        { label: "J", value: 11 },
        { label: "Q", value: 12 },
        { label: "K", value: 13 },
        { label: "A", value: 14 }
      ];

      const deck = [];
      for (const suit of suits) {
        for (const rank of ranks) {
          deck.push({
            suit,
            label: rank.label,
            value: rank.value,
            id: `${rank.label}${suit}`
          });
        }
      }
      return shuffle(deck);
    }

    function shuffle(array) {
      const copy = [...array];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function dealDeck() {
      const deck = createDeck();
      return {
        hostDeck: deck.slice(0, 26),
        guestDeck: deck.slice(26)
      };
    }

    function resolveBattle(game) {
      const hostDeck = [...game.decks.host];
      const guestDeck = [...game.decks.guest];
      const pot = [];
      let message = "";
      let winner = null;
      let lastHostCard = null;
      let lastGuestCard = null;
      let battleCount = 0;

      while (true) {
        if (hostDeck.length === 0 && guestDeck.length === 0) {
          return buildDrawResult(game, hostDeck, guestDeck, pot, lastHostCard, lastGuestCard);
        }

        if (hostDeck.length === 0) {
          winner = "guest";
          message = "Le joueur host n’a plus de cartes.";
          break;
        }

        if (guestDeck.length === 0) {
          winner = "host";
          message = "Le joueur guest n’a plus de cartes.";
          break;
        }

        const hostVisible = hostDeck.shift();
        const guestVisible = guestDeck.shift();

        lastHostCard = hostVisible;
        lastGuestCard = guestVisible;

        pot.push(hostVisible, guestVisible);

        if (hostVisible.value > guestVisible.value) {
          winner = "host";
          message = battleCount > 0 ? "Bataille remportée par le host." : "Pli remporté par le host.";
          break;
        }

        if (guestVisible.value > hostVisible.value) {
          winner = "guest";
          message = battleCount > 0 ? "Bataille remportée par le guest." : "Pli remporté par le guest.";
          break;
        }

        battleCount++;

        if (hostDeck.length === 0 && guestDeck.length === 0) {
          return buildDrawResult(game, hostDeck, guestDeck, pot, lastHostCard, lastGuestCard);
        }

        if (hostDeck.length === 0) {
          winner = "guest";
          message = "Bataille ! Le host n’a plus assez de cartes.";
          break;
        }

        if (guestDeck.length === 0) {
          winner = "host";
          message = "Bataille ! Le guest n’a plus assez de cartes.";
          break;
        }

        const hostHidden = hostDeck.shift();
        const guestHidden = guestDeck.shift();
        pot.push(hostHidden, guestHidden);

        if (hostDeck.length === 0 && guestDeck.length === 0) {
          return buildDrawResult(game, hostDeck, guestDeck, pot, lastHostCard, lastGuestCard);
        }

        if (hostDeck.length === 0) {
          winner = "guest";
          message = "Bataille ! Le host n’a plus de carte visible.";
          break;
        }

        if (guestDeck.length === 0) {
          winner = "host";
          message = "Bataille ! Le guest n’a plus de carte visible.";
          break;
        }
      }

      if (winner === "host") {
        hostDeck.push(...pot);
      } else {
        guestDeck.push(...pot);
      }

      const scores = {
        host: game.scores.host + (winner === "host" ? 1 : 0),
        guest: game.scores.guest + (winner === "guest" ? 1 : 0)
      };

      let status = "playing";
      let finalWinner = null;

      if (hostDeck.length === 52 || guestDeck.length === 0) {
        status = "finished";
        finalWinner = "host";
      }

      if (guestDeck.length === 52 || hostDeck.length === 0) {
        status = "finished";
        finalWinner = "guest";
      }

      return {
        decks: {
          host: hostDeck,
          guest: guestDeck
        },
        scores,
        ready: {
          host: false,
          guest: false
        },
        lastCards: {
          host: lastHostCard,
          guest: lastGuestCard
        },
        lastWinner: winner,
        winner: finalWinner,
        status,
        potSize: pot.length,
        battleCount,
        message,
        turn: game.turn + 1,
        resolving: false,
        updatedAt: serverTimestamp()
      };
    }

    function buildDrawResult(game, hostDeck, guestDeck, pot, lastHostCard, lastGuestCard) {
      return {
        decks: {
          host: hostDeck,
          guest: guestDeck
        },
        scores: game.scores,
        ready: {
          host: false,
          guest: false
        },
        lastCards: {
          host: lastHostCard,
          guest: lastGuestCard
        },
        lastWinner: null,
        winner: "draw",
        status: "finished",
        potSize: pot.length,
        battleCount: 1,
        message: "Égalité finale.",
        turn: game.turn + 1,
        resolving: false,
        updatedAt: serverTimestamp()
      };
    }

    /*
      ============================================================
      FIREBASE
      ============================================================
    */

    async function createGame() {
      if (!uid) return showMessage(els.homeMessage, "Connexion Firebase en cours...");

      els.createBtn.disabled = true;
      showMessage(els.homeMessage, "Création de la partie...");

      try {
        let code = generateCode();
        let ref = gameRef(code);
        let snap = await getDoc(ref);

        while (snap.exists()) {
          code = generateCode();
          ref = gameRef(code);
          snap = await getDoc(ref);
        }

        await setDoc(ref, {
          code,
          status: "waiting",
          hostId: uid,
          guestId: null,
          players: {
            host: {
              id: uid,
              online: true,
              lastSeen: Date.now()
            },
            guest: null
          },
          decks: {
            host: [],
            guest: []
          },
          scores: {
            host: 0,
            guest: 0
          },
          ready: {
            host: false,
            guest: false
          },
          lastCards: {
            host: null,
            guest: null
          },
          lastWinner: null,
          winner: null,
          message: "En attente d’un deuxième joueur.",
          potSize: 0,
          battleCount: 0,
          turn: 0,
          resolving: false,
          createdAt: serverTimestamp(),
          updatedAt: serverTimestamp()
        });

        enterGame(code, "host");
        showScreen("lobby");
      } catch (error) {
        console.error(error);
        showMessage(els.homeMessage, "Erreur Firebase. Vérifie ta configuration.");
      } finally {
        els.createBtn.disabled = false;
      }
    }

    async function joinGame() {
      if (!uid) return showMessage(els.homeMessage, "Connexion Firebase en cours...");

      const code = els.joinCodeInput.value.trim().toUpperCase();
      if (!code) return showMessage(els.homeMessage, "Entre un code partie.");

      els.joinBtn.disabled = true;
      showMessage(els.homeMessage, "Connexion à la partie...");

      try {
        const ref = gameRef(code);

        await runTransaction(db, async transaction => {
          const snap = await transaction.get(ref);

          if (!snap.exists()) {
            throw new Error("Cette partie n’existe pas.");
          }

          const game = snap.data();

          if (game.hostId === uid) {
            currentRole = "host";
            return;
          }

          if (game.guestId && game.guestId !== uid) {
            throw new Error("Cette partie est déjà pleine.");
          }

          if (game.status !== "waiting" && game.guestId !== uid) {
            throw new Error("Cette partie a déjà commencé.");
          }

          const dealt = dealDeck();

          transaction.update(ref, {
            guestId: uid,
            "players.guest": {
              id: uid,
              online: true,
              lastSeen: Date.now()
            },
            decks: {
              host: dealt.hostDeck,
              guest: dealt.guestDeck
            },
            status: "playing",
            message: "La partie commence.",
            updatedAt: serverTimestamp()
          });

          currentRole = "guest";
        });

        enterGame(code, currentRole || "guest");
      } catch (error) {
        console.error(error);
        showMessage(els.homeMessage, error.message || "Impossible de rejoindre la partie.");
      } finally {
        els.joinBtn.disabled = false;
      }
    }

    function enterGame(code, role) {
      currentCode = code;
      currentRole = role;

      localStorage.setItem("bataille_code", code);
      localStorage.setItem("bataille_role", role);

      els.gameCodeBox.textContent = code;
      els.smallGameCode.textContent = code;
      els.roleLabel.textContent = role === "host" ? "Host" : "Guest";

      if (unsubscribeGame) unsubscribeGame();

      unsubscribeGame = onSnapshot(gameRef(code), snap => {
        if (!snap.exists()) {
          cleanLocalState();
          showScreen("home");
          showMessage(els.homeMessage, "La partie a été supprimée ou est introuvable.");
          return;
        }

        latestGame = snap.data();
        renderGame(latestGame);
      });

      startHeartbeat();

      if (role === "host") {
        showScreen("lobby");
      } else {
        showScreen("game");
      }
    }

    async function playCard() {
      if (!currentCode || !currentRole || !latestGame) return;
      if (latestGame.status !== "playing") return;
      if (latestGame.ready?.[currentRole]) return;

      els.playBtn.disabled = true;

      try {
        const ref = gameRef(currentCode);

        await runTransaction(db, async transaction => {
          const snap = await transaction.get(ref);
          if (!snap.exists()) return;

          const game = snap.data();
          if (game.status !== "playing") return;
          if (game.ready[currentRole]) return;

          const nextReady = {
            ...game.ready,
            [currentRole]: true
          };

          transaction.update(ref, {
            ready: nextReady,
            message: `${currentRole} est prêt.`,
            updatedAt: serverTimestamp()
          });
        });

        await tryResolveRound();
      } catch (error) {
        console.error(error);
      } finally {
        els.playBtn.disabled = false;
      }
    }

    async function tryResolveRound() {
      if (!currentCode) return;

      const ref = gameRef(currentCode);

      await runTransaction(db, async transaction => {
        const snap = await transaction.get(ref);
        if (!snap.exists()) return;

        const game = snap.data();

        if (game.status !== "playing") return;
        if (!game.ready.host || !game.ready.guest) return;
        if (game.resolving) return;

        transaction.update(ref, { resolving: true });
      });

      await runTransaction(db, async transaction => {
        const snap = await transaction.get(ref);
        if (!snap.exists()) return;

        const game = snap.data();

        if (game.status !== "playing") return;
        if (!game.ready.host || !game.ready.guest) return;
        if (!game.resolving) return;

        const result = resolveBattle(game);
        transaction.update(ref, result);
      });
    }

    async function newGameSamePlayers() {
      if (!currentCode || !latestGame) return;

      const ref = gameRef(currentCode);
      const dealt = dealDeck();

      await updateDoc(ref, {
        status: "playing",
        decks: {
          host: dealt.hostDeck,
          guest: dealt.guestDeck
        },
        scores: {
          host: 0,
          guest: 0
        },
        ready: {
          host: false,
          guest: false
        },
        lastCards: {
          host: null,
          guest: null
        },
        lastWinner: null,
        winner: null,
        message: "Nouvelle partie lancée.",
        potSize: 0,
        battleCount: 0,
        turn: 0,
        resolving: false,
        updatedAt: serverTimestamp()
      });
    }

    async function leaveCurrentGame() {
      if (!currentCode || !currentRole) {
        cleanLocalState();
        showScreen("home");
        return;
      }

      try {
        await updateDoc(gameRef(currentCode), {
          [`players.${currentRole}.online`]: false,
          [`players.${currentRole}.lastSeen`]: Date.now(),
          updatedAt: serverTimestamp()
        });
      } catch (error) {
        console.warn(error);
      }

      cleanLocalState();
      showScreen("home");
    }

    function cleanLocalState() {
      if (unsubscribeGame) unsubscribeGame();
      if (heartbeatTimer) clearInterval(heartbeatTimer);

      unsubscribeGame = null;
      heartbeatTimer = null;
      latestGame = null;
      currentCode = null;
      currentRole = null;

      localStorage.removeItem("bataille_code");
      localStorage.removeItem("bataille_role");
    }

    function startHeartbeat() {
      if (heartbeatTimer) clearInterval(heartbeatTimer);

      heartbeatTimer = setInterval(async () => {
        if (!currentCode || !currentRole) return;

        try {
          await updateDoc(gameRef(currentCode), {
            [`players.${currentRole}.online`]: true,
            [`players.${currentRole}.lastSeen`]: Date.now()
          });
        } catch (error) {
          console.warn(error);
        }
      }, 7000);
    }

    /*
      ============================================================
      RENDU
      ============================================================
    */

    function renderGame(game) {
      if (!currentRole) return;

      const opp = otherRole(currentRole);

      if (game.status === "waiting") {
        showScreen("lobby");
        els.lobbyMessage.textContent = "En attente d’un deuxième joueur...";
        return;
      }

      showScreen("game");

      const myDeck = game.decks?.[currentRole] || [];
      const oppDeck = game.decks?.[opp] || [];

      els.myCount.textContent = myDeck.length;
      els.oppCount.textContent = oppDeck.length;
      els.myScore.textContent = game.scores?.[currentRole] || 0;
      els.oppScore.textContent = game.scores?.[opp] || 0;

      setCard(els.myCard, game.lastCards?.[currentRole] || null);
      setCard(els.oppCard, game.lastCards?.[opp] || null);

      els.myReady.textContent = game.ready?.[currentRole] ? "Carte jouée" : "Prêt ?";
      els.oppReady.textContent = game.ready?.[opp] ? "Carte jouée" : "En attente";

      els.playBtn.disabled =
        game.status !== "playing" ||
        game.ready?.[currentRole] ||
        myDeck.length === 0 ||
        game.resolving;

      els.newGameBtn.classList.toggle("hidden", game.status !== "finished");

      let message = translateMessage(game, currentRole);
      els.gameMessage.textContent = message;

      if (game.ready?.host && game.ready?.guest && game.status === "playing") {
        tryResolveRound();
      }
    }

    function translateMessage(game, role) {
      if (game.status === "finished") {
        if (game.winner === "draw") return "Égalité parfaite.";
        return game.winner === role ? "Vous avez gagné la partie" : "Vous avez perdu la partie";
      }

      if (game.battleCount > 0 && game.lastWinner === null) {
        return "Bataille !";
      }

      if (game.lastWinner) {
        if (game.lastWinner === role) {
          return game.battleCount > 0 ? "Bataille gagnée ! Vous remportez le tas." : "Vous avez gagné le pli";
        }
        return game.battleCount > 0 ? "Bataille perdue. L’adversaire remporte le tas." : "Vous avez perdu le pli";
      }

      const opp = otherRole(role);

      if (game.ready?.[role] && !game.ready?.[opp]) {
        return "Carte jouée. En attente de l’adversaire.";
      }

      if (!game.ready?.[role] && game.ready?.[opp]) {
        return "L’adversaire a joué. À vous.";
      }

      return game.message || "Jouez une carte.";
    }

    /*
      ============================================================
      ÉVÉNEMENTS
      ============================================================
    */

    els.createBtn.addEventListener("click", createGame);
    els.joinBtn.addEventListener("click", joinGame);
    els.playBtn.addEventListener("click", playCard);
    els.newGameBtn.addEventListener("click", newGameSamePlayers);
    els.leaveLobbyBtn.addEventListener("click", leaveCurrentGame);
    els.quitGameBtn.addEventListener("click", leaveCurrentGame);

    els.copyCodeBtn.addEventListener("click", async () => {
      if (!currentCode) return;
      await navigator.clipboard.writeText(currentCode);
      els.lobbyMessage.textContent = "Code copié.";
    });

    els.joinCodeInput.addEventListener("input", () => {
      els.joinCodeInput.value = els.joinCodeInput.value.toUpperCase().replace(/[^A-Z0-9]/g, "");
    });

    window.addEventListener("beforeunload", () => {
      if (!currentCode || !currentRole) return;
      updateDoc(gameRef(currentCode), {
        [`players.${currentRole}.online`]: false,
        [`players.${currentRole}.lastSeen`]: Date.now()
      });
    });

    /*
      ============================================================
      CONNEXION ANONYME
      ============================================================
    */

    onAuthStateChanged(auth, user => {
      if (user) {
        uid = user.uid;

        const savedCode = localStorage.getItem("bataille_code");
        const savedRole = localStorage.getItem("bataille_role");

        if (savedCode && savedRole) {
          enterGame(savedCode, savedRole);
        }
      }
    });

    signInAnonymously(auth).catch(error => {
      console.error(error);
      showMessage(els.homeMessage, "Active l’authentification anonyme dans Firebase.");
    });
  </script>
</body>
</html>
