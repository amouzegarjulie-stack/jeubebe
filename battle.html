<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
  <meta name="theme-color" content="#312e81" />
  <title>Bataille Live</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    :root {
      --safe-top: env(safe-area-inset-top);
      --safe-bottom: env(safe-area-inset-bottom);
    }

    * {
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    body {
      min-height: 100vh;
      min-height: 100dvh;
      padding-top: var(--safe-top);
      padding-bottom: var(--safe-bottom);
      overflow: hidden;
      background:
        radial-gradient(circle at top left, rgba(250, 204, 21, 0.28), transparent 34%),
        radial-gradient(circle at bottom right, rgba(236, 72, 153, 0.28), transparent 34%),
        linear-gradient(135deg, #1e1b4b, #312e81 48%, #4c1d95);
      color: white;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    input, button {
      font-size: 16px;
    }

    .glass {
      background: rgba(255, 255, 255, 0.14);
      border: 1px solid rgba(255, 255, 255, 0.22);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.22);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .soft-card {
      background: linear-gradient(145deg, #ffffff, #eef2ff);
      box-shadow:
        14px 14px 34px rgba(15, 23, 42, 0.28),
        -8px -8px 24px rgba(255, 255, 255, 0.14);
    }

    .playing-card {
      width: min(25vw, 96px);
      height: min(36vw, 138px);
      min-width: 74px;
      min-height: 106px;
      border-radius: 18px;
      transform-style: preserve-3d;
      transition: transform 360ms ease, opacity 280ms ease, filter 280ms ease;
    }

    .card-back {
      background:
        radial-gradient(circle at center, rgba(250, 204, 21, 0.7) 0 9%, transparent 10%),
        linear-gradient(135deg, #4338ca, #7c3aed);
      border: 4px solid rgba(255, 255, 255, 0.9);
      box-shadow: inset 0 0 0 2px rgba(250, 204, 21, 0.35), 0 16px 34px rgba(0, 0, 0, 0.28);
    }

    .card-face {
      background: linear-gradient(160deg, #ffffff, #f8fafc);
      color: #111827;
      border: 1px solid rgba(255, 255, 255, 0.8);
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.28);
    }

    .red-card {
      color: #dc2626;
    }

    .pile-button {
      touch-action: manipulation;
      transition: transform 160ms ease, filter 160ms ease;
    }

    .pile-button:active {
      transform: scale(0.96);
      filter: brightness(1.08);
    }

    .float-in {
      animation: floatIn 340ms ease both;
    }

    .pulse-gold {
      animation: pulseGold 1.4s ease-in-out infinite;
    }

    .win-sweep-left {
      animation: sweepLeft 520ms ease forwards;
    }

    .win-sweep-right {
      animation: sweepRight 520ms ease forwards;
    }

    .shake {
      animation: shake 380ms ease-in-out;
    }

    @keyframes floatIn {
      from { opacity: 0; transform: translateY(18px) scale(0.94); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes pulseGold {
      0%, 100% { box-shadow: 0 0 0 rgba(250, 204, 21, 0); }
      50% { box-shadow: 0 0 34px rgba(250, 204, 21, 0.52); }
    }

    @keyframes sweepLeft {
      to { opacity: 0; transform: translateX(-44vw) translateY(16vh) rotate(-15deg) scale(0.72); }
    }

    @keyframes sweepRight {
      to { opacity: 0; transform: translateX(44vw) translateY(-16vh) rotate(15deg) scale(0.72); }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-6px); }
      40% { transform: translateX(6px); }
      60% { transform: translateX(-4px); }
      80% { transform: translateX(4px); }
    }
  </style>
</head>

<body>
  <main id="app" class="relative mx-auto flex min-h-[100dvh] max-w-md flex-col px-4 py-4"></main>

  <script>
    window.addEventListener("error", event => {
      const app = document.querySelector("#app");
      if (!app) return;
      app.innerHTML = `
        <section class="flex min-h-[100dvh] items-center justify-center px-4 text-center">
          <div class="glass w-full max-w-md rounded-[2rem] p-6">
            <div class="mb-4 text-5xl">💥</div>
            <h1 class="text-2xl font-black">Erreur JavaScript</h1>
            <pre class="mt-4 max-h-72 overflow-auto rounded-2xl bg-black/40 p-4 text-left text-xs text-red-100 whitespace-pre-wrap">${String(event.message || event.error || "Erreur inconnue")}</pre>
          </div>
        </section>
      `;
    });

    window.addEventListener("unhandledrejection", event => {
      const app = document.querySelector("#app");
      if (!app) return;
      app.innerHTML = `
        <section class="flex min-h-[100dvh] items-center justify-center px-4 text-center">
          <div class="glass w-full max-w-md rounded-[2rem] p-6">
            <div class="mb-4 text-5xl">💥</div>
            <h1 class="text-2xl font-black">Erreur async</h1>
            <pre class="mt-4 max-h-72 overflow-auto rounded-2xl bg-black/40 p-4 text-left text-xs text-red-100 whitespace-pre-wrap">${String(event.reason?.message || event.reason || "Erreur inconnue")}</pre>
          </div>
        </section>
      `;
    });
  </script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import {
      getDatabase,
      ref,
      set,
      get,
      onValue,
      update,
      runTransaction,
      serverTimestamp,
      onDisconnect,
      remove
    } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js";

    /************************************************************
     * CONFIGURATION FIREBASE
     * Colle ici les informations de ton projet Firebase.
     * Active Realtime Database dans la console Firebase.
     ************************************************************/
 const firebaseConfig = {
  apiKey: "AIzaSyDc2vXIRfWp2OCkcNrr13pme-x0kKbn3DM",
  authDomain: "mille-bornes-355ca.firebaseapp.com",
  databaseURL: "https://mille-bornes-355ca-default-rtdb.firebaseio.com",
  projectId: "mille-bornes-355ca",
  storageBucket: "mille-bornes-355ca.appspot.com",
  messagingSenderId: "1018160779227",
  appId: "1:1018160779227:web:e686d32f117dfef63261fe"
};

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const $app = document.querySelector("#app");

    const state = {
      roomCode: null,
      playerId: null,
      unsubscribe: null,
      game: null,
      busy: false,
      lastResolutionId: null
    };

    const SUITS = ["♠", "♥", "♦", "♣"];
    const VALUES = [
      { label: "2", rank: 2 },
      { label: "3", rank: 3 },
      { label: "4", rank: 4 },
      { label: "5", rank: 5 },
      { label: "6", rank: 6 },
      { label: "7", rank: 7 },
      { label: "8", rank: 8 },
      { label: "9", rank: 9 },
      { label: "10", rank: 10 },
      { label: "J", rank: 11 },
      { label: "Q", rank: 12 },
      { label: "K", rank: 13 },
      { label: "A", rank: 14 }
    ];

    function uid() {
      return Math.random().toString(36).slice(2, 10);
    }

    function roomRef(code = state.roomCode) {
      return ref(db, `warRooms/${code}`);
    }

    function createDeck() {
      return SUITS.flatMap(suit => VALUES.map(value => ({
        id: `${value.label}${suit}-${uid()}`,
        label: value.label,
        suit,
        rank: value.rank,
        color: suit === "♥" || suit === "♦" ? "red" : "black"
      })));
    }

    function shuffle(cards) {
      const copy = [...cards];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function code4() {
      return String(Math.floor(1000 + Math.random() * 9000));
    }

    function meKey() {
      return `p${state.playerId}`;
    }

    function opponentKey() {
      return state.playerId === 1 ? "p2" : "p1";
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function renderShell(inner) {
      $app.innerHTML = inner;
    }

    function toast(message) {
      const node = document.createElement("div");
      node.className = "fixed left-1/2 top-[calc(env(safe-area-inset-top)+16px)] z-50 -translate-x-1/2 rounded-full bg-black/70 px-4 py-2 text-sm text-white backdrop-blur";
      node.textContent = message;
      document.body.appendChild(node);
      setTimeout(() => node.remove(), 1900);
    }

    function showFirebaseError(error) {
      const message = error?.message || String(error || "Erreur inconnue");
      renderShell(`
        <section class="flex flex-1 flex-col items-center justify-center text-center">
          <div class="glass w-full rounded-[2rem] p-7">
            <div class="mx-auto mb-5 grid h-16 w-16 place-items-center rounded-3xl bg-red-500/20 text-4xl">⚠️</div>
            <h1 class="text-2xl font-black">Firebase inaccessible</h1>
            <p class="mt-3 text-sm leading-6 text-white/75">L'application est chargée, mais Realtime Database refuse la connexion ou ne répond pas.</p>
            <pre class="mt-5 max-h-40 overflow-auto rounded-2xl bg-black/35 p-4 text-left text-xs text-red-100 whitespace-pre-wrap">${escapeHtml(message)}</pre>
            <div class="mt-5 rounded-2xl bg-white/10 p-4 text-left text-sm leading-6 text-white/80">
              <p class="font-bold text-yellow-200">À vérifier :</p>
              <p>1. Realtime Database est bien créée.</p>
              <p>2. Les règles autorisent temporairement la lecture/écriture.</p>
              <p>3. databaseURL correspond exactement à l'URL affichée dans Firebase.</p>
            </div>
            <button id="retryFirebaseBtn" class="mt-5 w-full rounded-2xl bg-yellow-300 px-5 py-4 font-black text-indigo-950">Réessayer</button>
          </div>
        </section>
      `);
      document.querySelector("#retryFirebaseBtn").addEventListener("click", boot);
    }

    function showConnecting() {
      renderShell(`
        <section class="flex flex-1 flex-col items-center justify-center text-center">
          <div class="glass w-full rounded-[2rem] p-7">
            <div class="mx-auto mb-5 grid h-20 w-20 place-items-center rounded-3xl bg-white/15 text-5xl">🔌</div>
            <h1 class="text-2xl font-black">Connexion Firebase...</h1>
            <p class="mt-3 text-sm text-white/70">Test d'accès à Realtime Database.</p>
            <div class="mt-6 h-2 overflow-hidden rounded-full bg-white/10">
              <div class="h-full w-1/2 animate-pulse rounded-full bg-yellow-300"></div>
            </div>
          </div>
        </section>
      `);
    }

    async function testFirebaseAccess() {
      const testPath = ref(db, `warRooms/__connectionTest_${uid()}`);
      await set(testPath, { ok: true, at: Date.now() });
      await remove(testPath);
    }

    async function boot() {
      showConnecting();
      try {
        await Promise.race([
          testFirebaseAccess(),
          new Promise((_, reject) => setTimeout(() => reject(new Error("Timeout Firebase après 8 secondes. Vérifie les règles Realtime Database, l'URL databaseURL, ou le domaine autorisé.")), 8000))
        ]);
        showHome();
      } catch (error) {
        console.error(error);
        showFirebaseError(error);
      }
    }

    function cardHtml(card, extra = "") {
      if (!card) {
        return `<div class="playing-card card-back ${extra}"></div>`;
      }

      const red = card.color === "red" ? "red-card" : "";
      return `
        <div class="playing-card card-face ${red} ${extra} flex flex-col justify-between p-3">
          <div class="text-left text-xl font-black leading-none">${card.label}</div>
          <div class="grid place-items-center text-4xl font-black leading-none">${card.suit}</div>
          <div class="rotate-180 text-left text-xl font-black leading-none">${card.label}</div>
        </div>
      `;
    }

    function hiddenCardHtml(label = "") {
      return `
        <div class="relative">
          <div class="playing-card card-back"></div>
          ${label ? `<div class="absolute -bottom-7 left-1/2 -translate-x-1/2 whitespace-nowrap text-xs text-white/70">${label}</div>` : ""}
        </div>
      `;
    }

    function showHome() {
      state.roomCode = null;
      state.playerId = null;
      if (state.unsubscribe) state.unsubscribe();

      renderShell(`
        <section class="flex flex-1 flex-col items-center justify-center gap-7 text-center">
          <div class="glass float-in w-full rounded-[2rem] px-6 py-8">
            <div class="mx-auto mb-5 grid h-20 w-20 place-items-center rounded-3xl bg-white/15 text-5xl shadow-2xl">⚔️</div>
            <h1 class="text-4xl font-black tracking-tight">Bataille Live</h1>
            <p class="mt-3 text-sm leading-6 text-white/75">Crée ou rejoins une partie en temps réel. Les cartes restent cachées jusqu'à ce que les deux joueurs aient joué.</p>

            <div class="mt-8 grid gap-3">
              <button id="createBtn" class="rounded-2xl bg-yellow-300 px-5 py-4 font-black text-indigo-950 shadow-xl shadow-yellow-300/20 active:scale-95">Créer une partie</button>
              <button id="joinOpenBtn" class="rounded-2xl bg-white/16 px-5 py-4 font-bold text-white ring-1 ring-white/20 active:scale-95">Rejoindre une partie</button>
            </div>
          </div>
        </section>
      `);

      document.querySelector("#createBtn").addEventListener("click", createRoom);
      document.querySelector("#joinOpenBtn").addEventListener("click", showJoin);
    }

    function showJoin() {
      renderShell(`
        <section class="flex flex-1 flex-col justify-center gap-5">
          <button id="backBtn" class="absolute left-4 top-5 rounded-full bg-white/10 px-4 py-2 text-sm text-white/80">← Retour</button>
          <div class="glass float-in rounded-[2rem] px-6 py-8 text-center">
            <h2 class="text-3xl font-black">Rejoindre</h2>
            <p class="mt-2 text-sm text-white/70">Entre le code à 4 chiffres de ton adversaire.</p>
            <input id="codeInput" inputmode="numeric" maxlength="4" autocomplete="one-time-code" placeholder="1234"
              class="mt-7 w-full rounded-2xl border border-white/20 bg-white/95 px-5 py-4 text-center text-3xl font-black tracking-[0.35em] text-indigo-950 outline-none" />
            <button id="joinBtn" class="mt-4 w-full rounded-2xl bg-yellow-300 px-5 py-4 font-black text-indigo-950 shadow-xl shadow-yellow-300/20 active:scale-95">Entrer</button>
          </div>
        </section>
      `);

      document.querySelector("#backBtn").addEventListener("click", showHome);
      document.querySelector("#joinBtn").addEventListener("click", () => joinRoom(document.querySelector("#codeInput").value.trim()));
      document.querySelector("#codeInput").addEventListener("input", e => {
        e.target.value = e.target.value.replace(/\D/g, "").slice(0, 4);
      });
    }

    async function createRoom() {
      try {
        let code = code4();
        let snap = await get(roomRef(code));
        while (snap.exists()) {
          code = code4();
          snap = await get(roomRef(code));
        }

        state.roomCode = code;
        state.playerId = 1;

        await set(roomRef(code), {
          code,
          status: "waiting",
          createdAt: serverTimestamp(),
          players: {
            p1: { connected: true, name: "Joueur 1", joinedAt: serverTimestamp() }
          },
          game: null
        });

        onDisconnect(ref(db, `warRooms/${code}/players/p1/connected`)).set(false);
        listenRoom();
      } catch (error) {
        console.error(error);
        toast("Impossible de créer la partie. Vérifie Firebase.");
      }
    }

    async function joinRoom(code) {
      if (!/^\d{4}$/.test(code)) {
        toast("Code invalide.");
        return;
      }

      try {
        const snapshot = await get(roomRef(code));
        if (!snapshot.exists()) {
          toast("Partie introuvable.");
          return;
        }

        const room = snapshot.val();
        if (room.players?.p2?.connected) {
          toast("Cette partie est déjà complète.");
          return;
        }

        state.roomCode = code;
        state.playerId = 2;

        await update(roomRef(code), {
          "players/p2": { connected: true, name: "Joueur 2", joinedAt: serverTimestamp() },
          status: "ready"
        });

        onDisconnect(ref(db, `warRooms/${code}/players/p2/connected`)).set(false);
        await initializeGameIfNeeded(code);
        listenRoom();
      } catch (error) {
        console.error(error);
        toast("Impossible de rejoindre la partie.");
      }
    }

    async function initializeGameIfNeeded(code) {
      await runTransaction(roomRef(code), room => {
        if (!room) return room;
        if (room.game?.initialized) return room;
        if (!room.players?.p1 || !room.players?.p2) return room;

        const deck = shuffle(createDeck());
        room.status = "playing";
        room.game = {
          initialized: true,
          phase: "normal",
          round: 1,
          pot: [],
          table: {
            p1: { visible: null, hidden: [], committed: false },
            p2: { visible: null, hidden: [], committed: false }
          },
          decks: {
            p1: deck.slice(0, 26),
            p2: deck.slice(26, 52)
          },
          message: "La partie commence.",
          winner: null,
          resolving: false,
          lastWinner: null,
          resolutionId: null
        };
        return room;
      });
    }

    function listenRoom() {
      if (state.unsubscribe) state.unsubscribe();
      state.unsubscribe = onValue(roomRef(), snapshot => {
        if (!snapshot.exists()) {
          showHome();
          toast("La partie a été fermée.");
          return;
        }
        state.game = snapshot.val();
        renderGame();
        maybeAutoResolve();
      });
    }

    function renderGame() {
      const room = state.game;
      const game = room.game;
      const me = meKey();
      const opp = opponentKey();
      const p1Connected = !!room.players?.p1?.connected;
      const p2Connected = !!room.players?.p2?.connected;

      if (!game) {
        renderShell(`
          <section class="flex flex-1 flex-col items-center justify-center text-center">
            <div class="glass float-in w-full rounded-[2rem] p-7">
              <p class="text-sm uppercase tracking-[0.28em] text-yellow-200">Code partie</p>
              <div class="mt-3 rounded-3xl bg-white/95 px-6 py-5 text-5xl font-black tracking-[0.22em] text-indigo-950">${state.roomCode}</div>
              <p class="mt-5 text-white/75">En attente du deuxième joueur...</p>
              <div class="mt-6 h-2 overflow-hidden rounded-full bg-white/10">
                <div class="h-full w-1/2 animate-pulse rounded-full bg-yellow-300"></div>
              </div>
              <button id="leaveBtn" class="mt-7 rounded-2xl bg-white/10 px-5 py-3 text-sm text-white/80">Quitter</button>
            </div>
          </section>
        `);
        document.querySelector("#leaveBtn").addEventListener("click", leaveRoom);
        return;
      }

      const myDeckCount = game.decks?.[me]?.length || 0;
      const oppDeckCount = game.decks?.[opp]?.length || 0;
      const myTable = game.table?.[me] || {};
      const oppTable = game.table?.[opp] || {};
      const bothCommitted = !!myTable.committed && !!oppTable.committed;
      const myPlayed = !!myTable.committed;
      const canPlay = room.status === "playing" && !game.winner && !myPlayed && myDeckCount > 0 && !game.resolving;
      const isWar = game.phase === "war";
      const instruction = game.winner
        ? (game.winner === me ? "Victoire !" : "Défaite...")
        : isWar
          ? "Bataille : pose 1 carte cachée puis 1 visible."
          : "Appuie sur ton tas pour jouer.";

      renderShell(`
        <section class="flex min-h-[100dvh] flex-col gap-3 pb-3 pt-2">
          <header class="glass rounded-[1.6rem] px-4 py-3">
            <div class="flex items-center justify-between gap-3">
              <div>
                <p class="text-xs uppercase tracking-[0.22em] text-yellow-200">Bataille Live</p>
                <p class="text-lg font-black">Code ${state.roomCode}</p>
              </div>
              <button id="leaveBtn" class="rounded-full bg-white/10 px-3 py-2 text-xs text-white/80">Quitter</button>
            </div>
            <div class="mt-3 grid grid-cols-2 gap-2 text-sm">
              <div class="rounded-2xl bg-white/10 p-3">
                <p class="text-white/60">Adversaire ${p1Connected && p2Connected ? "🟢" : "🟠"}</p>
                <p class="text-2xl font-black">${oppDeckCount}</p>
              </div>
              <div class="rounded-2xl bg-yellow-300/95 p-3 text-indigo-950">
                <p class="opacity-70">Toi</p>
                <p class="text-2xl font-black">${myDeckCount}</p>
              </div>
            </div>
          </header>

          <section class="glass flex flex-1 flex-col justify-between rounded-[2rem] p-4">
            <div class="flex items-center justify-between">
              <div>
                <p class="text-xs uppercase tracking-[0.22em] text-white/55">Adversaire</p>
                <p class="text-sm font-semibold text-white/80">${oppTable.committed ? "Carte posée" : "Attend..."}</p>
              </div>
              <div class="scale-75 opacity-90">${oppTable.committed && !bothCommitted ? hiddenCardHtml() : ""}</div>
            </div>

            <div class="grid place-items-center py-2">
              <div id="centerCards" class="relative flex min-h-[170px] w-full items-center justify-center gap-4">
                ${renderCenterCards(game, me, opp, bothCommitted)}
              </div>
              <div class="mt-3 min-h-14 text-center">
                <p class="text-lg font-black text-yellow-200">${escapeHtml(instruction)}</p>
                <p class="mt-1 text-sm text-white/70">${escapeHtml(game.message || "")}</p>
                <p class="mt-1 text-xs text-white/50">Pot : ${game.pot?.length || 0} carte(s)</p>
              </div>
            </div>

            <div class="flex items-center justify-between gap-4">
              <button id="playBtn" ${canPlay ? "" : "disabled"} class="pile-button ${canPlay ? "pulse-gold" : "opacity-55"} flex items-center gap-3 rounded-[1.6rem] bg-white/10 p-3 text-left ring-1 ring-white/15">
                ${hiddenCardHtml()}
                <div>
                  <p class="text-xs uppercase tracking-[0.22em] text-yellow-200">Ton tas</p>
                  <p class="text-sm font-bold">${canPlay ? "Jouer" : myPlayed ? "Carte posée" : "Patiente"}</p>
                </div>
              </button>

              <div class="text-right">
                <p class="text-xs uppercase tracking-[0.22em] text-white/55">Manche</p>
                <p class="text-3xl font-black">${game.round || 1}</p>
              </div>
            </div>
          </section>
        </section>
      `);

      document.querySelector("#leaveBtn").addEventListener("click", leaveRoom);
      document.querySelector("#playBtn")?.addEventListener("click", playTurn);
    }

    function renderCenterCards(game, me, opp, bothCommitted) {
      const myTable = game.table?.[me] || {};
      const oppTable = game.table?.[opp] || {};
      const sweepClass = game.lastWinner
        ? game.lastWinner === me
          ? "win-sweep-right"
          : "win-sweep-left"
        : "";

      if (game.phase === "war" && !bothCommitted) {
        return `
          <div class="flex items-center gap-4">
            ${hiddenCardHtml("Pot")}
            <div class="grid h-16 w-16 place-items-center rounded-full bg-yellow-300 text-3xl font-black text-indigo-950 shadow-xl">VS</div>
            ${hiddenCardHtml("Bataille")}
          </div>
        `;
      }

      if (!bothCommitted) {
        return `
          <div class="grid h-32 w-32 place-items-center rounded-full border border-white/20 bg-white/10 text-center text-sm font-semibold text-white/70">
            Suspense...
          </div>
        `;
      }

      return `
        <div class="float-in ${sweepClass}">
          <p class="mb-2 text-center text-xs text-white/60">Adversaire</p>
          ${cardHtml(oppTable.visible, game.phase === "war" ? "shake" : "")}
        </div>
        <div class="grid h-12 w-12 place-items-center rounded-full bg-yellow-300 text-sm font-black text-indigo-950 shadow-xl">VS</div>
        <div class="float-in ${sweepClass}">
          <p class="mb-2 text-center text-xs text-white/60">Toi</p>
          ${cardHtml(myTable.visible, game.phase === "war" ? "shake" : "")}
        </div>
      `;
    }

    async function playTurn() {
      if (state.busy) return;
      state.busy = true;

      const player = meKey();

      try {
        await runTransaction(roomRef(), room => {
          if (!room?.game || room.status !== "playing") return room;
          const game = room.game;
          if (game.winner || game.resolving) return room;
          if (game.table?.[player]?.committed) return room;

          const deck = game.decks[player] || [];
          if (deck.length <= 0) {
            game.winner = player === "p1" ? "p2" : "p1";
            room.status = "finished";
            return room;
          }

          if (game.phase === "war") {
            const hidden = [];
            let visible = null;

            if (deck.length >= 2) {
              hidden.push(deck.shift());
              visible = deck.shift();
            } else {
              visible = deck.shift();
            }

            game.table[player] = { hidden, visible, committed: true };
            game.message = `${player === "p1" ? "Joueur 1" : "Joueur 2"} a posé ses cartes de bataille.`;
          } else {
            const visible = deck.shift();
            game.table[player] = { hidden: [], visible, committed: true };
            game.message = `${player === "p1" ? "Joueur 1" : "Joueur 2"} a joué.`;
          }

          game.decks[player] = deck;
          return room;
        });
      } catch (error) {
        console.error(error);
        toast("La carte n'a pas pu être jouée.");
      } finally {
        state.busy = false;
      }
    }

    async function maybeAutoResolve() {
      const room = state.game;
      const game = room?.game;
      if (!game || game.winner || game.resolving) return;
      if (!game.table?.p1?.committed || !game.table?.p2?.committed) return;

      const resolutionKey = `${game.round}-${game.phase}-${game.table.p1.visible?.id}-${game.table.p2.visible?.id}`;
      if (state.lastResolutionId === resolutionKey) return;
      state.lastResolutionId = resolutionKey;

      setTimeout(() => resolveRound(resolutionKey), 850);
    }

    async function resolveRound(resolutionKey) {
      try {
        await runTransaction(roomRef(), room => {
          if (!room?.game || room.game.winner || room.game.resolving) return room;

          const game = room.game;
          const t1 = game.table.p1;
          const t2 = game.table.p2;
          if (!t1?.committed || !t2?.committed) return room;

          const currentKey = `${game.round}-${game.phase}-${t1.visible?.id}-${t2.visible?.id}`;
          if (currentKey !== resolutionKey) return room;

          game.resolving = true;

          const roundCards = [
            ...(game.pot || []),
            ...(t1.hidden || []),
            t1.visible,
            ...(t2.hidden || []),
            t2.visible
          ].filter(Boolean);

          const p1Rank = t1.visible?.rank || 0;
          const p2Rank = t2.visible?.rank || 0;

          if (p1Rank === p2Rank) {
            game.phase = "war";
            game.pot = roundCards;
            game.table = {
              p1: { visible: null, hidden: [], committed: false },
              p2: { visible: null, hidden: [], committed: false }
            };
            game.message = "Égalité ! Bataille : chaque joueur pose une carte cachée puis une visible.";
            game.resolving = false;
            game.lastWinner = null;

            const p1CanContinue = (game.decks.p1?.length || 0) > 0;
            const p2CanContinue = (game.decks.p2?.length || 0) > 0;
            if (!p1CanContinue || !p2CanContinue) {
              const winner = p1CanContinue ? "p1" : "p2";
              game.decks[winner].push(...shuffle(roundCards));
              game.winner = winner;
              room.status = "finished";
              game.message = `${winner === "p1" ? "Joueur 1" : "Joueur 2"} gagne : l'autre joueur ne peut plus continuer la bataille.`;
            }

            return room;
          }

          const winner = p1Rank > p2Rank ? "p1" : "p2";
          game.decks[winner].push(...shuffle(roundCards));
          game.pot = [];
          game.phase = "normal";
          game.round = (game.round || 1) + 1;
          game.table = {
            p1: { visible: null, hidden: [], committed: false },
            p2: { visible: null, hidden: [], committed: false }
          };
          game.lastWinner = winner;
          game.resolutionId = uid();
          game.message = `${winner === "p1" ? "Joueur 1" : "Joueur 2"} remporte ${roundCards.length} carte(s).`;
          game.resolving = false;

          const p1Count = game.decks.p1?.length || 0;
          const p2Count = game.decks.p2?.length || 0;
          if (p1Count === 0 || p2Count === 0) {
            game.winner = p1Count > 0 ? "p1" : "p2";
            room.status = "finished";
            game.message = `${game.winner === "p1" ? "Joueur 1" : "Joueur 2"} gagne la partie !`;
          }

          return room;
        });
      } catch (error) {
        console.error(error);
      }
    }

    async function leaveRoom() {
      try {
        if (state.roomCode && state.playerId) {
          await update(roomRef(), {
            [`players/${meKey()}/connected`]: false,
            status: state.game?.game?.winner ? "finished" : "abandoned"
          });
        }
      } catch (error) {
        console.error(error);
      }
      showHome();
    }

    window.addEventListener("beforeunload", () => {
      if (state.roomCode && state.playerId) {
        const playerRef = ref(db, `warRooms/${state.roomCode}/players/${meKey()}/connected`);
        set(playerRef, false).catch(() => {});
      }
    });

    boot();
  </script>
</body>
